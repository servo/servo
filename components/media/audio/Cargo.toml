[package]
name = "servo-media-audio"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description.workspace = true

[lib]
name = "servo_media_audio"
path = "lib.rs"

[dependencies]
euclid = { workspace = true }
log = { workspace = true }
serde = { workspace = true, features = ["derive"] }
servo-media-derive = { workspace = true }
servo-media-player = { workspace = true }
servo-media-traits = { workspace = true }
servo-media-streams = { workspace = true }
smallvec = "1"
speexdsp-resampler = "0.1.0"
malloc_size_of = { workspace = true }
malloc_size_of_derive = { workspace = true }
num-complex = "0.4.6"

[dependencies.petgraph]
version = "0.4.12"
features = ["stable_graph"]

[dependencies.byte-slice-cast]
version = "1"

[dependencies.num-traits]
version = "0.2"

[package]
name = "servo-pixels"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description.workspace = true

[lib]
name = "pixels"
path = "lib.rs"

[features]
# Enables JPEG XL decoding via the `jxl-rs` crate (with SIMD acceleration).
# Off by default; embedders opt-in via `servo/jxl` (or `servoshell/jxl`,
# which is part of servoshell's default feature set).
jxl = ["dep:jxl"]

[dependencies]
euclid = { workspace = true }
image = { workspace = true }
jxl = { workspace = true, optional = true }
log = { workspace = true }
malloc_size_of = { workspace = true }
malloc_size_of_derive = { workspace = true }
serde = { workspace = true, features = ["derive"] }
servo-base = { workspace = true }
webrender_api = { workspace = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "benches"
path = "benches.rs"
harness = false

[package]
name = "servo-paint"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description.workspace = true

[lib]
name = "paint"
path = "lib.rs"

[features]
default = []
tracing = ["dep:tracing"]
webgpu = ["dep:webgpu"]
webxr = ["dep:webxr", "dep:webxr-api"]

[lints.clippy]
unwrap_used = "deny"
panic = "deny"

[dependencies]
bitflags = { workspace = true }
crossbeam-channel = { workspace = true }
dpi = { workspace = true }
embedder_traits = { workspace = true }
euclid = { workspace = true }
gleam = { workspace = true }
image = { workspace = true }
ipc-channel = { workspace = true }
log = { workspace = true }
malloc_size_of = { workspace = true }
media = { workspace = true }
paint_api = { workspace = true }
profile_traits = { workspace = true }
rayon = { workspace = true }
rustc-hash = { workspace = true }
servo-allocator = { workspace = true }
servo-base = { workspace = true }
servo-canvas-traits = { workspace = true }
servo-config = { workspace = true }
servo-constellation-traits = { workspace = true }
servo-geometry = { workspace = true }
servo-tracing = { workspace = true }
smallvec = { workspace = true }
stylo_traits = { workspace = true }
surfman = { workspace = true }
timers = { workspace = true }
tracing = { workspace = true, optional = true }
webgl = { workspace = true }
webgpu = { workspace = true, optional = true }
webrender = { workspace = true }
webrender_api = { workspace = true }
webxr = { workspace = true, optional = true }
webxr-api = { workspace = true, optional = true }
wr_malloc_size_of = { workspace = true }

[dev-dependencies]
surfman = { workspace = true }

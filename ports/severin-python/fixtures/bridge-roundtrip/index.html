<!doctype html>
<meta charset="utf-8">
<title>Severin bridge roundtrip fixture</title>
<script>
function severinReady() {
  if (globalThis.severin && typeof globalThis.severin.send === "function") {
    return Promise.resolve(globalThis.severin);
  }
  return new Promise((resolve) => {
    const tick = () => {
      if (globalThis.severin && typeof globalThis.severin.send === "function") {
        resolve(globalThis.severin);
      } else {
        setTimeout(tick, 0);
      }
    };
    tick();
  });
}

(async () => {
  const severin = await severinReady();
  const reply = await severin.send(["request", {"hello": "world"}]);
  await severin.send(["resolved", reply]);
})();
</script>

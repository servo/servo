<!doctype html>
<meta charset="utf-8">
<title>Navigation Timing COOP responseStart reporter</title>
<script>
const params = new URLSearchParams(location.search);

addEventListener("message", event => {
  if (event.data === "close")
    close();
});

addEventListener("load", () => {
  const navigationTiming = performance.getEntriesByType("navigation")[0];
  const postback = new URL(params.get("postback"));
  postback.searchParams.set("channel", params.get("channel"));

  const iframe = document.createElement("iframe");
  iframe.hidden = true;
  iframe.src = postback.href;
  iframe.addEventListener("load", () => {
    iframe.contentWindow.postMessage({
      name: navigationTiming.name,
      redirectCount: navigationTiming.redirectCount,
      redirectStart: navigationTiming.redirectStart,
      fetchStart: navigationTiming.fetchStart,
      requestStart: navigationTiming.requestStart,
      responseStart: navigationTiming.responseStart,
      responseEnd: navigationTiming.responseEnd,
    }, "*");
  }, { once: true });
  document.body.append(iframe);
}, { once: true });
</script>

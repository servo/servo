<!DOCTYPE html>
<title>compressedTexSubImage2D without prior compressedTexImage2D should not crash</title>
<link rel="author" title="Babalola Taiwo Joseph" href="mailto:t.babalolajoseph@gmail.com" />
<link rel="issue" href="https://github.com/servo/servo/issues/43527" />

<p>Test passes if it doesn't crash.</p>

<canvas id="canvas"></canvas>
<script>
  const gl = canvas.getContext("webgl");
  if (gl) {
    let format, dataSize;

    const s3tc = gl.getExtension("WEBGL_compressed_texture_s3tc");
    const etc1 = gl.getExtension("WEBGL_compressed_texture_etc1");

    if (s3tc) {
      // 4x4 DXT1 block = 8 bytes
      format = s3tc.COMPRESSED_RGB_S3TC_DXT1_EXT;
      dataSize = 8;
    } else if (etc1) {
      // 4x4 ETC1 block = 8 bytes
      format = etc1.COMPRESSED_RGB_ETC1_WEBGL;
      dataSize = 8;
    }

    if (format) {
      const texture = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, texture);

      // Calling compressedTexSubImage2D without a prior compressedTexImage2D.
      // Per the WebGL spec this should generate GL_INVALID_OPERATION, not crash.
      // Servo panics here at tex_image_2d.rs because image_info_for_target
      // returns None and .unwrap() is called on it.
      gl.compressedTexSubImage2D(gl.TEXTURE_2D, 0, 0, 0, 4, 4, format, new Uint8Array(dataSize));
    }
  }
</script>

<!DOCTYPE html>
<body>
<script src=/resources/testharness.js></script>
<script src=/resources/testharnessreport.js></script>
<script src=/permissions-policy/resources/permissions-policy.js></script>
<script src=/common/get-host-info.sub.js></script>
<script>
'use strict';

const relative_path =
    '/webnn/permissions-policy/permissions-policy-webnn.html';
const base_src = '/permissions-policy/resources/redirect-on-load.html#';
const same_origin_src = base_src + relative_path;
const cross_origin_src =
    base_src + get_host_info().HTTPS_REMOTE_ORIGIN + relative_path;
const header = 'Permissions policy allow="webnn"';

async_test(t => {
  test_feature_availability('navigator.ml.createContext()', t, same_origin_src,
      expect_feature_available_default, 'webnn');
}, `${header} allows same-origin navigation in an iframe.`);

async_test(t => {
  test_feature_availability('navigator.ml.createContext()', t, cross_origin_src,
      expect_feature_unavailable_default, 'webnn');
}, `${header} disallows cross-origin navigation in an iframe.`);

</script>
</body>

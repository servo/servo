<!DOCTYPE html>
<title>Sub Apps: Valid calls for remove()</title>
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<script src="resources/subapps-helpers.js"></script>
<script>

promise_test(async t => {

const url = '/sub-app';
let remove_call_params = [url];
let mocked_response = [{ "manifestIdPath": url, "resultType": SubAppsServiceRemoveResultType.kSuccess }];
let expected_results = {
  removedApps: [url]
};

await subapps_remove_expect_success_with_result(t, remove_call_params, mocked_response, expected_results);
}, 'Remove API call works with one app.');

promise_test(async t => {

const url_1 = '/sub-app-1';
const url_2 = '/sub-app-2';
const url_3 = '/sub-app-3';

let remove_call_params = [url_1, url_2, url_3];

let mocked_response = [
  { "manifestIdPath": url_1, "resultType": SubAppsServiceRemoveResultType.kSuccess },
  { "manifestIdPath": url_2, "resultType": SubAppsServiceRemoveResultType.kSuccess },
  { "manifestIdPath": url_3, "resultType": SubAppsServiceRemoveResultType.kSuccess }
];

let expected_results = {
  removedApps: [url_1, url_2, url_3]
};

await subapps_remove_expect_success_with_result(t, remove_call_params, mocked_response, expected_results);
}, 'Remove API call works with several apps.');

</script>

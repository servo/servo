<!doctype html>
<script>
  window.onload = () => {
    navigation.addEventListener(
      "navigate",
      (e) => {
        e.signal.addEventListener(
          "abort",
          () => {
            navigation.navigate("#from-abort");
          },
          { once: true },
        );

        navigation.navigate("#during-event");
      },
      { once: true },
    );

    navigation.navigate("#original");
  };
</script>

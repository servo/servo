<select>
  <option>ABC</option>
  <option>DEF</option>
</select>
<iframe></iframe>
<script>
  let select = document.querySelector("select");
  let iframe = document.querySelector("iframe");
  iframe.contentWindow.document.body.appendChild(select);
</script>

<!doctype html>
<meta charset="utf-8">
<title>text-overflow: ellipsis has no effect on input when scrolled (rtl)</title>
<link rel="help" href="https://html.spec.whatwg.org/#the-input-element-as-a-text-entry-widget">
<link rel="match" href="input-text-overflow-ellipsis-rtl-scrolled-ref.html">
<style>
input {
  text-overflow: ellipsis;
}
</style>
<input dir="rtl" value="something very very very very long">
<script>
  document.querySelector("input").scrollLeft = -10;
</script>

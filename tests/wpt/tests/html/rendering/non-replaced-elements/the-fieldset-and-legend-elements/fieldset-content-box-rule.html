<!DOCTYPE html>
<meta charset="utf-8">
<title>Fieldset anonymous content box inherits rule</title>
<link rel="help" href="https://html.spec.whatwg.org/multipage/rendering.html#anonymous-fieldset-content-box">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/#propdef-rule">
<link rel="match" href="fieldset-content-box-rule-ref.html">
<meta name="assert" content="rule set on a fieldset should be inherited by the anonymous fieldset content box and painted in the gaps.">
<style>
fieldset {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  column-rule: 5px solid green;
  row-rule: 5px solid green;
  width: 200px;
  margin: 0;
  border: none;
  padding: 0;
}
.item {
  height: 50px;
  background: blue;
}
</style>
<p>There should be a 2-column grid with green rules in the gaps below.</p>
<fieldset>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
</fieldset>

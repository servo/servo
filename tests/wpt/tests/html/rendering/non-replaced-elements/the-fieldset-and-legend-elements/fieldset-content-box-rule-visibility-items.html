<!DOCTYPE html>
<meta charset="utf-8">
<title>Fieldset anonymous content box inherits rule-visibility-items</title>
<link rel="help" href="https://html.spec.whatwg.org/multipage/rendering.html#anonymous-fieldset-content-box">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/#propdef-rule-visibility-items">
<link rel="match" href="fieldset-content-box-rule-visibility-items-ref.html">
<meta name="assert" content="rule-visibility-items set on a fieldset should be inherited by the anonymous fieldset content box.">
<style>
fieldset {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  column-rule: 5px solid green;
  row-rule: 5px solid green;
  rule-visibility-items: between;
  width: 300px;
  margin: 0;
  border: none;
  padding: 0;
}
.item {
  height: 50px;
  background: blue;
}
</style>
<p>There should be a 3-column grid with green rules only between items below.</p>
<fieldset>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
</fieldset>

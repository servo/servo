<!DOCTYPE html>
<meta charset="utf-8">
<title>Input type changes during activation events should not crash</title>
<body>
<script>
"use strict";

const input = document.createElement("input");
input.type = "checkbox";
document.body.append(input);

input.addEventListener("input", () => {
  input.type = "text";
});

input.click();
</script>

<!DOCTYPE html>
<html class="reftest-wait">
<title>Set type attribute to what it already is</title>
<script src="/resources/testdriver.js"></script>
<script src="/resources/testdriver-vendor.js"></script>

<input id="target1" type="number">
<input id="target2" type="number">

<script>
target1.focus();
test_driver.send_keys(target1, "xyz")
  .then(() => {
    target2.focus();
    return test_driver.send_keys(target2, "1.");
  })
  .then(() => document.documentElement.classList.remove("reftest-wait"));
</script>

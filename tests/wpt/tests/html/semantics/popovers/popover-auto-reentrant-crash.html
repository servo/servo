<!DOCTYPE html>
<meta charset="utf-8">
<link rel="author" href="mailto:masonf@chromium.org">
<link rel="help" href="https://html.spec.whatwg.org/#the-popover-attribute">

<div id="p1" popover="auto">
  <div id="p3" popover="auto">P3</div>
</div>
<div id="p2" popover="hint">P2</div>

<script>
  p2.addEventListener("beforetoggle", e => {
    if (e.newState === "closed") {
      p1.popover = "manual";
    }
  });
  p1.showPopover();
  p2.showPopover();
  try { p3.showPopover(); } catch(e) {}
</script>

<!DOCTYPE html>
<html class="reftest-wait">
<head>
  <title>drawElementImage paints CSS clip-path</title>
  <link rel="help" href="https://github.com/WICG/html-in-canvas">
  <link rel="match" href="css-clip-path-on-div-ref.html">
  <meta name="assert" value="A div with a CSS clip-path paints clipped.">
  <meta name="fuzzy" content="maxDifference=0-4;totalPixels=0-128">
  <script src="/common/reftest-wait.js"></script>
  <script src="/html/canvas/resources/wait-for-canvas-paint.js"></script>
  <style>
    div {
      width: 100px;
      height: 100px;
      background: green;
      clip-path: circle(50%);
    }
  </style>
</head>
<body>
  <canvas id=canvas width="100" height="100" layoutsubtree>
    <div id="child"></div>
  </canvas>

  <script>
    onload = async () => {
      await waitForCanvasPaint(canvas);
      var context = canvas.getContext("2d");
      context.drawElementImage(child, 0, 0);
      takeScreenshot();
    };
  </script>
</body>
</html>

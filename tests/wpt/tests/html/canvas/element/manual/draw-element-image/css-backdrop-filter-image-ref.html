<!DOCTYPE html>
<style>
  #wrapper {
    width: 100px;
    height: 200px;
    background: blue;
    position: relative;
  }
  #first {
    position: absolute;
    top: 0;
    left: 0;
    width: 100px;
    height: 100px;
    background: green;
  }
  #second {
    position: absolute;
    top: 110px;
    left: 10px;
    width: 80px;
    height: 80px;
    background: green;
  }
</style>
<div id="wrapper">
  <div id="first"></div>
  <div id="second"></div>
</div>

<!DOCTYPE html>
<head>
  <title>drawElementImage paints CSS backdrop filter within bounds - ref</title>
  <link rel="author" href="mailto:schenney@chromium.org">
  <style>
    div {
      width: 100px;
      height: 100px;
      background: green;
    }
    #first {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 50px;
      height: 50px;
      background: lightgreen;
      border-radius: 25px;
    }
    #second {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 50px;
      height: 50px;
      background: transparent;
      backdrop-filter: grayscale();
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <div>
    <div id=first>
    </div>
    <div id=second ><p>Hello</p></div>
  </div>
</body>

<!DOCTYPE html>
<meta charset="utf-8">
<title>HTML Test: focusgroup - Tab escape adjacency behavior for directional input handler elements</title>
<link rel="author" title="Microsoft" href="http://www.microsoft.com/">
<link rel="help" href="https://open-ui.org/components/scoped-focusgroup.explainer/">
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<script src="/resources/testdriver.js"></script>
<script src="/resources/testdriver-vendor.js"></script>
<script src="/resources/testdriver-actions.js"></script>
<script src="/shadow-dom/focus-navigation/resources/focus-utils.js"></script>
<script src="../resources/focusgroup-utils.js"></script>

<!-- Shift+Tab from input at end goes to second-to-last item, not first -->
<div focusgroup="toolbar inline">
  <button tabindex=0 id="end_A" type="button">A</button>
  <button tabindex=0 id="end_B" type="button">B</button>
  <input id="end_input" type="text" value="text">
</div>

<!-- Shift+Tab from select in middle goes to adjacent item, not first -->
<div focusgroup="toolbar inline">
  <button tabindex=0 id="mid_A" type="button">A</button>
  <button tabindex=0 id="mid_B" type="button">B</button>
  <select id="mid_select">
    <option>12px</option>
    <option>14px</option>
  </select>
  <button tabindex=0 id="mid_C" type="button">C</button>
</div>

<!-- Tab from handler does not skip focusable opted-out content -->
<div focusgroup="toolbar inline">
  <button tabindex=0 id="fwd_A" type="button">A</button>
  <select id="fwd_select">
    <option>12px</option>
    <option>14px</option>
  </select>
  <div focusgroup="none">
    <button tabindex=0 id="fwd_optedout" type="button">Opted Out</button>
  </div>
  <button tabindex=0 id="fwd_B" type="button">B</button>
</div>

<!-- Shift+Tab from handler does not skip focusable opted-out content before it -->
<div focusgroup="toolbar inline">
  <button tabindex=0 id="back_A" type="button">A</button>
  <div focusgroup="none">
    <button tabindex=0 id="back_optedout" type="button">Opted Out</button>
  </div>
  <select id="back_select">
    <option>12px</option>
    <option>14px</option>
  </select>
  <button tabindex=0 id="back_B" type="button">B</button>
</div>

<script>
  promise_test(async t => {
    await focusAndWait(end_input);
    assert_equals(document.activeElement, end_input, "Precondition: focus starts on input");

    await navigateFocusBackward();
    assert_equals(document.activeElement, end_B,
                  "Shift+Tab from directional input handler at end should go to adjacent item (B), not first item (A)");
  }, "Shift+Tab from directional input handler at end goes to immediately previous item");

  promise_test(async t => {
    await focusAndWait(mid_select);
    assert_equals(document.activeElement, mid_select, "Precondition: focus starts on select");

    await navigateFocusBackward();
    assert_equals(document.activeElement, mid_B,
                  "Shift+Tab from directional input handler in middle should go to adjacent item (B), not first item (A)");
  }, "Shift+Tab from directional input handler in middle goes to immediately previous item");

  promise_test(async t => {
    await focusAndWait(fwd_select);
    assert_equals(document.activeElement, fwd_select, "Precondition: focus starts on select");

    await sendTabForward();
    assert_equals(document.activeElement, fwd_optedout,
                  "Tab from directional input handler should not skip focusable opted-out content");
  }, "Tab from directional input handler does not skip focusable content in opted-out subtree");

  promise_test(async t => {
    await focusAndWait(back_select);
    assert_equals(document.activeElement, back_select, "Precondition: focus starts on select");

    await navigateFocusBackward();
    assert_equals(document.activeElement, back_optedout,
                  "Shift+Tab from directional input handler should not skip focusable opted-out content");
  }, "Shift+Tab from directional input handler does not skip focusable content in opted-out subtree");
</script>

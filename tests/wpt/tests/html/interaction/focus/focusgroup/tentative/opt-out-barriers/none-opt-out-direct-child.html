<!DOCTYPE html>
<meta charset="utf-8">
<title>HTML Test: focusgroup - Direct child opt-out with none</title>
<link rel="author" title="Microsoft" href="http://www.microsoft.com/">
<link rel="help" href="https://open-ui.org/components/scoped-focusgroup.explainer/">
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<script src="/resources/testdriver.js"></script>
<script src="/resources/testdriver-vendor.js"></script>
<script src="/resources/testdriver-actions.js"></script>
<script src="/shadow-dom/focus-navigation/resources/focus-utils.js"></script>
<script src="../resources/focusgroup-utils.js"></script>

<button tabindex=0 id=before>Before</button>
<div id=toolbar focusgroup="toolbar">
  <button tabindex=0 id=first>First</button>
  <button tabindex=0 id=optedout focusgroup="none">opted out</button>
  <button tabindex=0 id=last>Last</button>
</div>
<button tabindex=0 id=after>After</button>

<script>

  promise_test(async t => {
    var before = document.getElementById("before");
    var first = document.getElementById("first");
    var optedout = document.getElementById("optedout");
    var last = document.getElementById("last");
    var after = document.getElementById("after");

    // Tab navigation should include the opted-out element in the normal tab order.
    await assert_focusgroup_tab_navigation([before, first, optedout, last, after]);
  }, "Tab navigation includes opted-out element in normal tab order");

  promise_test(async t => {
    var first = document.getElementById("first");
    var last = document.getElementById("last");

    // Directional navigation should skip the opted-out element.
    await assert_directional_navigation_bidirectional([first, last]);
  }, "Directional navigation skips opted-out element");

  promise_test(async t => {
    var optedout = document.getElementById("optedout");

    await focusAndWait(optedout);
    assert_equals(document.activeElement, optedout, "Should be able to manually focus opted-out element");

    // Directional input should not work from an opted-out element.
    await assert_directional_input_does_not_move_focus(optedout);
  }, "Directional input does not work from opted-out element");

</script>

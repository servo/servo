<!DOCTYPE html>
<meta charset="utf-8">
<title>Zoom property on elements with a transformation matrix and animation used</title>
<link rel="author" href="mailto:salipov@mozilla.com" title="Seva Alipov">
<link rel="author" href="https://mozilla.com" title="Mozilla">
<link rel="help" href="https://bugzilla.mozilla.org/show_bug.cgi?id=1927186">
<link rel="match" href="matrix-zoom-anim-ref.html">

<style>
.container {
  width: 200px;
  height: 200px;
  border: 1px solid;
}

@keyframes kf {
  from { transform: matrix(1, 0, 0, 1, 50, 50); }
  to { transform: matrix(1, 0, 0, 1, 0, 0); }
}

#foo {
  width: 50px;
  height: 50px;
  background: purple;
  animation: kf 99999s steps(5) infinite alternate;
}
</style>

<div class="container">
  <div style="zoom: 2">
    <div id="foo"></div>
  </div>
</div>

<!DOCTYPE html>
<title>border-radius:inherit applies zoom</title>
<link rel=help href=https://drafts.csswg.org/css-viewport/>
<link rel=match href=border-radius-ref.html>
<style>
  .zoomed {
    background: coral;
    width: 100px;
    height: 100px;
    border: 5px solid black;
    border-radius: inherit;
    zoom: 2;
  }
</style>
<div style="border-radius:20px; display:contents">
  <div class=zoomed></div>
</div>

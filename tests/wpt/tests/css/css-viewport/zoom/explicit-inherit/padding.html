<!DOCTYPE html>
<title>padding:inherit applies zoom</title>
<link rel="help" href="https://drafts.csswg.org/css-viewport/">
<link rel="match" href="padding-ref.html">
<style>
  .parent {
    background: coral;
    width: 50px;
    height: 50px;
    padding: inherit;
    zoom: 2;
  }
  .inner {
    background: green;
    width: 100%;
    height: 100%;
  }
</style>
<div style="padding:10px; display:contents">
  <div class=parent>
    <div class=inner></div>
  </div>
</div>

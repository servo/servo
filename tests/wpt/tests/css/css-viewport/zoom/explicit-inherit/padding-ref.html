<!DOCTYPE html>
<title>padding:inherit applies zoom (ref)</title>
<link rel="help" href="https://drafts.csswg.org/css-viewport/">
<style>
  .parent {
    background: coral;
    width: 100px;
    height: 100px;
    padding: 20px;
  }
  .inner {
    background: green;
    width: 100%;
    height: 100%;
  }
</style>
<div class=parent>
  <div class=inner></div>
</div>

<!DOCTYPE html>
<title>
    CSS Gap Decorations: Multicolumn gap decorations with non-default writing-mode values.
</title>
<link rel="help" href="https://www.w3.org/TR/css-gaps-1/#gap-decorations">
<link rel="match" href="multicol-gap-decorations-writing-mode-ref.html">
<link rel="author" title="Kevin Babbitt" href="mailto:kbabbitt@microsoft.com">
<style>
    body {
        margin: 0px;
    }
    .multicol {
        column-count: 3;
        column-width: 50px;
        column-height: 50px;
        column-gap: 10px;
        row-gap: 10px;
        column-rule: 10px solid blue;
        row-rule: 10px solid red;
        column-wrap: wrap;
        width: 110px;
        height: 170px;
        margin-bottom: 20px;
    }
    .item {
        background: lightgray;
        width: 50px;
        height: 50px;
    }
    .item:first-child {
        background: salmon;
    }
</style>
<div class="multicol" style="writing-mode: vertical-rl;">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
<div class="multicol" style="writing-mode: vertical-lr;">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
<div class="multicol" style="writing-mode: sideways-rl;">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
<div class="multicol" style="writing-mode: sideways-lr;">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>

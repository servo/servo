<!DOCTYPE html>
<title>
    CSS Gap Decorations: Flex gaps are painted in case where row gap is created by
    content distribution between lines due to align-content: stretch (where items
    don't fill the whole line due to the specified height) and a row gap value.
</title>
<link rel="help" href="https://www.w3.org/TR/css-gaps-1/">
<link rel="match" href="flex-gap-decorations-046-ref.html">
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<style>
    body {
        margin: 0px;
    }

    #flexbox {
        width: 140px;
        background-color: #fff;
        display: flex;
        flex-wrap: wrap;
        row-rule: 5px solid gold;
        height: 180px;
        row-gap: 5px;
    }

    .item {
        width: 70px;
        height: 50px;
        background-color: #007bff;
        color: white;
        display: flex;
    }
</style>
<div id="flexbox">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>

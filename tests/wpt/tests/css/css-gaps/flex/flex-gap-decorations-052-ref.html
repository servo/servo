<style>
    body {
        margin: 0px;
    }
    #flexbox {
        width: 340px;
        border: 2px solid #333;

    .item {
        width: 70px;

    .rule {

        top: 2px;

        width: 0px;

    }
    .row-rule {
        position: absolute;
        display: inline;
        height: 0px;
        border-bottom: 5px solid red;
        top: 54.5px;

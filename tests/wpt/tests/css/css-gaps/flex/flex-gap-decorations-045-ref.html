<style>
    body {
        margin: 0px;
    }

    #flexbox {
        height: 400px;
        border: 2px solid #333;
        background-color: #fff;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: space-between;
        width: 120px;
        column-gap: 5px;
    }

    .item {
        width: 50px;
        height: 70px;
        background-color: #007bff;
        color: white;
        display: flex;
    }

    .row-rule {
        position: absolute;
        height: 5px;
        background: gold;
        width: 57.5px;
    }

    .col-rule {
        position: absolute;
        width: 5px;
        height: 400px;
        background: red;
    }
</style>

<style>
  body {
    margin: 0;
  }
  .multicol {
    column-count: 5;
    width: 600px;
    column-gap: 1px;
    height: 101px;
  }
  #flex {
    display: flex;
    flex-direction: column;
    flex-wrap: wrap;
    height: 500px;
    border: 1px solid black;
    column-gap: 3px;
    row-gap: 3px;
  }

  #flex > div {
    background: lightblue;
  }

  .row-decoration {
    background: gold;
    position: absolute;
  }

  .column-decoration {
    background: green;
    position: absolute;
  }
</style>

<div class="column-decoration" style="height: 98.5px; width: 3px; top: 0px; left: 539px;"></div>

<div class="row-decoration" style="width: 57px; height: 3px; top: 0.5px; left: 121px;"></div>

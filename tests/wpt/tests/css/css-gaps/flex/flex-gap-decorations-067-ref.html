<!DOCTYPE html>

<style>
  body {
    margin-left: 100px;
    margin-top: 100px;
  }

  .flex-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    width: 320px;
  }

  .item {
    width: 100px;
    height: 100px;
    background: gray;
    opacity: 0.5;
  }

  .row-gap {
    position: absolute;
    width: 520px;
    height: 0px;
    border-bottom: solid 5px red;
    left: 0px;
  }

  .row-gap1 {
    top: 202.5px;
  }

  .row-gap2 {
    top: 312.5px;
  }

  .col-gap {
    position: absolute;
    top: 0px;
    width: 0px;
    height: 520px;
    border-left: solid 5px blue;
  }

  .col-gap1 {
    left: 202.5px;
  }

  .col-gap2 {
    left: 312.5px;
  }
</style>
<div class="flex-container">
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
</div>

<div class="col-gap col-gap1"> </div>
<div class="col-gap col-gap2"> </div>

<div class="row-gap row-gap1"> </div>
<div class="row-gap row-gap2"> </div>

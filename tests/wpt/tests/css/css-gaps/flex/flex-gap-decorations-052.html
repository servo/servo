<!DOCTYPE html>
<title>
    CSS Gap Decorations: Gap decorations are painted properly in flexbox with different
    sized gaps per line due to content distribution. Tests scenario where cross gaps
    in adjacent lines overlap.
</title>
<link rel="help" href="https://www.w3.org/TR/css-gaps-1/">
<link rel="match" href="flex-gap-decorations-052-ref.html">
<link rel="author" title="Sam Davis Omekara Jr." href="mailto:samomekarajr@microsoft.com">
<style>
    body {
        margin: 0px;
    }
    #flexbox {
        width: 340px;
        border: 2px solid #333;
        background-color: #fff;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
        row-gap: 10px;
        column-rule: 5px solid gold;
        row-rule: 5px red solid;
        row-rule-break: intersection;
    }
    .item {
        width: 70px;
        height: 50px;
        background-color: #007bff;
        color: white;
        display: flex;
    }

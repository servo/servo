<!DOCTYPE html>
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="author" title="Sam Davis Omekara Jr." href="mailto:samomekarajr@microsoft.com">
<style>
  body {
    margin: 0px;
  }
  .container {
    display: grid;
    grid-template: repeat(3, 100px) / repeat(4, 100px);
    gap: 20px;
  }
  .col-rule {
    height: 100px;
    width: 0px;
    position: absolute;
    left: 107px;
    top: 120px;
    border-right: 6px solid rgba(128 0 0 / 0.5);
  }
  .row-rule {
    height: 0px;
    width: 126px;
    position: absolute;
    left: 227px;
    top: 227px;
    border-bottom: 6px solid rgba(0 0 128 / 0.5);
  }
  .item {
    background: rgba(192 192 192 / 0.75);
  }
</style>
<div class="container between join">
  <div class="item" style="grid-area: 1/1/3/2"></div>
  <div class="item" style="grid-area: 1/4/3/5"></div>
  <div class="item" style="grid-area: 2/2/3/3"></div>
  <div class="item" style="grid-area: 2/3/3/4"></div>
  <div class="item" style="grid-area: 3/3/4/4"></div>
</div>


<div class="col-rule"></div>
<div class="col-rule" style="left: 227px; height: 113px;"></div>
<div class="col-rule" style="left: 347px; height: 113px;"></div>

<div class="row-rule"> </div>

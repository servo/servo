<!DOCTYPE html>
<title>
  CSS Gap Decorations: grid gap decorations extend to meet cross-direction
  decoration width at far edge with rule-inset: overlap-join.
</title>
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="match" href="grid-gap-decorations-068-ref.html">
<link rel="author" title="Sam Davis Omekara Jr." href="mailto:samomekarajr@microsoft.com">
<style>
  body {
    margin: 0px;
  }
  .container {
    display: grid;
    grid-template: repeat(3, 50px) / repeat(3, 50px);
    gap: 20px;
    rule-visibility-items: around;
    rule: 10px solid;
    column-rule-color: rgba(0, 0, 255, 0.5);
    row-rule-color: rgba(255, 0, 0, 0.5);
    padding: 0px;
    rule-inset: overlap-join;
  }
  .item {
    background: lightgray;
  }
</style>

<div class="container">
  <div class="item"></div>
  <div class="item"></div>
  <div class="item" style="grid-area: 2 / 1"></div>
  <div class="item" style="grid-area: 2 / 2"></div>
</div>

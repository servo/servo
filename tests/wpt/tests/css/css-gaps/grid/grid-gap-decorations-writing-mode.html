<!DOCTYPE html>
<title>
    CSS Gap Decorations: Grid gap decorations with non-default writing-mode values.
</title>
<link rel="help" href="https://www.w3.org/TR/css-gaps-1/#gap-decorations">
<link rel="match" href="grid-gap-decorations-writing-mode-ref.html">
<link rel="author" title="Kevin Babbitt" href="mailto:kbabbitt@microsoft.com">
<style>
    body {
        margin: 0px;
    }
    .grid {
        display: grid;
        grid-template: repeat(2, 50px) / repeat(3, 50px);
        column-gap: 10px;
        row-gap: 10px;
        column-rule: 10px solid blue;
        row-rule: 10px solid red;
        width: 110px;
        height: 170px;
        margin-bottom: 20px;
    }
    .item {
        background: lightgray;
    }
    .item:first-child {
        background: salmon;
    }
</style>
<div class="grid" style="writing-mode: vertical-rl;">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
<div class="grid" style="writing-mode: vertical-lr;">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
<div class="grid" style="writing-mode: sideways-rl;">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
<div class="grid" style="writing-mode: sideways-lr;">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>

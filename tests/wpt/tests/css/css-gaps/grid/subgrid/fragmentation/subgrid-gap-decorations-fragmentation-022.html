<!DOCTYPE html>
<title>
  CSS Gap Decorations: in a fragmented subgrid, row gaps suppressed due to
  fragmentation still consume a value from the rule pattern.
</title>
<link rel="help" href="https://github.com/w3c/csswg-drafts/issues/11520">
<link rel="match" href="subgrid-gap-decorations-fragmentation-022-ref.html">
<link rel="author" title="Sam Davis Omekara Jr." href="mailto:samomekarajr@microsoft.com">
<style>
  body {
    margin: 0px;
  }
  .multi-col {
    height: 100px;
    width: 320px;
    columns: 3;
    column-fill: auto;
    column-gap: 10px;
    background: lightgray;
  }
  .grid-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: 90px repeat(3, 50px);
    column-gap: 10px;
    row-gap: 20px;
  }
  .subgrid {
    display: grid;
    grid-template-columns: subgrid;
    grid-template-rows: subgrid;
    grid-column: 1 / -1;
    grid-row: 1 / -1;
    row-rule: solid 10px;
    row-rule-color: red, repeat(auto, green), yellow;
    column-rule: solid 6px blue;
  }
  .subgrid>div {
    background-color: skyblue;
  }
</style>
<div class="multi-col">
  <div class="grid-container">
    <div class="subgrid">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>
</div>

<!DOCTYPE html>
<link rel="help" href="https://www.w3.org/TR/css-gaps-1/">
<link rel="author" title="Kurt Catti-Schmidt" href="mailto:kschmi@microsoft.com">
<style>
  body {
    margin: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: 100px 100px 100px;
    /* Two explicit row tracks. This produces the same rendered geometry
       as the test's `repeat(auto-fit, 100px) 100px 100px` after the
       leading auto-fit tracks collapse. */
    grid-template-rows: 100px 100px;
    gap: 10px;
    width: 320px;
    height: 430px;
    align-content: start;

    row-rule: 6px solid red;
    row-rule-visibility-items: around;
    rule-inset: 0px;
  }

  .item {
    width: 100%;
    height: 100%;
    background: lightgray;
    opacity: 0.8;
  }
</style>
<div class="grid">
  <!-- Item placed in the trailing row. The single row gap that precedes
       it has at least one occupied side, so the row rule must paint
       under `row-rule-visibility-items: around`. -->
  <div class="item" style="grid-column: 1 / 4; grid-row: 2 / 3"></div>
</div>

<!DOCTYPE html>
<title>
  CSS Gap Decorations: positive cap inset at dangling endpoints with
  overlap-join at interior intersections. Donut grid layout with
  rule-visibility-items: between.
</title>
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="match" href="grid-gap-decorations-080-ref.html">
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<style>
body {
  margin: 0;
}
.container {
  display: grid;
  grid-template: repeat(4, 100px) / repeat(4, 100px);
  gap: 20px;
  rule: 6px solid;
  column-rule-color: rgba(128 0 0 / 0.5);
  row-rule-color: rgba(0 0 128 / 0.5);
  padding: 10px;
  rule-visibility-items: between;
  rule-inset-junction: overlap-join;
  rule-inset-cap: 5px;
}
.item {
  background: rgba(192 192 192 / 0.75);
}
</style>
<div class="container">
  <div class="item" style="grid-area: 1/1/4/2">L</div>
  <div class="item" style="grid-area: 1/4/4/5">R</div>
  <div class="item" style="grid-area: 1/2/2/3">A</div>
  <div class="item" style="grid-area: 1/3/2/4">B</div>
  <div class="item" style="grid-area: 3/2/4/3">C</div>
  <div class="item" style="grid-area: 3/3/4/4">D</div>
  <div class="item" style="grid-area: 4/2/5/3">E</div>
</div>

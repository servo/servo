<title>
  CSS Gap Decorations: grid gap decorations paint past container edges
  with `rule-break: intersection` and negative row/column
  `rule-inset-junction-start/end` combined with negative
  `rule-inset-cap-start/end` (ink overflow).
</title>
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="match" href="grid-gap-decorations-092-ref.html">
<link rel="author" title="Sam Davis Omekara Jr." href="mailto:samomekarajr@microsoft.com">
<style>
  body {
    margin-left: 100px;
    margin-top: 100px;
  }

  .grid-container {
    display: grid;
    grid-gap: 10px;
    grid-template-columns: 100px 100px 100px;
    grid-template-rows: 100px 100px 100px;
    width: 320px;
    height: 320px;

    column-rule-color: blue;
    column-rule-style: solid;
    column-rule-width: 5px;

    row-rule-color: red;
    row-rule-style: solid;
    row-rule-width: 5px;
    rule-break: intersection;

    row-rule-inset-junction-start: -210px;
    row-rule-inset-cap-start: -50px;

    row-rule-inset-junction-end: -210px;
    row-rule-inset-cap-end: -50px;

    column-rule-inset-junction-start: -210px;
    column-rule-inset-cap-start: -50px;

    column-rule-inset-junction-end: -210px;
    column-rule-inset-cap-end: -50px;
  }

  .item {
    background: gray;
    opacity: 0.5;
  }
</style>

<body>
  <div class="grid-container">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
  </div>
</body>

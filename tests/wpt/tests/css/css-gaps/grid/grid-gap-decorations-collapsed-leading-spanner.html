<!DOCTYPE html>
<title>
  CSS Gap Decorations: Row rule is correctly blocked by a spanning item
  when leading `repeat(auto-fit, ...)` rows collapse.
</title>
<link rel="help" href="https://www.w3.org/TR/css-gaps-1/">
<link rel="match" href="grid-gap-decorations-collapsed-leading-spanner-ref.html">
<link rel="author" title="Kurt Catti-Schmidt" href="mailto:kschmi@microsoft.com">
<style>
  body {
    margin: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: 100px 100px 100px;
    grid-template-rows: repeat(auto-fit, 100px) 100px 100px 100px;
    gap: 10px;
    width: 320px;
    height: 540px;
    align-content: start;

    row-rule: 6px solid red;
    rule-inset: 0px;
  }

  .item {
    width: 100%;
    height: 100%;
    background: lightgray;
    opacity: 0.8;
  }
</style>
<div class="grid">
  <div class="item" style="grid-column: 1; grid-row: -4 / -2"></div>
  <div class="item" style="grid-column: 2; grid-row: -4 / -3"></div>
  <div class="item" style="grid-column: 2; grid-row: -3 / -2"></div>
  <div class="item" style="grid-column: 2; grid-row: -2 / -1"></div>
  <div class="item" style="grid-column: 3; grid-row: -3 / -1"></div>
</div>

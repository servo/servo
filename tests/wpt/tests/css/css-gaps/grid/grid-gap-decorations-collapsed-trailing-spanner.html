<!DOCTYPE html>
<title>
  CSS Gap Decorations: Row rule is correctly blocked by a spanning item
  when trailing `repeat(auto-fit, ...)` rows collapse.
</title>
<link rel="help" href="https://www.w3.org/TR/css-gaps-1/">
<link rel="match" href="grid-gap-decorations-collapsed-trailing-spanner-ref.html">
<link rel="author" title="Kurt Catti-Schmidt" href="mailto:kschmi@microsoft.com">
<style>
  body {
    margin: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: 100px 100px 100px;
    grid-template-rows: 100px 100px 100px repeat(auto-fit, 100px);
    gap: 10px;
    width: 320px;
    height: 540px;
    align-content: start;

    row-rule: 6px solid red;
    rule-inset: 0px;
  }

  .item {
    width: 100%;
    height: 100%;
    background: lightgray;
    opacity: 0.8;
  }
</style>
<div class="grid">
  <div class="item" style="grid-column: 1; grid-row: 1 / 3"></div>
  <div class="item" style="grid-column: 2; grid-row: 1 / 2"></div>
  <div class="item" style="grid-column: 2; grid-row: 2 / 3"></div>
  <div class="item" style="grid-column: 2; grid-row: 3 / 4"></div>
  <div class="item" style="grid-column: 3; grid-row: 2 / 4"></div>
</div>

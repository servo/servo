<!DOCTYPE html>
<title>
  CSS Gap Decorations: column gap decorations are painted on a single-row
  subgrid nested three levels deep inside a multi-column container.
</title>
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="match" href="grid-gap-decorations-fragmentation-037-ref.html">
<link rel="author" title="Sam Davis Omekara Jr." href="mailto:samomekarajr@microsoft.com">
<style>
  body {
    margin: 0px;
  }
  .multi-col {
    columns: 1;
    column-fill: auto;
    height: 60px;
    width: 230px;
    background: lightgray;
  }
  .grid-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: 50px;
    width: 230px;
    column-gap: 10px;
  }
  .subgrid {
    display: grid;
    grid-template-columns: subgrid;
    grid-template-rows: subgrid;
    grid-column: 1 / -1;
    grid-row: 1 / -1;
  }
  .inner-subgrid {
    column-rule: 2px solid black;
  }
  .grid-item {
    background: skyblue;
  }
</style>
<div class="multi-col">
  <div class="grid-container">
    <div class="subgrid">
      <div class="subgrid inner-subgrid">
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
      </div>
    </div>
  </div>
</div>

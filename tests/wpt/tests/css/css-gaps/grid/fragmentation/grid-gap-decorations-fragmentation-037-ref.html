<!DOCTYPE html>
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="author" title="Sam Davis Omekara Jr." href="mailto:samomekarajr@microsoft.com">
<style>
  body {
    margin: 0px;
  }
  .multi-col {
    position: relative;
    columns: 1;
    column-fill: auto;
    height: 60px;
    width: 230px;
    background: lightgray;
  }
  .grid-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: 50px;
    width: 230px;
    column-gap: 10px;
  }
  .grid-item {
    background: skyblue;
  }
  .col-rule {
    position: absolute;
    background: black;
    width: 2px;
    height: 50px;
    top: 0px;
  }
</style>
<div class="multi-col">
  <div class="grid-container">
    <div class="grid-item"></div>
    <div class="grid-item"></div>
    <div class="grid-item"></div>
    <div class="grid-item"></div>
  </div>
  <div class="col-rule" style="left: 54px;"></div>
  <div class="col-rule" style="left: 114px;"></div>
  <div class="col-rule" style="left: 174px;"></div>
</div>

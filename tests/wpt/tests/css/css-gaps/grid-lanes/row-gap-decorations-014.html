<!DOCTYPE html>
<title>CSS Gap Decorations: row and column rules with justify-content shifting the stacking axis in grid-lanes</title>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<link rel="match" href="row-gap-decorations-014-ref.html">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-rows: repeat(2, 60px);
    gap: 10px;
    justify-content: center;
    width: 220px;
    height: max-content;
    background: #cdd5e0;
    column-rule: 4px solid blue;
    row-rule: 4px solid gold;
  }
  .lanes > div {
    width: 40px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
</style>
<div class="lanes">
  <div>1</div>
  <div>2</div>
  <div>3</div>
  <div>4</div>
  <div>5</div>
  <div>6</div>
</div>

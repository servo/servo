<!DOCTYPE html>
<title>CSS Gap Decorations: column and row rules with reverse fill direction in grid-lanes</title>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<link rel="match" href="column-gap-decorations-011-ref.html">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-columns: repeat(3, 86px);
    grid-lanes-direction: column fill-reverse;
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
    column-rule: 4px solid blue;
    row-rule: 4px solid gold;
  }
  .lanes > div {
    height: 44px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.h2 { height: 72px; }
  .lanes > div.h3 { height: 58px; }
  .lanes > div.h4 { height: 90px; }
</style>
<div class="lanes">
  <div class="h2">1</div>
  <div class="h3">2</div>
  <div>3</div>
  <div class="h4">4</div>
  <div>5</div>
  <div class="h2">6</div>
  <div>7</div>
  <div class="h3">8</div>
</div>

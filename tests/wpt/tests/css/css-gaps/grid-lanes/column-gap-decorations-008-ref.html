<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-columns: 140px;
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    height: 40px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.h2 { height: 60px; }
  .lanes > div.h3 { height: 30px; }
  .row-rule { position: absolute; height: 0; border-top: 4px solid gold; }
</style>
<div class="lanes">
  <div class="h2">1</div>
  <div>2</div>
  <div class="h3">3</div>
  <div class="h2">4</div>
  <div>5</div>
</div>
<div class="row-rule" style="top: 63px; left: 0; width: 140px;"></div>
<div class="row-rule" style="top: 113px; left: 0; width: 140px;"></div>
<div class="row-rule" style="top: 153px; left: 0; width: 140px;"></div>
<div class="row-rule" style="top: 223px; left: 0; width: 140px;"></div>

<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-rows: 140px;
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    width: 40px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.w2 { width: 60px; }
  .lanes > div.w3 { width: 30px; }
  .col-rule { position: absolute; width: 0; border-left: 4px solid blue; }
</style>
<div class="lanes">
  <div class="w2">1</div>
  <div>2</div>
  <div class="w3">3</div>
  <div class="w2">4</div>
  <div>5</div>
</div>
<div class="col-rule" style="left: 63px; top: 0; height: 140px;"></div>
<div class="col-rule" style="left: 113px; top: 0; height: 140px;"></div>
<div class="col-rule" style="left: 153px; top: 0; height: 140px;"></div>
<div class="col-rule" style="left: 223px; top: 0; height: 140px;"></div>

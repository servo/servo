<!DOCTYPE html>
<title>CSS Gap Decorations: column and row rules with a densely packed spanner in grid-lanes</title>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<link rel="match" href="column-gap-decorations-028-ref.html">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-columns: repeat(3, 60px);
    grid-lanes-pack: dense;
    flow-tolerance: 0;
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
    column-rule: 4px solid blue;
    row-rule: 4px solid gold;
  }
  .lanes > div {
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.tall { height: 100px; }
  .lanes > div.last-track { grid-column: 3; height: 40px; }
  .lanes > div.full-span { grid-column: 1 / -1; height: 40px; }
  .lanes > div.dense-spanner {
    grid-column: span 2;
    height: 20px;
    background: #8a6df0;
  }
</style>
<div class="lanes">
  <div class="tall">1</div>
  <div class="last-track">2</div>
  <div class="full-span">3 (span 3)</div>
  <div class="dense-spanner">4 (dense span 2)</div>
</div>

<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-rows: repeat(3, 86px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
    text-align: center;
  }
  .lanes > div.hi { background: #1f9d6b; }
  .lanes > div.i1 { width: 150px; }
  .lanes > div.i2 { width: 90px; }
  .lanes > div.i3 { width: 75px; }
  .lanes > div.i4 { grid-row: 1 / -1; width: 100px; }
  .lanes > div.i5 { grid-row: 1 / -1; width: 90px; }
  .col-rule { position: absolute; width: 0; border-left: 4px solid blue; }
  .row-rule { position: absolute; height: 0; border-top: 4px solid gold; }
</style>
<div class="lanes">
  <div class="i1">1</div>
  <div class="i2">2</div>
  <div class="i3">3</div>
  <div class="i4 hi">4 (span 3)</div>
  <div class="i5 hi">5 (span 3)</div>
</div>
<div class="col-rule" style="left: 153px; top: 0; height: 278px;"></div>
<div class="col-rule" style="left: 263px; top: 0; height: 278px;"></div>
<div class="row-rule" style="top: 89px; left: 0; width: 150px;"></div>
<div class="row-rule" style="top: 185px; left: 0; width: 150px;"></div>

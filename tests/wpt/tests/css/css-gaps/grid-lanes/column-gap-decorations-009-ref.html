<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-columns: repeat(3, 86px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    height: 40px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.a { height: 60px; }
  .lanes > div.b { height: 90px; }
  .lanes > div.c { height: 120px; }
  .lanes > div.f { height: 34px; }
  .col-rule { position: absolute; width: 0; border-left: 4px solid blue; }
  .row-rule { position: absolute; height: 0; border-top: 4px solid gold; }
</style>
<div class="lanes">
  <div class="a">1</div>
  <div class="b">2</div>
  <div class="c">3</div>
  <div class="f">4</div>
  <div class="f">5</div>
  <div class="f">6</div>
</div>
<div class="col-rule" style="left: 89px; top: 0; height: 164px;"></div>
<div class="col-rule" style="left: 185px; top: 0; height: 164px;"></div>
<div class="row-rule" style="top: 63px; left: 0; width: 86px;"></div>
<div class="row-rule" style="top: 93px; left: 96px; width: 86px;"></div>
<div class="row-rule" style="top: 123px; left: 192px; width: 86px;"></div>

<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-rows: repeat(4, 64px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    width: 48px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.alt { background: #8a6df0; }
  .row1 { grid-row: 1; }
  .row2 { grid-row: 2; }
  .row4 { grid-row: 4; }
  .col-rule { position: absolute; width: 0; border-left: 4px solid blue; }
  .row-rule { position: absolute; height: 0; border-top: 4px solid gold; }
</style>
<div class="lanes">
  <div class="row1">1</div>
  <div class="row2 alt">2</div>
  <div class="row4">3</div>
  <div class="row1">4</div>
  <div class="row2 alt">5</div>
  <div class="row4">6</div>
</div>
<div class="col-rule" style="left: 51px; top: 0; height: 64px;"></div>
<div class="col-rule" style="left: 51px; top: 74px; height: 64px;"></div>
<div class="col-rule" style="left: 51px; top: 222px; height: 64px;"></div>
<div class="row-rule" style="top: 67px; left: 0; width: 106px;"></div>
<div class="row-rule" style="top: 141px; left: 0; width: 106px;"></div>
<div class="row-rule" style="top: 215px; left: 0; width: 106px;"></div>

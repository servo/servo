<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-columns: repeat(3, 86px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    height: 50px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .col-rule { position: absolute; width: 0; border-left: 4px solid blue; }
  .row-rule { position: absolute; height: 0; border-top: 4px solid gold; }
</style>
<div class="lanes">
  <div>1</div>
  <div>2</div>
  <div>3</div>
  <div>4</div>
  <div>5</div>
  <div>6</div>
  <div>7</div>
  <div>8</div>
  <div>9</div>
</div>
<div class="col-rule" style="left: 89px; top: 0; height: 170px;"></div>
<div class="col-rule" style="left: 185px; top: 0; height: 170px;"></div>
<div class="row-rule" style="top: 53px; left: 0; width: 86px;"></div>
<div class="row-rule" style="top: 113px; left: 0; width: 86px;"></div>
<div class="row-rule" style="top: 53px; left: 96px; width: 86px;"></div>
<div class="row-rule" style="top: 113px; left: 96px; width: 86px;"></div>
<div class="row-rule" style="top: 53px; left: 192px; width: 86px;"></div>
<div class="row-rule" style="top: 113px; left: 192px; width: 86px;"></div>

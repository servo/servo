<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-rows: repeat(3, 86px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    width: 76px;
    height: 86px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.hi { background: #1f9d6b; }
  .lanes > div.short { height: 50px; }
  .lanes > div.w2 { width: 104px; }
  .lanes > div.w3 { width: 60px; }
  .lanes > div.as-center { align-self: center; }
  .lanes > div.as-end { align-self: end; }
  .row-rule { position: absolute; height: 0; border-top: 4px solid gold; }
  .col-rule { position: absolute; width: 0; border-left: 4px solid blue; }
</style>
<div class="lanes">
  <div class="w3">1</div>
  <div>2</div>
  <div class="short as-center hi">3</div>
  <div>4</div>
  <div class="w2">5</div>
  <div class="short as-end hi">6</div>
  <div class="w3">7</div>
  <div>8</div>
</div>
<div class="col-rule" style="left: 63px; top: 0; height: 86px;"></div>
<div class="col-rule" style="left: 149px; top: 0; height: 86px;"></div>
<div class="col-rule" style="left: 79px; top: 96px; height: 86px;"></div>
<div class="col-rule" style="left: 165px; top: 192px; height: 86px;"></div>
<div class="col-rule" style="left: 79px; top: 192px; height: 86px;"></div>
<div class="row-rule" style="top: 89px; left: 0; width: 248px;"></div>
<div class="row-rule" style="top: 185px; left: 0; width: 248px;"></div>

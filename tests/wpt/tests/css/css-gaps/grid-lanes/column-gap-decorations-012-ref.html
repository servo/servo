<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-columns: 56px 128px 84px;
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    height: 44px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.h2 { height: 66px; }
  .lanes > div.h3 { height: 52px; }
  .lanes > div.h4 { height: 80px; }
  .col-rule { position: absolute; width: 0; border-left: 4px solid blue; }
  .row-rule { position: absolute; height: 0; border-top: 4px solid gold; }
</style>
<div class="lanes">
  <div class="h2">1</div>
  <div class="h3">2</div>
  <div>3</div>
  <div class="h4">4</div>
  <div>5</div>
  <div class="h2">6</div>
  <div>7</div>
</div>
<div class="col-rule" style="left: 59px; top: 0; height: 152px;"></div>
<div class="col-rule" style="left: 197px; top: 0; height: 152px;"></div>
<div class="row-rule" style="top: 69px; left: 0; width: 56px;"></div>
<div class="row-rule" style="top: 55px; left: 66px; width: 128px;"></div>
<div class="row-rule" style="top: 47px; left: 204px; width: 84px;"></div>
<div class="row-rule" style="top: 101px; left: 204px; width: 84px;"></div>

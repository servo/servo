<!DOCTYPE html>
<title>CSS Gap Decorations: column and row rules with a ragged block-end edge in grid-lanes</title>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<link rel="match" href="column-gap-decorations-009-ref.html">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-columns: repeat(3, 86px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
    column-rule: 4px solid blue;
    row-rule: 4px solid gold;
  }
  .lanes > div {
    height: 40px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.a { height: 60px; }
  .lanes > div.b { height: 90px; }
  .lanes > div.c { height: 120px; }
  .lanes > div.f { height: 34px; }
</style>
<div class="lanes">
  <div class="a">1</div>
  <div class="b">2</div>
  <div class="c">3</div>
  <div class="f">4</div>
  <div class="f">5</div>
  <div class="f">6</div>
</div>

<!DOCTYPE html>
<title>CSS Gap Decorations: grid-axis column rules broken by spanners in a grid-lanes (no row rules)</title>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<link rel="match" href="column-gap-decorations-002-ref.html">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-columns: repeat(3, 86px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
    column-rule: 4px solid blue;
  }
  .lanes > div {
    height: 48px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.alt { background: #8a6df0; }
  .lanes > div.h60 { height: 60px; }
  .lanes > div.h90 { height: 90px; }
  .lanes > div.span2a { grid-column: 1 / span 2; height: 56px; }
  .lanes > div.span2b { grid-column: 2 / span 2; height: 56px; }
</style>
<div class="lanes">
  <div class="span2a alt">1 (span 2)</div>
  <div class="h90">2</div>
  <div class="span2b alt">3 (span 2)</div>
  <div class="h60">4</div>
  <div>5</div>
  <div>6</div>
  <div>7</div>
</div>

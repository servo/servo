<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-columns: repeat(4, 62px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    height: 44px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.alt { background: #8a6df0; }
  .sp { grid-column: 2 / span 2; height: 44px; }
  .col-rule { position: absolute; width: 0; border-left: 4px solid blue; }
  .row-rule { position: absolute; height: 0; border-top: 4px solid gold; }
</style>
<div class="lanes">
  <div class="sp alt">1 (span 2)</div>
  <div>2</div>
  <div>3</div>
  <div class="sp alt">4 (span 2)</div>
  <div>5</div>
  <div>6</div>
  <div>7</div>
  <div class="sp alt">8 (span 2)</div>
</div>
<div class="col-rule" style="left: 65px; top: 0; height: 206px;"></div>
<div class="col-rule" style="left: 137px; top: 108px; height: 44px;"></div>
<div class="col-rule" style="left: 209px; top: 0; height: 206px;"></div>
<div class="row-rule" style="top: 47px; left: 0; width: 62px;"></div>
<div class="row-rule" style="top: 47px; left: 72px; width: 134px;"></div>
<div class="row-rule" style="top: 101px; left: 72px; width: 134px;"></div>
<div class="row-rule" style="top: 155px; left: 72px; width: 134px;"></div>
<div class="row-rule" style="top: 47px; left: 216px; width: 62px;"></div>

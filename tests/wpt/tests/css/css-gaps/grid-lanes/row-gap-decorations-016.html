<!DOCTYPE html>
<title>CSS Gap Decorations: column and row rules with reverse track direction in grid-lanes (row direction)</title>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<link rel="match" href="row-gap-decorations-016-ref.html">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-rows: repeat(3, 86px);
    grid-lanes-direction: row track-reverse;
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
    column-rule: 4px solid blue;
    row-rule: 4px solid gold;
  }
  .lanes > div {
    width: 44px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.w2 { width: 72px; }
  .lanes > div.w3 { width: 58px; }
  .lanes > div.w4 { width: 92px; }
  .lanes > div.w5 { width: 50px; }
  .lanes > div.w6 { width: 66px; }
</style>
<div class="lanes">
  <div class="w2">1</div>
  <div class="w3">2</div>
  <div>3</div>
  <div class="w4">4</div>
  <div class="w5">5</div>
  <div class="w6">6</div>
  <div>7</div>
  <div class="w3">8</div>
</div>

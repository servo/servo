<!DOCTYPE html>
<title>CSS Gap Decorations: grid-axis row rules broken by spanners in a grid-lanes (no column rules)</title>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<link rel="match" href="row-gap-decorations-008-ref.html">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-rows: repeat(3, 86px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
    row-rule: 4px solid gold;
  }
  .lanes > div {
    width: 48px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.alt { background: #8a6df0; }
  .lanes > div.w60 { width: 60px; }
  .lanes > div.w90 { width: 90px; }
  .lanes > div.span2a { grid-row: 1 / span 2; width: 56px; }
  .lanes > div.span2b { grid-row: 2 / span 2; width: 56px; }
</style>
<div class="lanes">
  <div class="span2a alt">1 (span 2)</div>
  <div class="w90">2</div>
  <div class="span2b alt">3 (span 2)</div>
  <div class="w60">4</div>
  <div>5</div>
  <div>6</div>
  <div>7</div>
</div>

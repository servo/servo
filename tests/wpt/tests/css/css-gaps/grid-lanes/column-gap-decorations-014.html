<!DOCTYPE html>
<title>CSS Gap Decorations: column and row rules with three spanners on one interior gap in grid-lanes</title>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<link rel="match" href="column-gap-decorations-014-ref.html">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-columns: repeat(4, 62px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
    column-rule: 4px solid blue;
    row-rule: 4px solid gold;
  }
  .lanes > div {
    height: 44px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.alt { background: #8a6df0; }
  .sp { grid-column: 2 / span 2; height: 44px; }
</style>
<div class="lanes">
  <div class="sp alt">1 (span 2)</div>
  <div>2</div>
  <div>3</div>
  <div class="sp alt">4 (span 2)</div>
  <div>5</div>
  <div>6</div>
  <div>7</div>
  <div class="sp alt">8 (span 2)</div>
</div>

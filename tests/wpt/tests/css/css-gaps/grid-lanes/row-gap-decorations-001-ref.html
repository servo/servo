<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-rows: repeat(3, 46px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    width: 60px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.w2 { width: 96px; }
  .lanes > div.w3 { width: 74px; }
  .lanes > div.w4 { width: 120px; }
  .lanes > div.w5 { width: 54px; }
  .lanes > div.w6 { width: 84px; }
  .row-rule { position: absolute; height: 0; border-top: 4px solid gold; }
</style>
<div class="lanes">
  <div class="w2">1</div>
  <div>2</div>
  <div class="w4">3</div>
  <div class="w3">4</div>
  <div class="w6">5</div>
  <div class="w5">6</div>
  <div>7</div>
  <div class="w3">8</div>
</div>
<div class="row-rule" style="top: 49px; left: 0; width: 268px;"></div>
<div class="row-rule" style="top: 105px; left: 0; width: 268px;"></div>

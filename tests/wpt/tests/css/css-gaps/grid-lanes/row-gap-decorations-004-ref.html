<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-rows: repeat(3, 46px);
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    width: 60px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.alt { background: #8a6df0; }
  .lanes > div.span2 { grid-row: span 2; width: 68px; }
  .lanes > div.w { width: 92px; }
  .row-rule { position: absolute; height: 0; border-top: 4px solid gold; }
  .col-rule { position: absolute; width: 0; border-left: 4px solid blue; }
</style>
<div class="lanes">
  <div class="span2 alt">1 (span 2)</div>
  <div class="w">2</div>
  <div>3</div>
  <div>4</div>
  <div>5</div>
  <div>6</div>
  <div>7</div>
</div>
<div class="col-rule" style="left: 71px; top: 0; height: 102px;"></div>
<div class="col-rule" style="left: 141px; top: 0; height: 46px;"></div>
<div class="col-rule" style="left: 141px; top: 56px; height: 46px;"></div>
<div class="col-rule" style="left: 95px; top: 112px; height: 46px;"></div>
<div class="row-rule" style="top: 49px; left: 78px; width: 130px;"></div>
<div class="row-rule" style="top: 105px; left: 0; width: 208px;"></div>

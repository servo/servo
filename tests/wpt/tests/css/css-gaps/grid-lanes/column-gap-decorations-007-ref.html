<!DOCTYPE html>
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-gaps-1/">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/">
<style>
  body { margin: 0; }
  .lanes {
    display: grid-lanes;
    grid-template-columns: repeat(3, 86px);
    grid-lanes-pack: dense;
    gap: 10px;
    background: #cdd5e0;
    width: max-content;
  }
  .lanes > div {
    height: 40px;
    background: #5b8def;
    color: #fff;
    font: 600 12px/1 sans-serif;
  }
  .lanes > div.alt { background: #8a6df0; }
  .lanes > div.hi { background: #1f9d6b; }
  .lanes > div.span2 { grid-column: 1 / span 2; }
  .lanes > div.tall { height: 110px; }
  .lanes > div.fill { height: 60px; }
  .col-rule { position: absolute; width: 0; border-left: 4px solid blue; }
  .row-rule { position: absolute; height: 0; border-top: 4px solid gold; }
</style>
<div class="lanes">
  <div class="tall">1</div>
  <div>2</div>
  <div>3</div>
  <div class="span2 alt">4 (span 2)</div>
  <div class="fill">5</div>
  <div class="hi">6</div>
  <div>7</div>
</div>
<div class="col-rule" style="left: 89px; top: 0; height: 110px;"></div>
<div class="col-rule" style="left: 185px; top: 0; height: 160px;"></div>
<div class="row-rule" style="top: 113px; left: 0; width: 182px;"></div>
<div class="row-rule" style="top: 43px; left: 96px; width: 86px;"></div>
<div class="row-rule" style="top: 43px; left: 192px; width: 86px;"></div>
<div class="row-rule" style="top: 113px; left: 192px; width: 86px;"></div>

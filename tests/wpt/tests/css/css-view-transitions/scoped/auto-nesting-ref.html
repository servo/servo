<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Tentative pending resolution of issue -->
  <like rel="help" contents="https://github.com/w3c/csswg-drafts/issues/13420">
  <title>Auto-nesting reference</title>
  <style>
    .box {
      height: 100px;
      width: 100px;
      view-transition-name: match-element;
      color: white;
      margin-bottom: 10px;
      position: relative;
    }
    .c1 {
      background-color: rebeccapurple;
    }
    .c2 {
      background-color: hotpink;
    }
    .c3 {
      background-color: mediumvioletred;
    }
    #a {
      background-color: #eee;
      border: 5px solid black;
      view-transition-name: a;
      position: absolute;
      left: 0;
      top: 0;
      width: 250px;
      height: 250px;
      overflow: clip;
    }
    #b {
      background-color: #eee;
      border: 5px solid black;
      view-transition-name: none;
      position: absolute;
      width: 250px;
      height: 250px;
      overflow: visible;
      left: 300px;
      top: 0;
    }
  </style>
</head>
<body>
  <div id="a">
    <div class="box c3"></div>
    <div class="box c1"></div>
    <div class="box c2"></div>
  </div>
  <div id="b">
    <div class="box c3"></div>
    <div class="box c1"></div>
    <div class="box c2"></div>
  </div>
  </div>
</body>
</html>

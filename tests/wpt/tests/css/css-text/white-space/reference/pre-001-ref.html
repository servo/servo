<!DOCTYPE html>
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css" />
<style>
html {
  font-family: Ahem;
  font-size: 20px;
  line-height: 1;
}
.other-span {
    white-space: normal;
    text-transform: capitalize;
    background-color: blueviolet;
}
#target {
    background-color: blue;
    text-transform: capitalize;
    white-space: pre;
}
</style>
<body>
  <div>
    <span class="other-span">aa bb </span><span id="target">     target </span><span class="other-span">bb aa</span>
  </div>
</body>

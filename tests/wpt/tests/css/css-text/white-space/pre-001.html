<!DOCTYPE html>
<title>CSS-white-space test: restore collapsed whitespace</title>
<link rel="author" title="JoeDow" href="ibluegalaxy_taoj@163.com">
<link rel="match" href="reference/pre-001-ref.html">
<link rel="help" href="https://drafts.csswg.org/css-text-3/#white-space-property">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css" />
<style>
html {
  font-family: Ahem;
  font-size: 20px;
  line-height: 1;
}
.other-span {
    white-space: normal;
    text-transform: capitalize;
    background-color: blueviolet;
}
#target {
    background-color: blue;
    text-transform: capitalize;
    white-space: normal;
}
</style>
<body>
  <div>
    <span class="other-span">aa bb </span><span id="target">     target </span><span class="other-span">bb aa</span>
  </div>

  <script>
    window.onload = function() {
        const target = document.getElementById("target");
        // force layout
        target.offsetLeft;
        if (target) {
            target.style.whiteSpace = "pre";
        }
    }
  </script>
</body>

<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS Text Test: text-indent on list-item with anonymous block wrapper (reference)</title>
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css" />
<style>
li {
  font-family: Ahem;
  font-size: 20px;
  line-height: 1;
  list-style-position: outside;
  text-indent: 2em;
}
li::marker {
  content: "X";
}
div {
  margin: 0;
}
</style>
<ul>
  <li>
    <div>AAA</div>
    <div>BBB</div>
  </li>
</ul>

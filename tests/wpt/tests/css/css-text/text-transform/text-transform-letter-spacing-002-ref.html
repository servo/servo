<!DOCTYPE html>
<meta charset="utf-8">

<title>CSS reference: text-transform:uppercase + letter-spacing + ligatures</title>

<style>
.ref {
  letter-spacing: 1em;
}
</style>

<p>Both lines in each pair should have the same spacing:</p>

<p class="ref">OFFICE FILES</p>
<p class="ref">OFFICE FILES</p>
<br>
<p class="ref">Flying Fish</p>
<p class="ref">Flying Fish</p>

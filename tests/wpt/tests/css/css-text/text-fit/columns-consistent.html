<!DOCTYPE html>
<html class="reftest-wait">
<link rel="help" href="https://drafts.csswg.org/css-text-4/#text-fit-property">
<link rel="match" href="columns-consistent-ref.html">
<meta name="flags" content="ahem">
<link rel="stylesheet" href="/fonts/ahem.css">
<style>
.container {
  width: 102px;
  columns: 2;
  column-gap: 2px;
  height: 24px;
  background: #ddd;
  font: 20px/1 Ahem;
  border: 2px solid blue;
}
.shrink {
  text-fit: shrink consistent;
}
.grow {
  text-fit: grow consistent;
  font-size: 5px;
}
</style>
<body>
<div class="container">
  <div class="shrink">AAAAA BpB</div>
</div>

<div class="container">
  <div class="grow">AA<br>p</div>
</div>
<script>
document.fonts.ready.then(() => {
  document.documentElement.classList.remove('reftest-wait');
});
</script>
</body>
</html>

<!DOCTYPE html>
<title>
    Suppress row flexbox gaps: row gaps (including any additional space from content distribution)
    if it's split across fragmentainer breaks or is the last content before a break.
    Tests align-content: space-between.
</title>
<link rel="help" href="https://github.com/w3c/csswg-drafts/issues/11520">
<link rel="match" href="multi-line-row-flex-fragmentation-094-ref.html">
<link rel="author" title="Javier Contreras" href="mailto:javiercon@microsoft.com">
<style>
     .multi-column {
        columns: 2;
        height: 60px;
        column-width: 140px;
        width: 290px;
        gap: 10px;
    }

    body {
        margin: 0px;
    }

    #flexbox {
        border: 2px solid rgb(96 139 168);
        width: 140px;
        background-color: #fff;
        display: flex;
        flex-wrap: wrap;
        row-rule: 5px solid gold;
        height: 180px;
        align-content: space-between;
    }

    .item {
        width: 70px;
        height: 50px;
        background-color: #007bff;
        color: white;
    }
</style>
<div class="multi-column">
<div id="flexbox">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
</div>

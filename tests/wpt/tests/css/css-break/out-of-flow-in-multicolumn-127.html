<!DOCTYPE html>
<link rel="author" title="Ting-Yu Lin" href="mailto:tlin@mozilla.com">
<link rel="author" title="Mozilla" href="https://www.mozilla.org/">
<link rel="help" href="https://drafts.csswg.org/css-position-3/#abspos-breaking">
<link rel="match" href="../reference/ref-filled-green-100px-square.xht">
<meta name="assert" content="An abspos should paint in the correct column when its transformed containing block fragments and its static position is in a different column.">
<style>
.multicol {
  columns: 2;
  column-fill: auto;
  column-gap: 0;
  width: 200px;
  height: 100px;
}
.transform {
  transform: translate(0);
}
.abspos {
  position: absolute;
  top: 0;
  left: 0;
  width: 100px;
  height: 100px;
  background: green;
}
</style>
<p>Test passes if there is a filled green square and <strong>no red</strong>.</p>
<div class="multicol">
  <div class="transform">
    <div style="width: 100px; height: 100px; background: red"></div>
    <div style="height: 40px"></div> <!-- Ensure the static pos of the abspos is in the second column. -->
    <div class="abspos"></div>
  </div>
</div>

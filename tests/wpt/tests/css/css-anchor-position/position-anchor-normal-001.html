<!DOCTYPE html>
<title>Tests that 'position-anchor: normal' uses implicit anchor depending on `position-area`.</title>
<link rel="help" href="https://drafts.csswg.org/css-anchor-position-1/#valdef-position-anchor-normal">
<link rel="author" href="mailto:dshin@mozilla.com">
<link rel="match" href="../reference/ref-filled-green-100px-square.xht">
<style>
.abs-cb {
  width: 100px;
  height: 100px;
  background: red;
  position: relative;
}

.anchor {
  width: 20px;
  height: 100px;
  margin-left: 80px;
  background: green;
}

.anchor::before, .anchor::after {
  content: "";
  position: absolute;
  display: block;
  width: 80px;
  height: 50px;
  background: green;
}

.anchor::before {
  position-anchor: normal;
  position-area: left center;
  top: 0;
  bottom: 50px;
}

.anchor::after {
  position-anchor: normal;
  right: anchor(left, 20px);
  bottom: anchor(bottom, 0);
}
</style>
<p>Test passes if there is a filled green square and <strong>no red</strong>.</p>
<div class=abs-cb>
  <div class=anchor></div>
</div>

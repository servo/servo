<!doctype html>
<title>position-anchor: none makes anchor() that refers to the implicit anchor use the falback</title>
<link rel="help" href="https://drafts.csswg.org/css-anchor-position-1/#position-anchor"/>
<link rel="author" title="Suraj Thanugundla" href="mailto:contact@surajt.com" />
<link rel="match" href="../reference/ref-filled-green-100px-square-only.html">
<style>
    .anchor {
        width: 100px;
        height: 50px;
        background: green;
        anchor-name: --a1;
    }

    .anchor::after {
        width: 100px;
        height: 50px;
        background: green;
        content: "";
        position: absolute;
        position-anchor: none;
        /* No implicit anchor, so anchor() should use the fallback */
        top: anchor(top, anchor(--a1 bottom))
    }
</style>
<p>Test passes if there is a filled green square.</p>
<div class="anchor"></div>

<!DOCTYPE html>
<!-- `reftest-wait` is a reftest harness signal that delays comparison until ready.
     See https://web-platform-tests.org/writing-tests/reftests.html#controlling-when-comparison-occurs -->
<html class="reftest-wait">
<title>CSS Writing Modes Test: The resulting composition is treated as a signel glyph for decorations</title>
<meta name="flags" content="ahem">
<link rel="author" title="Koji Ishii" href="mailto:kojiishi@gmail.com">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css" />
<style>
#container {
    display: none;
    font: 50px/1 Ahem;
    text-decoration-skip-ink: none;
}
.vlr {
    writing-mode:vertical-lr;
}
.vrl {
    writing-mode:vertical-rl;
}
.test, .ref {
    border:solid thin;
    margin:.2em;
}
p {
    margin:0 .5em;
}
.underline {
    text-decoration:underline;
}
.overline {
    text-decoration:overline;
}
.emphasis {
    text-emphasis:filled;
}
</style>
<p>This test asserts the resulting composition is treated as a single glyph for decorations.
<p>Test passes if the following two boxes in each row are identical.
<div id=container>
    <div class=vlr>
        <div class=test>
            <p class=underline>X&#xA0;X
            <p class=overline>X&#xA0;X
            <p class=emphasis>XXX
        </div>
        <div class=ref>
            <p class=underline>X&#xA0;X
            <p class=overline>X&#xA0;X
            <p class=emphasis>XXX
        </div>
    </div>
    <div class=vrl>
        <div class=test>
            <p class=underline>X&#xA0;X
            <p class=overline>X&#xA0;X
            <p class=emphasis>XXX
        </div>
        <div class=ref>
            <p class=underline>X&#xA0;X
            <p class=overline>X&#xA0;X
            <p class=emphasis>XXX
        </div>
    </div>
</div>
<script>
  // Avoid fallback-font first layout for deterministic reftest snapshots.
  document.fonts.load('50px Ahem').then(() => {
    document.getElementById('container').style.display = 'block';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.documentElement.classList.remove('reftest-wait');
      });
    });
  });
</script>
</html>

<!doctype html>
<html class="reftest-wait">
  <meta charset="utf-8" />
  <style>
    @font-face {
      font-family: avar2test_variablesubstitution;
      src: url(../resources/avar/rvrnTest[opsz\,wdth\,wght].ttf);
    }

    body {
      font-family: avar2test_variablesubstitution, sans-serif;
      font-size: 220px;
    }

    .variable-alternates {
      font-variation-settings:
        "wght" 1000,
        "wdth" 90;
    }

    .avar-alternates {
      font-variation-settings:
        "wght" 1000,
        "wdth" 75;
    }
  </style>
  <!-- The avar2test_variable font has no designspace distortions,
     with no avar tables (neither avar format 1 nor avar format 2)
-->
  H
  <span class="variable-alternates">H</span>
  <span class="avar-alternates">H</span>
  <script>
    document.fonts.ready.then(() => {
      document.documentElement.classList.remove("reftest-wait");
    });
  </script>
</html>

<!DOCTYPE html>
<head>
<title>CSS Borders and Box Decorations 4: 'corner-shape: bevel' on all corners — reference</title>
<style>
    .target {
        position: relative;
        background: red;
        width: 100px;
        height: 100px;
        box-sizing: border-box;
        clip-path: polygon(
            25px 0px, 75px 0px, 100px 25px, 100px 75px,
            75px 100px, 25px 100px, 0px 75px, 0px 25px);
    }
    .target::before {
        content: '';
        position: absolute;
        inset: 0;
        background: green;
        clip-path: polygon(
            27.071px 5px, 72.929px 5px, 95px 27.071px, 95px 72.929px,
            72.929px 95px, 27.071px 95px, 5px 72.929px, 5px 27.071px);
    }
</style>
</head>
<div class=target></div>

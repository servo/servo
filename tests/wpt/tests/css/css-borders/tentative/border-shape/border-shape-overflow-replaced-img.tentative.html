<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS Borders Test: border-shape overflow clips img child</title>
<link rel="help" href="https://drafts.csswg.org/css-borders-4/#border-shape">
<link rel="match" href="border-shape-overflow-replaced-ref.html">
<meta name="assert" content="When border-shape provides a single shape with overflow:hidden, an img child should be clipped to the inner edge of the border.">
<meta name="fuzzy" content="maxDifference=0-70;totalPixels=0-400">
<style>
body {
  margin: 0;
  padding: 20px;
}
.target {
  width: 100px;
  height: 100px;
  border: 10px solid black;
  border-shape: circle(50%);
  overflow: hidden;
}
.target > img {
  display: block;
  width: 100%;
  height: 100%;
}
</style>
<div class="target">
  <img src="/images/green-256x256.png" alt="">
</div>

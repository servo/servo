<!DOCTYPE html>
<title>CSS Borders Reference: double outline with tricky ellipses</title>
<style>
body {
  margin: 0;
}
.container {
  padding: 40px;
}
.test {
  margin: 150px auto;
  width: 40px;
  height: 100px;
  border: 5px solid green;
  box-shadow: 0 0 0 90px red;
  border-radius: 50%;
  outline: 30px double blue;
  outline-offset: 15px;
}
</style>
<div class="container">
  <div class="test"></div>
</div>

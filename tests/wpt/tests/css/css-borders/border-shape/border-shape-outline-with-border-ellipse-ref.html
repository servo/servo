<!DOCTYPE html>
<title>CSS Borders Reference: border-shape outline with tricky ellipses</title>
<style>
body {
  margin: 0;
}
.container {
  padding: 40px;
}
.test1 {
  margin-left: 160px;
  margin-top: 200px;
  width: 20px;
  height: 100px;
  border: 5px solid blue;
  outline: 120px solid green;
  border-radius: 50%;
}
.test2 {
  margin: -100px 549px;
  width: 2px;
  height: 100px;
  border: 1px solid blue;
  outline: 120px solid green;
  border-radius: 50%;
}
</style>
<div class="container">
  <div class="test1"></div>
  <div class="test2"></div>
</div>

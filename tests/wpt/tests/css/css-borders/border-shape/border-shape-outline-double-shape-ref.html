<!DOCTYPE html>
<title>CSS Borders Reference: outline follows border-shape with double shape</title>
<style>
body { margin: 0; }
.container { padding: 40px; }
.target {
  width: 100px;
  height: 100px;
  background: lightblue;
  border-radius: 50%;
  border: 10px solid green;
  outline: 4px solid red;
}
</style>
<div class="container">
  <div class="target"></div>
</div>

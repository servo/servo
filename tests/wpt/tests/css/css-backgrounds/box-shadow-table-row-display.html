<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Box-shadow on display: table-row</title>
<link rel="help" href="https://drafts.csswg.org/css-backgrounds-4/#background-clip">
<link rel="match" href="box-shadow-table-row-display-ref.html">
<meta name="fuzzy" content="maxDifference=0-15;totalPixels=0-2890">
<style>
  body {
    margin: 50px;
    background: white;
  }

  .table {
    display: table;
    margin-bottom: 40px;
  }

  .row {
    display: table-row;
    background: #999;
    box-shadow: 0 0 50px #000;
  }

  .row-red {
    display: table-row;
    background: #999;
    box-shadow: 0 0 50px red;
  }

  .row-green {
    display: table-row;
    background: #999;
    box-shadow: 0 0 50px green;
  }

  .row-blue {
    display: table-row;
    background: #999;
    box-shadow: 0 0 50px blue;
  }

  .cell {
    display: table-cell;
    width: 200px;
    height: 200px;
  }
</style>
</head>
<body>

<div class="table">
  <div class="row">
    <div class="cell"></div>
  </div>
</div>

<div class="table">
  <div class="row">
    <div class="cell"></div>
  </div>
  <div class="row">
    <div class="cell"></div>
  </div>
</div>

<div class="table">
  <div class="row-red">
    <div class="cell"></div>
  </div>
  <div class="row-green">
    <div class="cell"></div>
  </div>
  <div class="row-blue">
    <div class="cell"></div>
  </div>
</div>

</body>
</html>

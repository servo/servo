<!DOCTYPE html>
<title>background-clip:text on composited elements (reference)</title>
<style>
.green {
  width: 100px;
  height: 100px;
  background-color: green;
  padding: 10px;
  background-clip: text;
}
.blue {
  width: 50px;
  height: 50px;
  background-color: blue;
}
</style>
<div class="green">
  <div class="blue"></div>
</div>

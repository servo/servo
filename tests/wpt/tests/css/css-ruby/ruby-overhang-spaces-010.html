<!DOCTYPE html>
<meta charset="UTF-8">
<title>Tests for ruby-overhang: spaces with ideographic spaces</title>
<link rel="help" href="https://drafts.csswg.org/css-ruby-1/#ruby-overhang">
<link rel="match" href="ruby-overhang-spaces-010-ref.html">
<meta name=assert content="With 'ruby-overhang: spaces', excess ruby overhangs on top of the ideographic spaces, but no further.">
<style>
ruby {
    ruby-overhang: spaces;
    ruby-align: center;
}
div {
    font-size: 20px;
    border-left: 5px solid;
    border-right: 5px solid;
    width: max-content;
}
.test { border-color: orange; }
.measure { border-color: blue; }
</style>
<body lang="ja">
<p>Test passes if orange and blue lines are aligned.
<div class=test>a　<ruby>あ<rt>ああああああ</ruby>　a</div>
<div class=measure>a　あ　a</div>
</body>

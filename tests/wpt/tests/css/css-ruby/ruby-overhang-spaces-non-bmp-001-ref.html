<!DOCTYPE html>
<meta charset="UTF-8">
<title>CSS Reference: ruby-overhang spaces with non-BMP characters</title>
<style>
ruby {
    ruby-overhang: spaces;
    ruby-align: center;
}
div {
    font-size: 20px;
    border-left: 5px solid;
    border-right: 5px solid;
    width: max-content;
    margin-bottom: 10px;
}
.test { border-color: orange; }
.measure { border-color: blue; }
</style>
<body lang="ja">
<p>Test passes if orange and blue lines are aligned.
<div class="test">🍊<ruby>　　あ　　<rt>ああああああああああ</ruby>🍊</div>
<div class="measure">🍊<ruby>　　あ　　<rt>ああああああああああ</ruby>🍊</div>
</body>

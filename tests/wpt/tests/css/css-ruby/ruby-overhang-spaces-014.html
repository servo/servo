<!DOCTYPE html>
<meta charset="UTF-8">
<title>Tests for ruby-overhang: spaces with ideographic spaces and preserved tabs</title>
<link rel="help" href="https://drafts.csswg.org/css-ruby-1/#ruby-overhang">
<link rel="match" href="ruby-overhang-spaces-014-ref.html">
<meta name=assert content="With 'ruby-overhang: spaces', excess ruby overhangs on top of the ideographic spaces and preserved tabs, and further.">
<style>
ruby {
    ruby-overhang: spaces;
    ruby-align: center;
}
div {
    font-size: 20px;
    white-space: pre;
    border-left: 5px solid;
    border-right: 5px solid;
    width: max-content;
    tab-size: 1ic;
}
.test { border-color: orange; }
.measure { border-color: blue; }
</style>
<body lang="ja">
<p>Test passes if orange and blue lines are aligned.
<div class=test>あ　　　<ruby>あ<rt>ああああああ</ruby>　　　あ</div>
<div class=test>あ&Tab;　&Tab;<ruby>あ<rt>ああああああ</ruby>&Tab;　&Tab;あ</div>
<div class=test>あ　&Tab;　<ruby>あ<rt>ああああああ</ruby>　&Tab;　あ</div>
<div class=test>あ&Tab;&Tab;&Tab;<ruby>あ<rt>ああああああ</ruby>&Tab;&Tab;&Tab;あ</div>
<div class=measure>あ　　　あ　　　あ</div>
</body>

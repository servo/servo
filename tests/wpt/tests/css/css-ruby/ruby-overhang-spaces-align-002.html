<!DOCTYPE html>
<meta charset="UTF-8">
<title>Tests for ruby-overhang: spaces with ruby-align: start and preserved tabs</title>
<link rel="help" href="https://drafts.csswg.org/css-ruby-1/#ruby-overhang">
<link rel="match" href="ruby-overhang-spaces-align-001-ref.html">
<meta name=assert content="With 'ruby-overhang: spaces' and 'ruby-align: start', excess ruby overhangs on top of preserved tabs, but no futher">
<style>
ruby {
    ruby-overhang: spaces;
    ruby-align: start;
}
div {
    font-size: 20px;
    white-space: pre;
    border-left: 5px solid;
    border-right: 5px solid;
    width: max-content;
    tab-size: 1ic;
}
.test { border-color: orange; }
.measure { border-color: blue; }
</style>
<body lang="ja">
<p>Test passes if orange and blue lines are aligned.
<div class=test>あ<ruby>あ<rt>ああああああ</ruby>&Tab;あ</div>
<div class=measure>ああ　　あ</div>
</body>

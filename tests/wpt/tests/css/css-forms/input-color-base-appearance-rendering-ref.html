<!DOCTYPE html>
<div><span></span></div>

<style>
body {
  font-family: monospace;
  background-color: black;
  color: green;
}

div {
    box-sizing: border-box;
    background-color: transparent;

    border: 1px solid green;

    border-radius: 0.5em;

    min-block-size: 24px;
    min-inline-size: 24px;

    display: inline-flex;

    overflow: clip;
}

span {
    background-color: #ff0000;
    display: block;
    inline-size: stretch;
    block-size: stretch;
    box-sizing: border-box;
}
</style>

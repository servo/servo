<!DOCTYPE html>
<div><span></span></div>

<style>
body {
  font-family: monospace;
  background-color: black;
  color: green;
}

div {
    box-sizing: border-box;
    background-color: transparent;

    border: 1px solid green;

    padding-block: 0.25em;
    padding-inline: 0.5em;

    border-radius: 0.5em;

    min-block-size: 24px;
    min-inline-size: 24px;

    display: inline-flex;
}

span {
    background-color: #ff0000;
    flex: 1;
    display: block;
    border: 1px solid green;
    inline-size: 2em;
    box-sizing: border-box;
}
</style>

<!DOCTYPE html>
<html>
<meta charset="utf-8">
<title>CSS Overflow: height-based clamp point inside min-height block</title>
<link rel="author" title="Andreu Botella" href="mailto:abotella@igalia.com">
<link rel="help" href="https://drafts.csswg.org/css-overflow-4/#line-clamp">
<link rel="match" href="reference/webkit-line-clamp-005-ref.html">
<meta name="assert" content="If we're clamping by height, and the clamp point would be inside a nested block, but that block has constraints that increase its height beyond that point, the actual clamp point must be before it.">
<style>
.clamp {
  line-clamp: auto;
  max-height: 6lh;
  font: 16px / 32px serif;
  padding: 0 4px;
  background-color: yellow;
}
.min-height {
  min-height: 3lh;
  background-color: red;
}
</style>
<div class="clamp">
  Line 1<br>
  Line 2<br>
  Line 3<br>
  Line 4
  <div class="min-height">
    Line 5 <br>
    Line 6 <br>
    Line 7 <br>
    Line 8
  </div>
  Line 9
</div>

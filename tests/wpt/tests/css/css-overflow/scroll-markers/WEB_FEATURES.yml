features:
- name: scroll-markers
  files:
  - column-scroll-marker*
  - html-scroll-marker*
  - inline-with-scroll-marker*
  - nested-scroll-markers*
  - root-scroll-marker*
  - scroll-marker*
  - target-current-scroll-marker-update.html
  - targeted-column-scroll-marker*
  - targeted-scroll-marker*
  - chrome-421199213-crash.html
  - targeted-column-scroll-marker-selection-*
  # scroll-marker-targets exclusions, keep synced
  - "!scroll-marker-target-before-after.html"
  - "!html-scroll-marker-target-before-after.html"
- name: scroll-buttons
  files:
  - root-scroll-button*
  - scroll-button*
- name: scroll-marker-targets
  files:
  - scroll-marker-target-before-after.html
  - html-scroll-marker-target-before-after.html
- name: scroll-target-group
  files:
  - scroll-target-group*

<!DOCTYPE html>
<html class="reftest-wait">

<style>
#target {
  width: 100px;
  height: 100px;
  padding-bottom: 50px;
  box-sizing: border-box;
  overflow: clip;
  overflow-clip-margin: content-box;
}

#target > div {
  width: 100px;
  height: 100px;

}

<div id="target">

<script>

  document.getElementById('target').style.paddingBottom = '0px';

});
</script>

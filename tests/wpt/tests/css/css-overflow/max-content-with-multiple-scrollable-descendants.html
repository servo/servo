<!DOCTYPE html>
<html>
<head>
<link rel="match" href="max-content-with-multiple-scrollable-descendants-ref.html">
<link rel="help" href="https://drafts.csswg.org/css-overflow-3/#scrollbar-sizing">
<style>
.container {
  width: max-content;
  background-color: green;
}
.parent {
  height: 79px;
  overflow: auto;
}
.content-narrow {
  width: 10px;
  height: 80px;
}
.content-wide {
  width: 30px;
  height: 80px;
}
</style>
</head>
<body>
<div class=container>
  <div class=parent>
    <div class=content-narrow></div>
  </div>
  <div class=parent>
    <div class=content-wide></div>
  </div>
</div>
</body>
</html>

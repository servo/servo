<!DOCTYPE html>
<html>
<head>
<style>
.positioned {
  position: relative;
  height: 200px;
}
.container {
  position: absolute;
  background-color: green;
}
.parent {
  height: 79px;
  overflow-y: scroll;
}
.content {
  width: 10px;
  height: 80px;
}
</style>
</head>
<body>
<div class=positioned>
  <div class=container>
    <div class=parent>
      <div class=content></div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html class="reftest-wait">
<link rel="help" href="https://drafts.csswg.org/css-shapes-1/#basic-shape-interpolation">
<link rel="match" href="clip-path-animation-none-backdrop-filter-subpixel-offset-ref.html">
<meta name="fuzzy" content="maxDifference=0-64;totalPixels=0-400">
<!--
  Test that an element with backdrop-filter, a clip-path animation that
  includes "none" as a keyframe, and a fractional position offset renders
  correctly.
-->
<style>
  .target {
    width: 100px;
    height: 100px;
    background-color: rgba(0, 0, 255, 0.5);
    backdrop-filter: invert(1);
    position: absolute;
    left: 0.31px;
    top: 0.31px;
    animation: clippath 20s linear -9.999s;
  }

  @keyframes clippath {
    0% {
      clip-path: circle(20% at 50% 50%);
    }
    50% {
      clip-path: circle(50% at 50% 50%);
    }
    75% {
      clip-path: circle(50% at 50% 50%);
    }
    100% {
      clip-path: none;
    }
  }
</style>
<script src="/common/reftest-wait.js"></script>
<script src="../../../../web-animations/resources/timing-utils.js"></script>

<body>
  <div class="target"></div>
  <script>
    waitForAnimationTime(document.getAnimations()[0], 1).then(takeScreenshot);
  </script>
</body>
</html>

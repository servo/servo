<!DOCTYPE html>
<html lang=en>
<meta charset="utf-8">
<title>Test reference</title>
<link rel="author" title="Perry Wang" href="mailto:perryuwang@gmail.com">
<style>
div {
    color: orange;
    font-size: 2em;
    white-space: pre;
}
span {
    text-decoration: underline;
    text-decoration-color: blue;
}
::selection {
    background: transparent;
    color: red;
}
</style>

<p>Test passes if the blue underline appears only under ABCDEF, not under the surrounding spaces, even when selected.

<div>   <span>ABCDEF</span>   </div>
<script>
  const div = document.querySelector('div');
  const range = document.createRange();
  range.selectNodeContents(div);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
</script>

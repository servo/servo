<!doctype html>
<meta charset="utf-8">
<link rel="help" href="https://drafts.csswg.org/css-transforms-2/#perspective-property">
<link rel="help" href="https://bugzilla.mozilla.org/show_bug.cgi?id=2045159">
<style>
#a {
  perspective: 0px;
  height: 0vw;
  column-width: 0px;
  overflow-x: scroll;
}
#b {
  rotate: 6deg 96 0 0;
}
</style>
<ul id="a">
  <li id="b">
    <textarea autofocus="autofocus">a</textarea>
  </li>
</ul>

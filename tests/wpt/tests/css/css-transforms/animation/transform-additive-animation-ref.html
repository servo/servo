<!doctype html>
<html>
<meta charset="utf-8">
<title>Reference for additive transform animation behavior</title>
<style>

div {
    width: 100px;
    height: 100px;
    background-color: black;
    transform-origin: top left;
    transform: translateX(100px) scale(2);
}

</style>
<body>
  <div></div>
</body>

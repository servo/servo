<!DOCTYPE html>
<title>Remove transform but keep stacking context root, descendant spanner candidate</title>
<link rel="author" title="Morten Stenshorne" href="mailto:mstensho@chromium.org">
<link rel="help" href="https://issues.chromium.org/issues/500832364">
<link rel="match" href="../reference/ref-filled-green-100px-square.xht">
<p>Test passes if there is a filled green square and <strong>no red</strong>.</p>
<div style="width:100px; height:100px; background:red;">
  <div style="columns:2;">
    <div id="ancestor" style="transform:rotate(5deg); position:relative; z-index:1;">
      <div style="column-span:all; height:100px; background:green;"></div>
    </div>
  </div>
</div>
<script>
  document.body.offsetTop;
  ancestor.style.transform = "none";
</script>

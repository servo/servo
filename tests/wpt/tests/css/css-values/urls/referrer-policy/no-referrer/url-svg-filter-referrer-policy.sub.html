<!DOCTYPE html>
<html class="reftest-wait">
<head>
<title>Request URL Modifiers: referrer-policy(no-referrer) for SVG filter</title>
<link rel="help" href="https://drafts.csswg.org/css-values-5/#typedef-request-url-modifier-referrer-policy-modifier">
<link rel="match" href="/css/filter-effects/reference/green-100x100.html">
<meta name="assert" content="An SVG filter URL with referrer-policy(no-referrer) should send no referrer, so a server that expects no referrer serves the working filter.">
<style>
.test {
  width: 100px;
  height: 100px;
  background-color: rgb(71.79%, 28.82%, 0%);
  filter: url("http://{{hosts[][]}}:{{ports[http][1]}}/css/css-values/urls/support/svg-filter-referrer-policy.py?expected_referrer=none#MyFilter" cross-origin(anonymous) referrer-policy(no-referrer));
}
</style>
</head>
<body>
<div class="test"></div>
<script>
window.addEventListener("load", () => {
  document.documentElement.classList.remove("reftest-wait");
});
</script>
</body>
</html>

<!DOCTYPE html>
<html class="reftest-wait">
<head>
<title>Request URL Modifiers: referrer-policy(origin) in external stylesheet</title>
<link rel="help" href="https://drafts.csswg.org/css-values-5/#typedef-request-url-modifier-referrer-policy-modifier">
<link rel="match" href="/css/reference/ref-filled-green-100px-square.xht">
<meta name="assert" content="A url() with referrer-policy(origin) in an external stylesheet sends the stylesheet origin as the referrer.">
<link rel="stylesheet" href="../../support/external-referrer-policy-origin.sub.css">
</head>
<body>
<p>Test passes if there is a filled green square and <strong>no red</strong>.</p>
<div class="test"></div>
<script>
window.addEventListener("load", () => {
  document.documentElement.classList.remove("reftest-wait");
});
</script>
</body>
</html>

<!DOCTYPE html>
<title>Test of text-box-trim on fragmented inline boxes</title>
<link rel="help" href="https://drafts.csswg.org/css-inline-3/#text-box-edge">
<link rel="help" href="https://drafts.csswg.org/css-inline-3/#text-box-trim">
<meta charset="utf-8">
<style>
@import "support/MetricsTestFont.css";

.spacer {
  block-size: 100px;
  background: lightgray;
}

.container {
  font: 100px/1 MetricsTestFont;
}

.target {
  position: relative;
}

.target::before {
  content: '';
  position: absolute;
  inset: 0.2em 0;
  z-index: -1;
  background: green;
}
</style>
<div class="spacer"></div>
<div class="container">

</div>

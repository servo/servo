<!DOCTYPE html>
<title>Test text-box-trim with start/end column spanners and inner fragmented blocks</title>
<link rel="help" href="https://drafts.csswg.org/css-inline-3/#text-box-trim">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css" />
<style>
  .multicol {
    columns: 3;
    column-fill: auto;
    width: 450px;
    gap: 0;
    font: 50px/1 Ahem;
  }

  .multicol > div {
    padding-block: 25px;
  }

  .trim-start {
    padding-block-start: 0 !important;
  }

  .trim-end {
    padding-block-end: 0 !important;
  }

  .spanner {
    background: yellow;
    column-span: all;
  }
</style>
<div class="multicol">
  <div class="spanner trim-start">xxx</div>
  <div>xxx</div>
  <div>xxx</div>
  <div>xxx</div>
  <div>xxx</div>
  <div>xxx</div>
  <div class="spanner">xxx</div>
  <div>xxx</div>
  <div>xxx</div>
  <div>xxx</div>
  <div>xxx</div>
  <div>xxx</div>
  <div class="spanner trim-end">xxx</div>
</div>

<!DOCTYPE html>
<html>
<head>
  <link rel="help" href="https://drafts.csswg.org/css-inline-3/#alignment-baseline-property">
  <link rel="match" href="alignment-baseline-nested-001-ref.html">
  <link rel="stylesheet" href="/fonts/baseline-diagnostic/baseline-diagnostic-font.css">
  <meta name="assert" content="alignment-baseline aligns inline boxes to their parent's alignment baseline" />
  <meta name="flags" content="image" />
  <meta charset="utf-8">
  <style>
    :root {
      font: 240px/1 'BaselineDiagnostic';
    }

    span > span {
      font-size: 0.5em;
    }
  </style>
</head>
<body>
  <div id="container">
    <span>X<span style="alignment-baseline: hanging">X<span style="alignment-baseline: ideographic">X<span style="alignment-baseline: mathematical">X<span style="alignment-baseline: baseline">X</span></span></span></span></span>
  </div>
</body>
</html>

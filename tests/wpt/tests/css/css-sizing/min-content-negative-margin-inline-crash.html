<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS Test: min-content with negative margins cancelling inline sizes must not crash</title>

<!-- Span with padding followed by a different span with negative margin -->
<div style="width:min-content">
  <span style="padding-left:50px;"></span><span style="margin-left:-50px;"></span>text content here
</div>

<!-- Border variant -->
<div style="width:min-content">
  <span style="border-left:50px solid transparent;"></span><span style="margin-left:-50px;"></span>text content here
</div>

<!-- padding-right + negative margin-left on next element -->
<div style="width:min-content">
  <span style="padding-right:50px;"></span><span style="margin-left:-50px;"></span>text content here
</div>

<!-- Multiple cancellations -->
<div style="width:min-content">
  <span style="padding-left:30px;"></span><span style="padding-left:20px;"></span><span style="margin-left:-50px;"></span>text
</div>

<!-- Long word variant -->
<div style="width:min-content">
  <span style="padding-left:50px;"></span><span style="margin-left:-50px;"></span>longwordwithoutbreaks
</div>

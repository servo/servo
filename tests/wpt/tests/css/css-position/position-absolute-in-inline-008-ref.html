<!DOCTYPE html>
<title>CSS Positioned Reference: Test the inline containing block rectangle for a fragmented inline element in multicol and vertical writing mode</title>
<link rel="author" title="Ting-Yu Lin" href="mailto:tlin@mozilla.com">
<link rel="author" title="Mozilla" href="https://www.mozilla.org/">
<link rel="stylesheet" href="/fonts/ahem.css">

<style>
:root {
  writing-mode: vertical-rl;
}
.container {
  font: 20px/1 Ahem;
  border: 5px solid gold;
  inline-size: 16em;
  block-size: 3em;
  columns: 2;
  column-fill: auto;
  column-gap: 0;
  margin-block-end: 1em;
}
.container.rtl {
  direction: rtl;
}
.cb-rect {
  color: green;
}
</style>

  XXX<span class="cb-rect">XX</span>
</div>

<div class="container rtl">
  XX<span class="cb-rect">XXXXX</span><br>
  XXX<span class="cb-rect">XXXXX</span><br>

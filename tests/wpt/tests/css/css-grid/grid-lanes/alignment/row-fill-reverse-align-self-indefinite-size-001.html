<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: row fill-reverse align-self mixes baseline and last baseline with indefinite size</title>
  <link rel="author" title="Celeste Pan" href="mailto:celestepan@microsoft.com">
  <link rel="match" href="row-fill-reverse-align-self-indefinite-size-001-ref.html">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#alignment">
  <style>
    html, body {
      font: 16px/1 monospace;
      background: white;
    }

    .grid-lanes {
      display: grid-lanes;
      grid-lanes-direction: row fill-reverse;
      grid-template-rows: repeat(2, 80px);
      border: 1px solid blue;
      gap: 4px;
      height: min-content;
    }

    item {
      display: block;
      width: min-content;
      color: white;
      background: #555;
    }
  </style>
</head>
<body>
  <p>align-self: baseline / last baseline</p>
  <div class="grid-lanes">
    <item style="align-self: baseline;">item 1 with extra text</item>
    <item style="align-self: last baseline;">item 2</item>
    <item style="align-self: baseline;">item 3 with more text</item>
    <item style="align-self: last baseline;">item 4</item>
    <item style="align-self: baseline;">item 5</item>
    <item style="align-self: last baseline;">item 6 with even more text</item>
  </div>
</body>
</html>

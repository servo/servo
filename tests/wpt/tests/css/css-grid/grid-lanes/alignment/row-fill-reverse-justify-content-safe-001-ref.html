<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      font: 16px/1 monospace;
      background: white;
    }

    body {
      padding: 40px;
    }

    .container {
      display: grid;
      grid-template-rows: 40px;
      grid-auto-flow: column;
      gap: 4px;
      width: 60px;
      height: 100px;
      border: 1px solid;
      margin-bottom: 40px;
    }

    item {
      display: block;
      width: 40px;
      height: 30px;
      color: white;
      background: #2ca02c;
    }
  </style>
</head>
<body>
  <div class="container" style="justify-content: end;">
    <item>2</item>
    <item>1</item>
  </div>

  <div class="container" style="justify-content: end;">
    <item>2</item>
    <item>1</item>
  </div>

  <div class="container" style="justify-content: end;">
    <item>2</item>
    <item>1</item>
  </div>
</body>
</html>

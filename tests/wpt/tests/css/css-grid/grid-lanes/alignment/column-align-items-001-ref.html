<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      color: black; background-color: white; font: 16px/1 monospace; padding: 0; margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      gap: 5px;
      padding: 2px;
      margin: 5px;
      align-items: stretch;
    }

    .track {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    item {
      display: block;
      color: white;
    }
  </style>
</head>
<body>

<div class="grid">
  <div class="track">
    <item style="height: 70px; background: #f4a0a0;">1</item>
    <item style="height: 50px; background: #aad4f5;">5</item>
    <item style="flex-grow: 1; background: #98df8a;">8</item>
  </div>
  <div class="track">
    <item style="height: 40px; background: #2ca02c;">2</item>
    <item style="height: 60px; background: #ffbb78;">4</item>
    <item style="height: 80px; background: #c5b0d5;">6</item>
  </div>
  <div class="track">
    <item style="height: 120px; background: #ff7f0e;">3</item>
    <item style="background: #d62728;">7</item>
    <item style="flex-grow: 1; background: #9edae5;">9</item>
  </div>
</div>

<div class="grid">
  <div class="track">
    <item style="height: 70px; background: #f4a0a0;">1</item>
    <item style="height: 50px; background: #aad4f5;">5</item>
    <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
      <item style="height: 50px; background: #98df8a;">8</item>
    </div>
  </div>
  <div class="track">
    <item style="height: 40px; background: #2ca02c;">2</item>
    <item style="height: 60px; background: #ffbb78;">4</item>
    <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
      <item style="height: 80px; background: #c5b0d5;">6</item>
    </div>
  </div>
  <div class="track">
    <item style="height: 120px; background: #ff7f0e;">3</item>
    <item style="height: 40px; background: #d62728;">7</item>
    <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
      <item style="height: 35px; background: #9edae5;">9</item>
    </div>
  </div>
</div>

</body>
</html>

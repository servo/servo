<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      color: black; background-color: white; font: 16px/1 monospace; padding: 0; margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: 80px 50px 50px 1fr;
      height: 500px;
      gap: 10px;
      padding: 2px;
      margin: 5px;
      align-items: start;
    }

    .track {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    item {
      display: block;
      color: white;
    }
  </style>
</head>
<body>

<div class="grid" style="align-items: stretch;">
  <item style="grid-column: 1; grid-row: 1; background: #f4a0a0;">1</item>
  <div class="track" style="grid-column: 2; grid-row: 1;">
    <item style="height: 80px; background: #aad4f5;">2</item>
  </div>
  <item style="height: 200px; background: #2ca02c; grid-column: 3; grid-row: 1 / span 3;">3</item>
  <item style="background: #f4a0a0; grid-column: 1 / span 2; grid-row: 2 / span 2;">4</item>
  <item style="background: #2ca02c; grid-column: 1 / span 3; grid-row: 4;">5</item>
</div>

</body>
</html>

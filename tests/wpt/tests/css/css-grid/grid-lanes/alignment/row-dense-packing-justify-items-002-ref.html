<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      color: black; background-color: white; font: 16px/1 monospace; padding: 0; margin: 0;
    }

    .grid {
      display: grid;
      grid-template-rows: repeat(3, 60px);
      grid-template-columns: 20px 80px 30px 20px;
      padding: 2px;
      margin: 5px;
    }

    .grid-center {
      display: grid;
      grid-template-rows: repeat(3, 60px);
      grid-template-columns: 20px 80px 30px 1fr 20px 1fr;
      padding: 2px;
      margin: 5px;
    }

    .track {
      display: flex;
      flex-direction: row;
    }

    item {
      display: block;
      color: white;
    }
  </style>
</head>
<body>

<div class="grid">
  <item style="grid-row: 1 / span 2; grid-column: 1; width: 20px; background: salmon;">0</item>
  <div class="track" style="grid-row: 1; grid-column: 2;">
    <item style="width: 80px; background: salmon;">1</item>
  </div>
  <item style="grid-row: 1 / span 2; grid-column: 3; width: 30px; background: salmon;">2</item>
  <div class="track" style="grid-row: 2; grid-column: 2;">
    <item style="flex-grow: 1; background: green;">3</item>
  </div>
  <div class="track" style="grid-row: 3; grid-column: 1 / span 4;">
    <item style="width: 80px; background: salmon;">4</item>
    <item style="flex-grow: 1; background: green;">6</item>
    <div style="width: 20px;"></div>
  </div>
  <item style="grid-row: 1 / span 3; grid-column: 4; width: 20px; background: salmon;">5</item>
</div>

<div class="grid-center">
  <item style="grid-row: 1 / span 2; grid-column: 1; width: 20px; background: salmon;">0</item>
  <div class="track" style="grid-row: 1; grid-column: 2;">
    <item style="width: 80px; background: salmon;">1</item>
  </div>
  <item style="grid-row: 1 / span 2; grid-column: 3; width: 30px; background: salmon;">2</item>
  <div class="track" style="grid-row: 2; grid-column: 2; justify-content: center;">
    <item style="width: 40px; background: green;">3</item>
  </div>
  <div class="track" style="grid-row: 3; grid-column: 1 / span 3;">
    <item style="width: 80px; background: salmon;">4</item>
    <div style="width: 10px;"></div>
    <item style="width: 30px; background: green;">6</item>
  </div>
  <item style="grid-row: 1 / span 3; grid-column: 5; width: 20px; background: salmon;">5</item>
</div>

</body>
</html>

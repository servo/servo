<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      font: 16px/1 monospace;
      background: white;
    }

    .container {
      display: flex;
      flex-direction: row;
      gap: 4px;
      width: min-content;
      border: 1px solid blue;
    }

    .col {
      display: flex;
      flex-direction: column-reverse;
      width: 80px;
      flex-shrink: 0;
      gap: 4px;
    }

    item {
      display: block;
      width: min-content;
      color: white;
      background: #555;
      writing-mode: vertical-rl;
      height: min-content;
    }
  </style>
</head>
<body>
  <p>justify-items: baseline</p>
  <div class="container">
    <div class="col" style="align-items: baseline;">
      <item>item 1 with some extra text</item>
      <item>item 2</item>
      <item>item 3</item>
      <item>item 4 with more text</item>
      <item>item 5</item>
      <item>item 6</item>
    </div>
  </div>

  <p>justify-items: last baseline</p>
  <div class="container">
    <div class="col" style="align-items: last baseline;">
      <item>item 1 with some extra text</item>
      <item>item 2</item>
      <item>item 3</item>
      <item>item 4 with more text</item>
      <item>item 5</item>
      <item>item 6</item>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      font: 16px/1 monospace;
      background: white;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 4px;
      height: min-content;
      border: 1px solid blue;
    }

    .row {
      display: flex;
      flex-direction: row-reverse;
      height: 80px;
      flex-shrink: 0;
      gap: 4px;
    }

    .row-grid {
      display: grid;
      grid-auto-flow: column;
      justify-content: end;
      height: 80px;
      gap: 4px;
    }

    item {
      display: block;
      width: min-content;
      color: white;
      background: #555;
    }
  </style>
</head>
<body>
  <p>align-items: start</p>
  <div class="container">
    <div class="row" style="align-items: start;">
      <item>item 1</item>
      <item>item 3</item>
      <item>item 5</item>
    </div>
    <div class="row" style="align-items: start;">
      <item>item 2</item>
      <item>item 4</item>
      <item>item 6</item>
    </div>
  </div>

  <p>align-items: center</p>
  <div class="container">
    <div class="row" style="align-items: center;">
      <item>item 1</item>
      <item>item 3</item>
      <item>item 5</item>
    </div>
    <div class="row" style="align-items: center;">
      <item>item 2</item>
      <item>item 4</item>
      <item>item 6</item>
    </div>
  </div>

  <p>align-items: end</p>
  <div class="container">
    <div class="row" style="align-items: end;">
      <item>item 1</item>
      <item>item 3</item>
      <item>item 5</item>
    </div>
    <div class="row" style="align-items: end;">
      <item>item 2</item>
      <item>item 4</item>
      <item>item 6</item>
    </div>
  </div>

</body>
</html>

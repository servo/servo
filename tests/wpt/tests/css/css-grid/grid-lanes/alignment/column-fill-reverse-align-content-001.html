<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: column fill-reverse align-content aligns the entire block of items along the stacking axis</title>
  <link rel="author" title="Celeste Pan" href="mailto:celestepan@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#alignment">
  <link rel="match" href="column-fill-reverse-align-content-001-ref.html">
  <style>
    html, body {
      font: 16px/1 monospace;
      background: white;
    }

    .grid-lanes {
      display: grid-lanes;
      grid-lanes-direction: column fill-reverse;
      grid-template-columns: repeat(2, 80px);
      gap: 4px;
      width: 200px;
      height: 180px;
      border: 1px solid;
    }

    item {
      display: block;
      width: 40px;
      height: 26px;
      color: white;
      background: #2ca02c;
    }
  </style>
</head>
<body>
  <div class="grid-lanes" style="align-content: start;">
    <item>1</item>
    <item>2</item>
    <item>3</item>
    <item>4</item>
  </div>

  <div class="grid-lanes" style="align-content: center;">
    <item>1</item>
    <item>2</item>
    <item>3</item>
    <item>4</item>
  </div>

  <div class="grid-lanes" style="align-content: end;">
    <item>1</item>
    <item>2</item>
    <item>3</item>
    <item>4</item>
  </div>
</body>
</html>

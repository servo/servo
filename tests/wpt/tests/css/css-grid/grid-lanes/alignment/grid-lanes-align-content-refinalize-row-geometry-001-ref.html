<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    .grid {
        display: grid;
        grid-auto-flow: column;
        grid-template-rows: 20px 20px;
        min-height: 100px;
        width: 100px;
        background: gray;
        margin-bottom: 10px;
    }
    .grid > div {
        background: green;
    }
  </style>
</head>
<body>
  <div class="grid" style="align-content: center;">
      <div></div>
      <div></div>
  </div>
  <div class="grid" style="align-content: end;">
      <div></div>
      <div></div>
  </div>
</body>
</html>

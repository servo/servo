<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      font: 16px/1 monospace;
      background: white;
    }

    .container {
      display: flex;
      flex-direction: row;
      gap: 4px;
      width: min-content;
      height: 180px;
      border: 1px solid blue;
    }

    .col {
      display: flex;
      flex-direction: column-reverse;
      width: 80px;
      flex-shrink: 0;
      gap: 4px;
    }

    item {
      display: block;
      width: min-content;
      height: min-content;
      color: white;
      background: #555;
    }
  </style>
</head>
<body>
  <p>justify-items: last baseline</p>
  <div class="container">
    <div class="col" style="align-items: last baseline;">
      <item style="writing-mode: vertical-rl;">item 1 with some extra text</item>
      <item style="writing-mode: vertical-rl;">item 3</item>
      <item style="writing-mode: vertical-rl;">item 5</item>
    </div>
    <div class="col" style="align-items: last baseline;">
      <item style="writing-mode: vertical-rl;">item 2</item>
      <item style="writing-mode: vertical-rl;">item 4</item>
      <item style="writing-mode: vertical-rl;">item 6</item>
    </div>
  </div>
</body>
</html>

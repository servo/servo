<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: justify-self center and stretch on dense-packed multi-spanning item in row direction</title>
  <link rel="author" title="Celeste Pan" href="mailto:celestepan@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#alignment">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#grid-lanes-dense-packing">
  <link rel="match" href="row-dense-packing-justify-self-multi-span-002-ref.html">
  <style>
    html, body {
      color: black; background-color: white; font: 16px/1 monospace; padding: 0; margin: 0;
    }

    .grid-lanes {
      display: grid-lanes;
      grid-lanes-direction: row;
      grid-template-rows: repeat(4, 50px);
      grid-lanes-pack: dense;
      padding: 2px;
      margin: 5px;
    }

    item {
      display: block;
      color: white;
    }
  </style>
</head>
<body>

<div class="grid-lanes">
  <item style="width: 70px; background: salmon;">1</item>
  <item style="width: 20px; background: salmon; grid-row: 4;">2</item>
  <item style="width: 20px; background: salmon; grid-row: 3 / span 2;">3</item>
  <item style="width: 20px; background: salmon; grid-row: span 4;">4</item>
  <item style="background: green; grid-row: span 2; justify-self: stretch;">5</item>
</div>

<div class="grid-lanes">
  <item style="width: 70px; background: salmon;">1</item>
  <item style="width: 20px; background: salmon; grid-row: 4;">2</item>
  <item style="width: 20px; background: salmon; grid-row: 3 / span 2;">3</item>
  <item style="width: 20px; background: salmon; grid-row: span 4;">4</item>
  <item style="width: 10px; background: green; grid-row: span 2; justify-self: center;">5</item>
</div>

</body>
</html>

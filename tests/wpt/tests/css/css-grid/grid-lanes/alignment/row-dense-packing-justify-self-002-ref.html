<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      color: black; background-color: white; font: 16px/1 monospace; padding: 0; margin: 0;
    }

    .grid {
      display: grid;
      grid-template-rows: repeat(2, 60px);
      grid-template-columns: 80px 30px;
      padding: 2px;
      margin: 5px;
      justify-items: start;
    }

    item {
      display: block;
      color: white;
    }
  </style>
</head>
<body>

<div class="grid">
  <item style="width: 80px; background: salmon; grid-row: 1; grid-column: 1;">1</item>
  <item style="width: 30px; background: salmon; grid-row: 1 / span 2; grid-column: 2;">2</item>
  <item style="background: green; grid-row: 2; grid-column: 1; justify-self: stretch;">3</item>
</div>

<div class="grid">
  <item style="width: 80px; background: salmon; grid-row: 1; grid-column: 1;">1</item>
  <item style="width: 30px; background: salmon; grid-row: 1 / span 2; grid-column: 2;">2</item>
  <item style="width: 40px; background: green; grid-row: 2; grid-column: 1; justify-self: center;">3</item>
</div>

</body>
</html>

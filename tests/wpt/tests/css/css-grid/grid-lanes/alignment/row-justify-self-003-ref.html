<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reference: justify-self overrides justify-items in row direction</title>
  <link rel="author" title="Celeste Pan" href="mailto:celestepan@microsoft.com">
  <style>
    html, body {
      color: black; background-color: white; font: 16px/1 monospace; padding: 0; margin: 0;
    }

    .grid {
      display: grid;
      grid-template-rows: repeat(3, 80px);
      grid-template-columns: 80px 110px 1fr;
      width: 500px;
      gap: 10px;
      padding: 2px;
      margin: 5px;
      justify-items: start;
    }

    .track {
      display: flex;
      flex-direction: row;
      gap: 10px;
    }

    item {
      display: block;
      color: white;
    }
  </style>
</head>
<body>

<div class="grid">
  <div style="grid-row: 1; grid-column: 1; justify-self: stretch; display: flex; flex-direction: row; justify-content: center;">
    <item style="width: 40px; background: #f4a0a0;">1</item>
  </div>
  <div class="track" style="grid-row: 2; grid-column: 1;">
    <item style="width: 80px; background: #aad4f5;">2</item>
  </div>
  <item style="width: 200px; background: #2ca02c; grid-row: 3; grid-column: 1 / span 2;">3</item>
  <item style="background: #f4a0a0; grid-row: 1 / span 2; grid-column: 2; justify-self: stretch;">4</item>
  <item style="background: #2ca02c; grid-row: 1 / span 3; grid-column: 3; justify-self: stretch;">5</item>
</div>

</body>
</html>

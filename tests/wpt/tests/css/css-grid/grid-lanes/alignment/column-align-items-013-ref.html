<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      color: black; background-color: white; font: 16px/1 monospace; padding: 0; margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: 1fr;
      height: 300px;
      gap: 5px;
      padding: 2px;
      margin: 5px;
      border: 1px solid;
    }

    item {
      display: block;
      color: white;
    }
  </style>
</head>
<body>

<div class="grid" style="align-items: end;">
  <item style="grid-row: 1; grid-column: 2 / 4; height: 40px; margin-bottom: 10px; background: #f4a0a0;">1</item>
  <item style="grid-row: 1; grid-column: 1; height: 60px; background: #2ca02c;">2</item>
  <item style="grid-row: 1; grid-column: 1 / 4; height: 50px; margin-bottom: 65px; background: #ff7f0e;">3</item>
  <item style="grid-row: 1; grid-column: 3; height: 30px; margin-bottom: 135px; background: #ffbb78;">4</item>
  <item style="grid-row: 1; grid-column: 2; height: 60px; margin-bottom: 120px; background: #aad4f5;">5</item>
  <item style="grid-row: 1; grid-column: 2 / 4; height: 40px; margin-bottom: 222.5px; background: #c5b0d5;">6</item>
  <item style="grid-row: 1; grid-column: 1; height: 50px; margin-bottom: 185px; background: #98df8a;">7</item>
</div>

</body>
</html>

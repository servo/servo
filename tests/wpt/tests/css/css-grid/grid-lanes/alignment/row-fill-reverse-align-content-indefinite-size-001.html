<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: row fill-reverse align-content aligns entire block of tracks within the larger container with indefinite size</title>
  <link rel="author" title="Celeste Pan" href="mailto:celestepan@microsoft.com">
  <link rel="match" href="row-fill-reverse-align-content-indefinite-size-001-ref.html">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#alignment">
  <style>
    html, body {
      font: 16px/1 monospace;
      background: white;
    }

    .grid-lanes {
      display: grid-lanes;
      grid-lanes-direction: row fill-reverse;
      grid-template-rows: repeat(2, 70px);
      gap: 4px;
      height: 170px;
      border: 1px solid;
    }

    item {
      display: block;
      width: min-content;
      height: min-content;
      color: white;
      background: #555;
    }
  </style>
</head>
<body>
  <!-- Container alignment -->
  <p>align-content: start</p>
  <div class="grid-lanes" style="align-content: start;">
    <item>item 1</item>
    <item>item 2</item>
    <item>item 3</item>
  </div>

  <!-- Container alignment -->
  <p>align-content: center</p>
  <div class="grid-lanes" style="align-content: center;">
    <item>item 1</item>
    <item>item 2</item>
    <item>item 3</item>
  </div>

  <!-- Container alignment -->
  <p>align-content: end</p>
  <div class="grid-lanes" style="align-content: end;">
    <item>item 1</item>
    <item>item 2</item>
    <item>item 3</item>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      color: black; background-color: white; font: 16px/1 monospace; padding: 0; margin: 0;
    }

    .grid {
      display: grid;
      grid-template-rows: repeat(4, 50px);
      grid-template-columns: 70px 20px;
      padding: 2px;
      margin: 5px 5px 30px 5px;
    }

    item {
      display: block;
      color: white;
    }
  </style>
</head>
<body>

<div class="grid">
  <item style="grid-row: 4; grid-column: 1; width: 70px; justify-self: start; background: salmon;">1</item>
  <item style="grid-row: 1; grid-column: 1; width: 20px; justify-self: start; background: salmon;">2</item>
  <item style="grid-row: 1 / span 2; grid-column: 1; width: 20px; margin-left: 20px; justify-self: start; background: salmon;">3</item>
  <item style="grid-row: 1 / span 4; grid-column: 2; width: 20px; background: salmon;">4</item>
  <item style="grid-row: 2 / span 2; grid-column: 1; width: 10px; justify-self: start; background: green;">5</item>
</div>

<div class="grid">
  <item style="grid-row: 4; grid-column: 1; width: 70px; justify-self: start; background: salmon;">1</item>
  <item style="grid-row: 1; grid-column: 1; width: 20px; justify-self: start; background: salmon;">2</item>
  <item style="grid-row: 1 / span 2; grid-column: 1; width: 20px; margin-left: 20px; justify-self: start; background: salmon;">3</item>
  <item style="grid-row: 1 / span 4; grid-column: 2; width: 20px; background: salmon;">4</item>
  <item style="grid-row: 2 / span 2; grid-column: 1; width: 10px; margin-left: 10px; justify-self: start; background: green;">5</item>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      font: 16px/1 monospace;
      background: white;
    }

    .container {
      display: grid;
      grid-template-rows: repeat(2, 80px);
      gap: 4px;
      height: min-content;
      width: 180px;
      border: 1px solid blue;
    }

    .row-grid {
      display: grid;
      grid-auto-flow: column;
      justify-content: end;
      gap: 4px;
    }

    item {
      display: block;
      width: min-content;
      color: white;
      background: #555;
    }
  </style>
</head>
<body>
  <p>align-items: baseline</p>
  <div class="container">
    <div class="row-grid" style="align-items: baseline;">
      <item>item 5</item>
      <item>item 3</item>
      <item>item 1 with some extra text</item>
    </div>
    <div class="row-grid" style="align-items: baseline;">
      <item>item 6</item>
      <item>item 4</item>
      <item>item 2</item>
    </div>
  </div>
</body>
</html>

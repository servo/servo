<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: row fill-reverse justify-content aligns the entire block of items along the stacking axis with indefinite size</title>
  <link rel="author" title="Celeste Pan" href="mailto:celestepan@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#alignment">
  <link rel="match" href="row-fill-reverse-justify-content-indefinite-size-001-ref.html">
  <style>
    html, body {
      font: 16px/1 monospace;
      background: white;
    }

    .grid-lanes {
      display: grid-lanes;
      grid-lanes-direction: row fill-reverse;
      grid-template-rows: repeat(2, 70px);
      gap: 4px;
      height: 170px;
      border: 1px solid;
    }

    item {
      display: block;
      width: 56px;
      height: 26px;
      color: white;
      background: #2ca02c;
    }
  </style>
</head>
<body>
  <p>justify-content: start</p>
  <div class="grid-lanes" style="justify-content: start;">
    <item>1</item>
    <item>2</item>
    <item>3</item>
    <item>4</item>
  </div>

  <p>justify-content: center</p>
  <div class="grid-lanes" style="justify-content: center;">
    <item>1</item>
    <item>2</item>
    <item>3</item>
    <item>4</item>
  </div>

  <p>justify-content: end</p>
  <div class="grid-lanes" style="justify-content: end;">
    <item>1</item>
    <item>2</item>
    <item>3</item>
    <item>4</item>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      font: 16px/1 monospace;
      background: white;
    }

    .container {
      display: flex;
      flex-direction: row;
      gap: 4px;
      width: 200px;
      height: 130px;
      border: 1px solid;
    }

    .col {
      display: flex;
      flex-direction: column-reverse;
      width: 80px;
      flex-shrink: 0;
      gap: 4px;
      align-items: start;
    }

    item {
      display: block;
      width: min-content;
      height: 28px;
      color: white;
      background: #555;
    }
  </style>
</head>
<body>
  <!-- Container alignment -->
  <p>justify-content: start</p>
  <div class="container" style="justify-content: start;">
    <div class="col">
      <item>start</item>
      <item>center</item>
      <item>end</item>
    </div>
  </div>

  <!-- Container alignment -->
  <p>justify-content: center</p>
  <div class="container" style="justify-content: center;">
    <div class="col">
      <item>start</item>
      <item>center</item>
      <item>end</item>
    </div>
  </div>

  <!-- Container alignment -->
  <p>justify-content: end</p>
  <div class="container" style="justify-content: end;">
    <div class="col">
      <item>start</item>
      <item>center</item>
      <item>end</item>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <style>
    .grid-lanes {
      display: grid-lanes;
      width: 400px;
      height: 400px;
      gap: 10px;
      grid-template-rows: 60px 1fr;
    }
    span { border: 1px solid; }
  </style>
</head>
<body>
  <div class="grid-lanes">
    <span>row1</span>
    <span>row2</span>
  </div>
</body>
</html>

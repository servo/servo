<!DOCTYPE HTML>
<html><head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: row-direction subgrid with empty tracks and row gap</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="row-subgrid-grid-gap-009-ref.html">
</head>
<body>
<div style="display:grid-lanes; grid-template-rows: auto 200px; height: 200px">
    <div style="display:grid; grid-template-rows: subgrid; gap: 100px; grid-row: span 2">
        <div style="width:100px; height: 100px; background-color: blue; grid-row: 2"></div>
    </div>
</div>
</body>
</html>

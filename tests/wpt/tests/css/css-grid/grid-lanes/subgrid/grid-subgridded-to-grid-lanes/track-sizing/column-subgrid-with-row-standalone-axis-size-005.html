<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: Subgridded item percentage resolves against the subgrid's standalone-axis tracks</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="../../../../../reference/ref-filled-green-100px-square.xht">
<style>
.wrapper {
  width: 100px;
  height: 100px;
  background: red;
}
.lanes {
  display: grid-lanes;
  grid-lanes-direction: column;
  width: min-content;
  height: 400px;
}
.subgrid {
  display: grid;
  grid-template-columns: subgrid;
  grid-template-rows: 200px;
}
.item {
  height: 50%;
  width: 100px;
  background: green;
}
</style>
</head>
<body>
<p>Test passes if there is a filled green square and <strong>no red</strong>.</p>
<div class="wrapper">
  <div class="lanes">
    <div class="subgrid">
      <div class="item"></div>
    </div>
  </div>
</div>
</body>
</html>

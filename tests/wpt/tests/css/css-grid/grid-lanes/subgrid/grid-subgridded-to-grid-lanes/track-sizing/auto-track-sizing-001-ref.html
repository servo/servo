<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <style>
html,body {
  color:black; background-color:white; font:16px/1 monospace; padding:0; margin:0;
}

.grid {
  display: inline-grid;
  max-width: 260px;
  padding: 1px 5px;
  border: 1px solid;
  width: 100px;
  grid-auto-flow: column;
}

.subgrid {
  display: grid;
  grid-template-rows: subgrid;
  grid-template-columns: 100%;
  margin: 0px 5px 0px 10px;
}

.inner {
  margin: 0px 5px 0px 0px;
  background: grey;
}
  </style>
</head>
<article class="grid">
  <div class="subgrid" style="margin: 0px 10px 0px 10px; background: grey">
    The cat can not be separated from milk
  </div>
</article>

<article class="grid">
  <div class="subgrid">
    <div class="subgrid inner">
      The cat can not be separated from milk
    </div>
  </div>
</article>

<article class="grid" style="grid-auto-flow: row;">
  <div class="subgrid" style="grid-template-columns: subgrid">
    <div class="subgrid inner">
      The cat can not be separated from milk
    </div>
  </div>
</article>

<article class="grid">
  <div class="subgrid">
    <div class="subgrid inner" style="grid-template-columns: subgrid">
      The cat can not be separated from milk
    </div>
  </div>
</article>

<article class="grid" style="grid-auto-flow: row;">
  <div class="subgrid" style="grid-template-columns: subgrid">
    <div class="subgrid inner" style="grid-template-columns: subgrid">
      The cat can not be separated from milk
    </div>
  </div>
</article>
</html>

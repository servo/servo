<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: subgrid item percentage width (column-direction grid-lanes)</title>
  <link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-2">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
  <link rel="match" href="column-item-percentage-width-001-ref.html">
  <style type="text/css">
.grid-lanes {
  display: grid-lanes;
  grid-template-columns: auto auto;
  grid-column-gap: 60px;
  border: 1px solid;
  padding: 2px;
  padding-top: 5px;
  height: 300px;
}

.subgrid {
  display: grid;
  grid-template-columns: subgrid;
  grid-column: 1 / span 2;
  grid-column-gap: 40px;
  background: lightgrey;
  padding: 10px;
  padding-top: 5px;
}

.item {
  align-self: start;
  width: 100%;
  height: 100px;
  background: grey;
}
  </style>
</head>
<body>
<div class="grid-lanes">
  <div class="subgrid">
    <div class="item"></div>
    <div class="item" style="width:100px"></div>
  </div>
</div>
</body>
</html>

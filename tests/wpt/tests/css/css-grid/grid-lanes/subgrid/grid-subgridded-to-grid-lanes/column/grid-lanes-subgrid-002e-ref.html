<html><head>
  <meta charset="utf-8">
  <title>Reference: Grid Lanes layout with a subgrid (grid-lanes-subgrid-002e)</title>
  <link rel="author" title="Mats Palmgren" href="mailto:mats@mozilla.com">
<style>
html,body {
  color:black; background-color:white; font:10px/1 monospace; padding:0; margin:0;
}

grid {
  display: inline grid;
  grid-template-columns: 40px 30px 20px;
  gap: 4px 2px;
  padding: 1px 3px 5px 7px;
  border: solid;
  border-width: 3px 5px 1px 1px;
  background: lightgrey content-box;
}
item {
  background: grey;
  width: 3ch;
  position: relative;
}
item:nth-child(2n) { background:purple; width:auto; }
item:nth-child(1) {
  border: solid;
  border-width: 3px 5px 1px 1px;
  margin: 7px 1px 5px 3px;
}
subgrid {
  display: grid;
  grid-column: 2/span 2;
  grid: none / subgrid;
  grid-gap: 6px 8px;
  background: yellow;
  margin-top: -16px;
}
</style>
</head>
<body>
<!-- auto-placed subgrid inhibits subgridding when parent is doing grid-lanes layout ... -->
<grid>
  <item>1</item>
  <item style="height: min-content;">2</item>
  <item style="height: min-content;">3</item>
  <subgrid>
    <item>4a</item>
    <item>4b</item>
    <item>4c</item>
  </subgrid>
  <item style="height: min-content; grid-row: 2;">5</item>
</grid>
</body>
</html>

<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: subgrid implicit line names are clamped to the subgrid axis (columns)</title>
  <link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3">
  <link rel="match" href="column-line-names-010-ref.html">
  <style>
html,body {
  color:black; background-color:white; font:12px/1 monospace; padding:0; margin:0;
}

.grid-lanes > div { background: grey; grid-column:2 / span 2; }

x { background: silver; }
  </style>
</head>
<body>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(10, 30px); grid-template-areas: '. . . . . . a a a .';">
  <div style="display:grid; grid:auto/subgrid; grid-column:5 / 9;">
    <x style="grid-column: a">x</x>
  </div>
</div>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(10, 30px); grid-template-areas: 'a a a';">
  <div style="display:grid; grid:auto/subgrid; grid-column:5 / 9;">
    <x style="grid-column: a">x</x>
  </div>
</div>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(10, 30px); grid-template-areas: '. . . . . . a a a .';">
  <div style="display:grid; grid:auto/subgrid; grid-column:5 / 9;">
    <x style="grid-column: a-start / a-end">x</x>
  </div>
</div>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(10, 30px); grid-template-areas: 'a a a';">
  <div style="display:grid; grid:auto/subgrid; grid-column:5 / 9;">
    <x style="grid-column: a-start / a-end">x</x>
  </div>
</div>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(10, 30px); grid-template-areas: '. . . . . . a a a .';">
  <div style="display:grid; grid:auto/subgrid; grid-column:5 / 9; grid-template-areas: 'a a a';">
    <x style="grid-column: a">x</x>
  </div>
</div>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(10, 30px); grid-template-areas: 'a a a';">
  <div style="display:grid; grid:auto/subgrid; grid-column:5 / 9; grid-template-areas: 'a a a'">
    <x style="grid-column: a">x</x>
  </div>
</div>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(10, 30px); grid-template-areas: '. . . . . . a a a .';">
  <div style="display:grid; grid:auto/subgrid; grid-column:5 / 9; grid-template-areas: 'a a a'">
    <x style="grid-column: a-start / a-end">x</x>
  </div>
</div>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(10, 30px); grid-template-areas: 'a a a';">
  <div style="display:grid; grid:auto/subgrid; grid-column:5 / 9; grid-template-areas: 'a a a'">
    <x style="grid-column: a-start / a-end">x</x>
  </div>
</div>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(10, 30px); grid-template-areas: 'a a a';">
  <div style="display:grid; grid:auto/subgrid; grid-column:3 / 9; grid-template-areas: 'a a a'">
    <x style="grid-column: a-start / a-end">x</x>
  </div>
</div>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(10, 30px); grid-template-areas: 'a a a';">
  <div style="display:grid; grid:auto/subgrid [a];">
    <x style="grid-column: a">x</x>
  </div>
</div>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(10, 30px); grid-template-areas: 'a a a';">
  <div style="display:grid; grid:auto/subgrid [b] [b] [b] [a]; grid-column:1 / 9;">
    <x style="grid-column: a">x</x>
  </div>
</div>

<div class="grid-lanes" style="display:inline-grid-lanes; grid-template-columns: repeat(4, 30px); grid-template-areas: 'a b c d';">
  <div style="display:grid; grid:auto/subgrid; grid-column: a / d;">
    <x style="grid-column: c">x</x>
  </div>
</div>

</body>
</html>

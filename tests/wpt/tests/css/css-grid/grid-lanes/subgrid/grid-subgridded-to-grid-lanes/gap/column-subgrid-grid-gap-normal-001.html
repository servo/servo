<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: column-direction subgrid with the iniaital grid-gap value of normal</title>
  <link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
  <link rel="match" href="column-subgrid-grid-gap-normal-001-ref.html">
  <style>
  html,body {
    color:black; background-color:white; font:16px/1 monospace; padding:0; margin:0;
  }

  .grid-lanes {
    display: grid-lanes;
    gap: 10px;
    grid-template-columns: 150px 100px 150px 100px;
    background-color: #fff;
    color: #444;
  }

  .box {
    background-color: #444;
    color: #fff;
    padding: 20px;
  }

  .box .box {
    background-color: #ccc;
    color: #444;
  }

  .a {
    grid-column: 1 / 3;
  }

  .b {
    grid-column: 4 ;
  }

  .c {
    grid-column: 1;
  }

  .d {
    grid-column: 2 / 5;
    display: grid;
    grid-template-columns: subgrid;
  }
  </style>
</head>
<body>
<div class="grid-lanes">
  <div class="box a">A</div>
  <div class="box b">B</div>
  <div class="box c">C</div>
  <div class="box d">
    <div class="box e">E</div>
    <div class="box f">F</div>
    <div class="box g">G</div>
    <div class="box h">H</div>
    <div class="box i">I</div>
  </div>
</div>
</body>
</html>

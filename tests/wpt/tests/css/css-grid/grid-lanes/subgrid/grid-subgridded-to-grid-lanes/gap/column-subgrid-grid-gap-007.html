<!DOCTYPE HTML>
<html><head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: nested orthogonal writing-mode column-direction subgrid</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="column-subgrid-grid-gap-007-ref.html">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
html,body {
  color:black; background-color:white; font:24px/1 Ahem; padding:0; margin:0;
}

.grid-lanes {
  display:inline-grid-lanes;
  grid-template-columns:100px auto;
  gap:20px;
  border:3px solid;
  background:yellow;
}
span { background:cyan; }
span:nth-child(2n+1) { background:grey; }

.hl { writing-mode: horizontal-tb; direction:ltr; }
.vrl { writing-mode: vertical-rl; direction:ltr; }
</style>
</head>
<body>
<div class="grid-lanes">
  <div class="vrl" style="display:grid; grid-template-columns:subgrid; gap:100px; grid-column:span 2/span 2; background:pink">
    <div class="hl" style="display:grid; grid-template-columns:subgrid; gap:100px; grid-column:span 2; background:lightgrey">
      <span>a</span><span>b</span>
    </div>
    <span style="grid-area:1/2">ccc</span>
  </div>
</div>
</body>
</html>

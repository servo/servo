<!DOCTYPE HTML>
<html><head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: row-direction subgrid with border</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="row-subgrid-grid-gap-002-ref.html">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
html,body {
  color:black; background-color:white; font:24px/1 Ahem; padding:0; margin:0;
}

.grid-lanes {
  display: grid-lanes;
  grid-template-rows: repeat(4, auto);
  place-content: start;
  border: 1px solid;
}

.subgrid {
  display: grid;
  grid-template-rows: subgrid;
  gap: 10px 20px;
  background: lightgrey;
  grid-row: 2 / span 5;
  min-height:10px;
  min-width:0;
  border: 0 solid lightblue;
  border-right-width: 40px;
  background: yellow;
}

.subgrid > * { background: lightgrey; }

x {
  min-height:10px;
  min-width:0px;
}
x:nth-child(2n+1) { background: silver; }
x:nth-child(2n+2) { background: magenta; }
x:nth-child(2n+3) { background: pink; }
x:nth-child(2n+4) { background: grey; }
</style>
</head>
<body>
<div class="grid-lanes">
<x style="grid-row:1"></x><x style="grid-row:2"></x><x style="grid-row:3"></x><x style="grid-row:4"></x><x style="grid-row:5"></x><x style="grid-row:6"></x>
<div class="subgrid">
<c>c</c>
<d>d</d>
</div>
</div>
</body>
</html>

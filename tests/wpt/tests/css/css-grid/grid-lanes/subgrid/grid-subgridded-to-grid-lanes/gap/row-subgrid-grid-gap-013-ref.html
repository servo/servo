<!DOCTYPE HTML>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
html,body {
  color:black; background-color:white; font:24px/1 Ahem; padding:0; margin:0;
}
.grid {
  display:inline-grid;
  grid-template-rows:80px 80px 80px;
  gap:20px;
  border:3px solid;
  background:yellow;
}
.subgrid {
  display:grid;
  grid-template-rows:subgrid;
  gap:100px;
  grid-row:span 3;
}
</style>
</head>
<body>
<div class="grid">
  <div class="subgrid" style="background:cyan;">
    <div class="subgrid" style="background:magenta; min-width:30px"></div>
  </div>
</div>
</body>
</html>

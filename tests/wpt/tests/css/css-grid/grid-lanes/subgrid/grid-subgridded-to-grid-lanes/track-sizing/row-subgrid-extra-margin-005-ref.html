<!DOCTYPE HTML>
<html>
<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
.grid {
  display: inline-grid;
  grid-template-rows: repeat(3, 50px);
  background: red;
}
.subgrid {
  display: grid;
  grid-row: span 3;
  grid-template: subgrid / auto;
  background: green;
  padding: 11px 7px 20px 13px;
  border-width: 14px 18px 5px 12px;
  border-style: solid;
  border-color: green;
}
</style>
</head>
<body>
<div class="grid">
  <div class="subgrid">
    <div class="subgrid"></div>
  </div>
</div>
</body>
</html>

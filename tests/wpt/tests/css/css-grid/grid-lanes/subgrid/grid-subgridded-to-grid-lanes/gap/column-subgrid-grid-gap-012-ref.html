<!DOCTYPE HTML>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
html,body {
  color:black; background-color:white; font:24px/1 Ahem; padding:0; margin:0;
}
.grid {
  display:inline-grid;
  grid-template-columns:130px 130px 130px;
  gap:20px; border:3px solid;
  background:yellow;
}
.subgrid {
  display:grid;
  grid-template-columns:subgrid;
  gap:100px;
  grid-column:span 3;
}
span { background:cyan; min-height:40px; }
span:nth-child(2n+1) { background:grey; }
</style>
</head>
<body>
<div class="grid">
  <div class="subgrid">
    <div class="subgrid">
      <span style="width:30px; grid-column:1">a</span>
      <span style="width:50px; grid-column:2">b</span>
      <span style="width:30px; grid-column:3">c</span>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE HTML>
<html><head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: column-direction subgrid with column gap larger than the track size</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="column-subgrid-grid-gap-010-ref.html">
</head>
<body>
<div style="display:grid-lanes; grid-template-columns: 100px 100px 100px; width: 300px">
    <div style="display:grid; grid-template-columns: subgrid; gap: 150px; grid-column: span 3">
        <div style="width:100px; height: 100px; background-color: blue; grid-column: 2"></div>
        <div style="width:100px; height: 100px; background-color: blue; grid-column: 3"></div>
    </div>
</div>
</body>
</html>

<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <style>
html,body {
  color:black; background-color:white; font:12px/1 monospace;
}

.grid-lanes {
  display: inline-grid-lanes;
  grid-template-rows: repeat(10,30px);
}

div > div {
  position: relative;
  display: grid;
  grid-row: 2 / span 2;
  grid: subgrid / auto;
  border: 1px solid black;
  background: grey;
}

x {
  background: silver;
}

.rtl { writing-mode: vertical-rl; direction:rtl; }
.ltr { writing-mode: vertical-rl; direction:ltr; }
  </style>
</head>
<body>

<div class="grid-lanes">
  <div class="rtl" style="grid-template-rows: subgrid [a][][];">
    <div class="ltr" style="grid-template-rows: subgrid [a][][];">
      <x style="grid-row: 1;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes">
  <div class="rtl" style="grid-template-rows: subgrid [][][a];">
    <div class="ltr" style="grid-template-rows: subgrid [a][][];">
      <x style="grid-row: 1;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes">
  <div class="rtl" style="grid-template-rows: subgrid [][][a]; grid-row-end:span 5;">
    <div class="ltr" style="grid-template-rows: subgrid [a][][];">
      <x style="grid-row: 2;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes">
  <div class="rtl" style="grid-template-rows: subgrid [a][a] 30px;">
    <div class="ltr" style="grid-template-rows: subgrid [][][a];">
      <x style="grid-row: 3;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes">
  <div class="rtl" style="grid-template-rows: subgrid [a][a] 30px;">
    <div class="ltr" style="grid-template-rows: subgrid [a][][];">
      <x style="grid-row: 1;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes">
  <div class="rtl" style="grid-template-rows: subgrid [][][a]; grid-row-end:span 5;">
    <div class="ltr" style="grid-template-rows: subgrid [a][][];">
      <x style="grid-row: 1;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes">
  <div class="rtl" style="grid-template-rows: subgrid [][][a]; grid-row-end:span 5;">
    <div class="ltr" style="grid-template-rows: subgrid [a][][];">
      <x style="grid-row: 2;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes" style="grid-template-rows: repeat(9,30px) [a] 30px;">
  <div class="rtl" style="grid-template-rows: subgrid [][][a]; grid-row-end:span 5;">
    <div class="ltr" style="grid-template-rows: subgrid [a][][];">
      <x style="grid-row: 1;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes" style="grid-template-rows: repeat(9,30px) [a] 30px;">
  <div class="rtl" style="grid-template-rows: subgrid [][][a]; grid-row-end:span 5;">
    <div class="ltr" style="grid-template-rows: subgrid [a][][];">
      <x style="grid-row: 2;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes" style="grid-template-rows: repeat(9,30px) [a] 30px;">
  <div class="rtl" style="grid-template-rows: subgrid [][][a]; grid-row:2/span 5;">
    <div class="ltr" style="grid-template-rows: subgrid [a][][];">
      <x style="grid-row: 1;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes" style="grid-template-rows: repeat(9,30px) [a] 30px">
  <div class="rtl" style="grid-template-rows: subgrid [][][a]; grid-row:2/span 5;">
    <div class="ltr" style="grid-template-rows: subgrid [a][][];">
      <x style="grid-row: 2;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes" style="grid-template-rows: repeat(4,30px) [a] 30px repeat(5,30px);">
  <div class="rtl" style="grid-template-rows: subgrid [a][a]; grid-row:2/span 5;">
    <div class="ltr" style="grid-template-rows: subgrid [a][a];">
      <x style="grid-row: 1;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes" style="grid-template-rows: repeat(4,30px) [a] 30px repeat(5,30px);">
  <div class="rtl" style="grid-template-rows: subgrid [a][a]; grid-row:2/span 5;">
    <div class="ltr" style="grid-template-rows: subgrid [a][a];">
      <x style="grid-row: 2;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes">
  <div class="rtl" style="grid-template-rows: subgrid [a] [a] [] [a]; grid-row-end:span 3;">
    <div class="ltr" style="grid-template-rows: subgrid [a] [a] [] [a]; grid-row-end:span 3;">
      <x style="grid-row: 1;">x</x>
    </div>
  </div>
</div>

<div class="grid-lanes">
  <div class="rtl" style="grid-template-rows: subgrid [a] [a] [] [a]; grid-row-end:span 3;">
    <div class="ltr" style="grid-template-rows: subgrid [a] [a] [] [a]; grid-row-end:span 3;">
      <x style="grid-row: 2;">x</x>
    </div>
  </div>
</div>

</body>
</html>

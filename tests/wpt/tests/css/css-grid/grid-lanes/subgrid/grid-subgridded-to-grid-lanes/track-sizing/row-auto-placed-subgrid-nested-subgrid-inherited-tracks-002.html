<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: Nested subgrid inside auto-placed subgrid inherits resolved auto row track</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="row-auto-placed-subgrid-inherited-tracks-002-ref.html">
<style>
.wrapper {
  width: 100px;
  height: 150px;
  background: red;
  position: relative;
}
.lanes {
  display: grid-lanes;
  grid-template-rows: 50px auto;
  flow-tolerance: 0;
  position: absolute;
  height: 150px;
  top: 0;
  left: 0;
}
.child {
  grid-row: 1;
  width: 100px;
  height: 50px;
  background: green;
}
.subgrid {
  display: grid;
  grid: subgrid / auto;
  grid-row: auto / span 1;
  overflow: hidden;
}
.nested-subgrid {
  display: grid;
  grid: subgrid / auto;
  grid-row: 1 / -1;
}
.nested-child {
  aspect-ratio: 1;
  height: 100%;
  background: green;
}
</style>
</head>
<body>
<p>Test passes if there is a filled green rectangle and <strong>no red</strong>.</p>
<div class="wrapper">
  <div class="lanes">
    <div class="child"></div>
    <div class="subgrid">
      <div class="nested-subgrid">
        <div class="nested-child"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

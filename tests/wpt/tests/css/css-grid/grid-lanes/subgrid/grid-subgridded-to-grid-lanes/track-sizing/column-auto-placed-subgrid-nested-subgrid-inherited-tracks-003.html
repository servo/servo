<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: Nested subgrid inside auto-placed subgrid spanning multiple column tracks</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="column-auto-placed-subgrid-inherited-tracks-001-ref.html">
<style>
.wrapper {
  width: 150px;
  height: 100px;
  background: red;
  position: relative;
}
.lanes {
  display: grid-lanes;
  grid-template-columns: 25px 25px 50px 50px;
  flow-tolerance: 0;
  position: absolute;
  top: 0;
  left: 0;
}
.child {
  grid-column: 1 / span 2;
  width: 50px;
  height: 100px;
  background: green;
}
.subgrid {
  display: grid;
  writing-mode: vertical-rl;
  grid: subgrid / auto;
  grid-column: auto / span 2;
  overflow: hidden;
}
.nested-subgrid {
  display: grid;
  grid: subgrid / auto;
  grid-row: 1 / -1;
}
.nested-child {
  aspect-ratio: 1;
  height: 100%;
  grid-row: 1 / -1;
  background: green;
}
</style>
</head>
<body>
<p>Test passes if there is a filled green rectangle and <strong>no red</strong>.</p>
<div class="wrapper">
  <div class="lanes">
    <div class="child"></div>
    <div class="subgrid">
      <div class="nested-subgrid">
        <div class="nested-child"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

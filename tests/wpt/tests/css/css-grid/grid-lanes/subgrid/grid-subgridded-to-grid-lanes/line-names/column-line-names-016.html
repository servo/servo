<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: auto placed subgrids don't inheirit line names (columns)</title>
  <link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3">
  <link rel="match" href="column-line-names-016-ref.html">
  <style>
html,body {
  color:black; background-color:white; font:24px/1 monospace; padding:0; margin:0;
}

.grid-lanes {
  display: inline-grid-lanes;
  grid-template-columns: repeat(10, 10px) repeat(10, [a] 10px) [a];
  padding: 20px 10px;
}

.subgrid {
  display: grid;
  grid: 50px / subgrid;
  grid-column: auto / span 10;
}

x { background: grey; }

  </style>
</head>
<body>
<div class="grid-lanes">
  <div class="subgrid">
    <x style="grid-column: span a / a 8"></x>
  </div>
</div>
</body>
</html>

<!DOCTYPE HTML>
<html><head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: nested column-direction subgrid, justify-content:space-around, overflowing</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="column-subgrid-grid-gap-006-ref.html">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
html,body {
  color:black; background-color:white; font:24px/1 Ahem; padding:0; margin:0;
}

body { margin:200px; }
span { background:cyan; }
span:nth-child(2n+1) { background:grey; }
</style>
</head>
<body>
<div style="display:inline-grid-lanes; grid-template-columns:100px 10px 10px; gap:100px; border:1px solid; justify-content:space-around; width:50px">
  <div style="display:grid; grid-template-columns:subgrid; gap:20px; grid-column:span 2">
    <span>a</span><span>b</span>
  </div>
</div>
</body>
</html>

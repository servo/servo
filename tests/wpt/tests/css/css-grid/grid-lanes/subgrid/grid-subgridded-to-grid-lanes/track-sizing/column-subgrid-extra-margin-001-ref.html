<!DOCTYPE HTML>
<html>
<meta charset="utf-8">
<style>
.grid {
  display: inline-grid;
  grid-template-columns: repeat(4, auto);
  grid-template-rows: auto auto;
  border: 1px solid;
}
item {
  width: 10px;
  height: 40px;
  background: grey;
}
.subgrid {
  display: grid;
  grid: auto / subgrid;
  grid-column: 1 / span 4;
  border: 0 solid lightblue;
  border-right-width: 80px;
  background: yellow;
}
.subgrid > item { background: lightgrey; }
</style>
<div class="grid">
  <item>1</item>
  <item>2</item>
  <item>3</item>
  <item style="width: 100%;">4</item>
  <div class="subgrid">
    <item>a</item>
    <item>b</item>
  </div>
</div>
</html>

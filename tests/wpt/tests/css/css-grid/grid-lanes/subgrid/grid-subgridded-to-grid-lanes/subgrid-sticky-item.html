<!doctype html>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: sticky inside subgrid (column-direction grid-lanes)</title>
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="help" href="https://drafts.csswg.org/css-grid-2">
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="match" href="../../../subgrid/sticky-subgrid-item.html">
<style>
:root { scrollbar-width: none }
body { margin: 0 }
.grid-lanes {
  display: grid-lanes;
  grid-template-columns: 1fr;
  margin-bottom: 100vh;
}

.subgrid {
  border: 10px solid orange;
  display: grid;
  grid-template-columns: subgrid;
  height: 400px;
  margin-bottom: 100px;
}

.sticky {
  background: red;
  position: sticky;
  top: 10px;
  height: 200px;
}
</style>
<div class="grid-lanes">
  <div class="subgrid">
    <div class="sticky">
      This should not be visible.
    </div>
  </div>
  <div class="subgrid" id="target"></div>
</div>
<script>
  target.scrollIntoView({ block: "start" });
</script>

<!DOCTYPE HTML>
<html>
<meta charset="utf-8">
<style>
.grid {
  display: inline-grid;
  grid-template-columns: auto auto;
  grid-template-rows: auto;
  border: 1px solid;
}
item {
  height: 40px;
  background: grey;
}
.stretch {
  justify-self: stretch;
  background: green;
}
.subgrid {
  display: grid;
  grid: auto / subgrid;
  grid-column: 1 / span 2;
  border: 0 solid lightblue;
  border-right-width: 80px;
  background: yellow;
}
.subgrid > item {
  width: 10px;
  background: lightgrey;
}
</style>
<div class="grid">
  <item style="width:10px">1</item>
  <item class="stretch">2</item>
  <div class="subgrid">
    <item>a</item>
  </div>
</div>
</html>

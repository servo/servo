<!doctype html>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: Button subgrid (column-direction grid-lanes)</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="help" href="https://drafts.csswg.org/css-grid-2/#subgrids">
<link rel="match" href="column-subgrid-button-ref.html">
<style>
.grid-lanes {
  display: grid-lanes;
  width: 400px;
  grid-template-columns: auto auto 1fr;
  background-color: #ccc;
}
.button {
  display: grid;
  grid-template-columns: subgrid;
  grid-column: span 3;
  text-align: initial;

  background: transparent;
  padding: 5px 10px;
  margin: 0;
  border: 2px solid;
  font: inherit;
}
.right {
  text-align: right;
}
</style>
<div class="grid-lanes">
  <button class="button">
    <span>hello</span>
    <span>,</span>
    <span class="right">world</span>
  </button>
</div>

<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: subgrid item using line names from grid-lanes (rows)</title>
  <link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3">
  <link rel="match" href="row-line-names-001-ref.html">
  <style>
html,body {
  color:black; background-color:white; font:24px/1 monospace; padding:0; margin:0;
}

.grid-lanes {
  display: inline-grid-lanes;
  grid-template-rows: [a] 50px 50px [a] 50px 50px [a];
  padding: 20px 10px;
}

.subgrid {
  display: grid;
  grid: subgrid / 50px;
  grid-row: 1 / span 3;
}

x { background: grey; }

  </style>
</head>
<body>

<div class="grid-lanes">
  <div class="subgrid">
    <x style="grid-row: span a / a -1"></x>
  </div>
</div>

<script>
  const expectedResults = [
    "subgrid [] [] [] []",
  ];
  [...document.querySelectorAll('.subgrid')].forEach(function(subgrid, i) {
    let actual = window.getComputedStyle(subgrid)['grid-template-rows'];
    let expected = expectedResults[i];
    if (actual != expected) {
      let err = "Unexpected getComputedStyle value for subgrid " + i + " with className '" + subgrid.className + "':" +
      " Actual: \"" + actual + "\", Expected: \"" + expected + "\"";
      document.body.appendChild(document.createTextNode(err));
    }
  });
</script>

</body>
</html>

<!DOCTYPE HTML>
<html>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: stretched item grows due to subgrid extra margin (rows)</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="row-subgrid-extra-margin-003-ref.html">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
.grid-lanes {
  display: inline grid-lanes;
  grid-template-rows: auto auto;
  border: 1px solid;
  font:10px/1 Ahem;
}
item {
  width: 40px;
  background: grey;
}
.stretch {
  align-self: stretch;
  background: green;
}
.subgrid {
  display: grid;
  grid: subgrid / auto;
  grid-row: 1 / span 2;
  border: 0 solid lightblue;
  border-bottom-width: 80px;
  background: yellow;
}
.subgrid > item {
  height: 10px;
  background: lightgrey;
}
</style>
<div class="grid-lanes">
  <item style="height:10px">1</item>
  <item class="stretch">2</item>
  <div class="subgrid">
    <item>a</item>
  </div>
</div>
</html>

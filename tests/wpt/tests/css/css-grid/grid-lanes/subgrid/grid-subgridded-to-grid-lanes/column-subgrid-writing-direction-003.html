<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: out-of-flow items in a column subgrid map repetitions according to writing direction</title>
  <link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
  <link rel="help" href="https://drafts.csswg.org/css-grid-2/#abspos-items">
  <link rel="match" href="../../../subgrid/writing-directions-003-ref.html">
  <style>
.grid-lanes {
  display: grid-lanes;
  grid-template-columns: repeat(5, 10px) repeat(5, 10px);
  width: 100px;
  height: 100px;
  border: 1px solid;
  background: grey;
}

.subgrid {
  position: relative;
  display: grid;
  grid-template-columns: subgrid;
  grid-template-rows: repeat(10, 10px);
  grid-column: 1 / span 10;
}

.grid-item {
  width: 10px;
  height: 10px;
  background: orange;
  border: 1px solid;
  position: absolute;
}

.rtl { direction:rtl; }
.ltr { direction:ltr; }
  </style>
</head>
<body>
<div class="grid-lanes">
  <div class="subgrid rtl">
    <div class="grid-item" style="grid-column: 10; grid-row: 10;"></div>
    <div class="grid-item" style="grid-column: 9; grid-row: 9;"></div>
    <div class="grid-item" style="grid-column: 8; grid-row: 8;"></div>
    <div class="grid-item" style="grid-column: 7; grid-row: 7;"></div>
    <div class="grid-item" style="grid-column: 6; grid-row: 6;"></div>
    <div class="grid-item" style="grid-column: 5; grid-row: 5;"></div>
    <div class="grid-item" style="grid-column: 4; grid-row: 4;"></div>
    <div class="grid-item" style="grid-column: 3; grid-row: 3;"></div>
    <div class="grid-item" style="grid-column: 2; grid-row: 2;"></div>
    <div class="grid-item" style="grid-column: 1; grid-row: 1;"></div>
  </div>
</div>

<div class="grid-lanes rtl">
  <div class="subgrid ltr">
    <div class="grid-item" style="grid-column: 10; grid-row: 10;"></div>
    <div class="grid-item" style="grid-column: 9; grid-row: 9;"></div>
    <div class="grid-item" style="grid-column: 8; grid-row: 8;"></div>
    <div class="grid-item" style="grid-column: 7; grid-row: 7;"></div>
    <div class="grid-item" style="grid-column: 6; grid-row: 6;"></div>
    <div class="grid-item" style="grid-column: 5; grid-row: 5;"></div>
    <div class="grid-item" style="grid-column: 4; grid-row: 4;"></div>
    <div class="grid-item" style="grid-column: 3; grid-row: 3;"></div>
    <div class="grid-item" style="grid-column: 2; grid-row: 2;"></div>
    <div class="grid-item" style="grid-column: 1; grid-row: 1;"></div>
  </div>
</div>
</body>
</html>

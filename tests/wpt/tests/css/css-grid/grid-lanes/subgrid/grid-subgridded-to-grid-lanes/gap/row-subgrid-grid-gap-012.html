<!DOCTYPE HTML>
<html><head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: nested row-direction subgrid with sized items</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="row-subgrid-grid-gap-012-ref.html">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
html,body {
  color:black; background-color:white; font:24px/1 Ahem; padding:0; margin:0;
}
.grid-lanes {
  display:inline-grid-lanes;
  grid-template-rows:auto auto auto;
  gap:20px; border:3px solid;
  background:yellow;
}
.subgrid {
  display:grid;
  grid-template-rows:subgrid;
  gap:100px;
  grid-row:span 3;
}
span { background:cyan; min-width:40px; }
span:nth-child(2n+1) { background:grey; }
</style>
</head>
<body>
<div class="grid-lanes">
  <div class="subgrid">
    <div class="subgrid">
      <span style="height:30px; grid-row:1">a</span>
      <span style="height:50px; grid-row:2">b</span>
      <span style="height:30px; grid-row:3">c</span>
    </div>
  </div>
</div>
</body>
</html>

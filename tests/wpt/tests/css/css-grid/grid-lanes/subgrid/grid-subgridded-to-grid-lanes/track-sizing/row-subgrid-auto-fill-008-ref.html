<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <style>
html,body {
  color:black; background-color:white; font:10px/1 monospace; padding:0; margin:0;
}

.grid {
  display: inline grid;
  grid-auto-rows: 15px;
  border: 1px solid;
}

.subgrid {
  display: grid;
  grid-row: 3 / span 4;
  grid-auto-columns: 8px;
  background: grey;
}

.fill-0a  { grid-template-rows: subgrid repeat(auto-fill, [y] [y]) [z] [z] [z] [z] [z] }  /* [z] [z] [z] [z] [z] */
.fill-0b  { grid-template-rows: subgrid [z] repeat(auto-fill, [z] [z] [z]) [z] }  /* [z] [z] [z] [z] [z] */
.fill-0c  { grid-template-rows: subgrid [x] repeat(auto-fill, [y] [y] [y]) [z] }  /* [x] [y] [y] [y] [z] */
.fill-0d  { grid-template-rows: subgrid [x] repeat(auto-fill, [z] [z]) }  /* [x] [z] [z] [z] [z] */
.fill-0e  { grid-template-rows: subgrid repeat(auto-fill, [x] [x]) [z] }  /* [x] [x] [x] [x] [z] */
.fill-0f  { grid-template-rows: subgrid repeat(auto-fill, [x] [x]) [z] [z] [z] }  /* [x] [x] [z] [z] [z] */
.fill-0g  { grid-template-rows: subgrid repeat(auto-fill, [x] [y]) [z] [z] }  /* [x] [y] [z] [z] [] */
.fill-0h  { grid-template-rows: subgrid repeat(auto-fill, [x] [y]) [z] }  /* [x] [y] [x] [y] [z] */
.fill-0i  { grid-template-rows: subgrid repeat(auto-fill, [x] [y]) }  /* [x] [y] [x] [y] [] */
.fill-0j  { grid-template-rows: subgrid repeat(auto-fill, [y]) [z] [z] }  /* [y] [y] [y] [z] [z] */
.fill-0k  { grid-template-rows: subgrid repeat(auto-fill, [x] [y]) [z] [z] }  /* [x] [y] [z] [z] [] */
.fill-0l  { grid-template-rows: subgrid [z] repeat(auto-fill, [x] [y]) [z] }  /* [z] [x] [y] [z] [] */
.fill-0m  { grid-template-rows: subgrid [z] repeat(auto-fill, [x] [y]) }  /* [z] [x] [y] [x] [y] */
.fill-0n  { grid-template-rows: subgrid repeat(auto-fill, [x] [y]) repeat(100, [z])}  /* [z] [z] [z] [z] [z] */
.fill-0o  { grid-template-rows: subgrid [z] repeat(auto-fill, [x] [y] [z]) }  /* [z] [x] [y] [z] [] */
.fill-0p  { grid-template-rows: subgrid [z] repeat(auto-fill, [x] [y] [z]) [x] }  /* [z] [x] [y] [z] [x] */
.fill-0q  { grid-template-rows: subgrid repeat(auto-fill, [x] [y] [z]) [x] }  /* [x] [y] [z] [x] [] */
.fill-0r  { grid-template-rows: subgrid [x] repeat(auto-fill, [y] [z]) }  /* [x] [y] [z] [y] [z] */

/* With span of 5... */
.fill-0s  {
  grid-row: 2 / span 5;
  grid-template-rows: subgrid [w] repeat(auto-fill, [y] [z]) [x]; /* [w] [y] [z] [y] [z] [x] */
}

/* With span of 6, same as fill-0s but with room for a partial additional repetition */
.fill-0t  {
  grid-row: 1 / span 6;
  grid-template-rows: subgrid [w] repeat(auto-fill, [y] [z]) [x]; /* [w] [y] [z] [y] [z] [x] [] */
}

.subgrid > :nth-child(2n)   {  background: black; }
.subgrid > :nth-child(2n+1) {  background: pink; }

  </style>
</head>

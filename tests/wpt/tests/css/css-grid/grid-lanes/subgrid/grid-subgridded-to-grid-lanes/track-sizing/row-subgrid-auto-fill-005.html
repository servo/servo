<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: subgrid with repeat(auto-fill / INTEGER, line-names)</title>
  <link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-2/#subgrid-listing">
  <link rel="match" href="row-subgrid-auto-fill-005-ref.html">
  <style>
html,body {
  color:black; background-color:white; font:10px/1 monospace; padding:0; margin:0;
}

.grid-lanes {
  display: inline grid-lanes;
  grid-template-rows: repeat(6, 20px);
  background: lightgrey;
}

.subgrid {
  display: grid;
  grid-row: 2 / span 4;
  background: black;
}

item {
  min-height: 0;
  min-width: 10px;
  grid-row:x -2 / x -1;
  background: grey;
}

  </style>
</head>
<body>

<div class="grid-lanes">
  <div class="subgrid" style="grid-template-rows:subgrid [] [] repeat(auto-fill,[]) [] [x]">
    <item></item>
  </div>
</div>

<div class="grid-lanes">
  <div class="subgrid" style="grid-template-rows:subgrid [] [] repeat(auto-fill,[x]) [] [] [x]">
    <item></item>
  </div>
</div>

<div class="grid-lanes">
  <div class="subgrid" style="grid-template-rows:subgrid [] [] repeat(auto-fill,[x]) [] [] [] [x]">

  </div>
</div>

<div class="grid-lanes">

    <item></item>
  </div>
</div>

<div class="grid-lanes">
  <div class="subgrid" style="grid-template-rows:subgrid [x] [x] repeat(auto-fill,[x]) [] [x] []">
    <item></item>
  </div>
</div>

<div class="grid-lanes">
  <div class="subgrid" style="grid-template-rows:subgrid [x] [x] repeat(auto-fill,[x]) [x] [x] []">
    <item></item>
  </div>
</div>

<div class="grid-lanes">
  <div class="subgrid" style="grid-template-rows:subgrid [] [] repeat(auto-fill,[x]) [] [] [] [] [x]">
    <item></item>
  </div>
</div>

<div class="grid-lanes">
  <div class="subgrid" style="grid-template-rows:subgrid [] [] repeat(1,[]) [x]">
    <item></item>
  </div>
</div>

<div class="grid-lanes">

  </div>
</div>

<div class="grid-lanes">

  </div>
</div>

<div class="grid-lanes">

<div class="grid-lanes">

</body>
</html>

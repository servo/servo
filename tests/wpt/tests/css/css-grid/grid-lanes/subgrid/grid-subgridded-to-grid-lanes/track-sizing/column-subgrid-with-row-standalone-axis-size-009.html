<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: Subgridded item is measured against the subgrid's standalone-axis tracks</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="../../../../../reference/ref-filled-green-100px-square.xht">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
.wrapper {
  width: 100px;
  height: 100px;
  background: red;
}
.lanes {
  display: grid-lanes;
  grid-lanes-direction: column;
  width: min-content;
  height: 100px;
  background: green;
  color: transparent;
  font: 25px/1 Ahem;
}
.subgrid {
  display: grid;
  grid-template-columns: subgrid;
}
</style>
</head>
<body>
<p>Test passes if there is a filled green square and <strong>no red</strong>.</p>
<div class="wrapper">
  <div class="lanes">
    <div class="subgrid" style="grid-template-rows: repeat(4, 1fr);">
      <div class="subgrid" style="grid-template-rows: subgrid;">
        <div class="subgrid" style="grid-template-rows: subgrid;">
          <div style="writing-mode: vertical-lr;">X X X X</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

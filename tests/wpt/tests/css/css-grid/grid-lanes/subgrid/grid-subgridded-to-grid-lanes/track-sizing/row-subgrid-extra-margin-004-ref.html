<!DOCTYPE HTML>
<html>
<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
.grid {
  display: inline-grid;
  grid-template-rows: 50px 50px 80px 10px;
  grid-template-columns: auto auto;
  border: 1px solid;
  font:10px/1 Ahem;
}
item {
  width: 40px;
  background: grey;
}
.stretch {
  align-self: stretch;
  background: green;
  grid-row: 3;
}
.subgrid {
  display: grid;
  grid: subgrid / auto;
  grid-row: span 2;
  padding-top: 80px;
  background: yellow;
}
</style>
<div class="grid">
  <item style="height:10px;">1</item>
  <item style="height:10px; grid-row: 2;">2</item>
  <item class="stretch">3</item>
  <item style="height:10px; grid-row: 4;">4</item>
  <div class="subgrid">
    <item style="height:10px">5</item>
    <item style="height:10px">6</item>
  </div>
</div>
</html>

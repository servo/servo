<!DOCTYPE HTML>
<html>
<meta charset="utf-8">
<style>
.grid {
  display: inline-grid;
  grid-template-columns: repeat(3, 50px) 40px;
  grid-template-rows: auto;
  border: 1px solid;
}
item {
  width: 10px;
  height: 40px;
  background: grey;
}
</style>
<div class="grid">
  <item>1</item>
  <item>2</item>
  <item>3</item>
  <item>4</item>
</div>
</html>

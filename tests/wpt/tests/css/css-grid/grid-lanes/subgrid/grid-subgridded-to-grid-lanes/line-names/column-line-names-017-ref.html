<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <style>
html,body {
  color:black; background-color:white; font:24px/1 monospace; padding:0; margin:0;
}

.grid {
  display: inline-grid-lanes;
  grid-template-columns: repeat(10, 10px) repeat(10, [a] 10px) [a];
  padding: 20px 10px;
}

.subgrid {
  display: grid;
  grid-column: auto / span 10;
}

  </style>
</head>
<body>
<div class="grid">
  <div class="subgrid" style="grid: 50px 50px / subgrid [a] [b] [c] [d] [e] [f];">
    <div class="subgrid" style="grid: subgrid / subgrid; grid-row: span 2;">
      <x style="grid-column: span 10; background: grey;"></x>
      <x style="grid-column: span 3 / 6; background: orange;"></x>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE HTML>
<html><head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: row-direction subgrid with row gap larger than 2x the track size</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="row-subgrid-grid-gap-011-ref.html">
</head>
<body>
<div style="display: grid-lanes; grid-template-rows: 100px 100px 100px; height: 300px">
  <div style="display: grid; grid-template-rows: subgrid; gap: 250px; grid-row: span 3">
    <div style="width: 100px; height: 100px; background-color: blue; grid-row: 2"></div>
    <div style="width: 100px; height: 100px; background-color: blue; grid-row: 3"></div>
  </div>
</div>
</body>
</html>

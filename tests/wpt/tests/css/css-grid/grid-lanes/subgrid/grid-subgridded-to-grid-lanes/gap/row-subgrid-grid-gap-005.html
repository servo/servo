<!DOCTYPE HTML>
<html><head>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: nested row-direction subgrid with smaller row gap</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="match" href="row-subgrid-grid-gap-005-ref.html">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<style>
html,body {
  color:black; background-color:white; font:24px/1 Ahem; padding:0; margin:0;
}

span { background:cyan; }
span:nth-child(2n+1) { background:grey; }
</style>
</head>
<body>
<div style="display:inline-grid-lanes; grid-template-rows:100px 0px; gap:100px; border:1px solid;">
  <div style="display:grid; grid-template-rows:subgrid; gap:20px; grid-row:span 2">
    <span>a</span><span>b</span>
  </div>
</div>
</body>
</html>

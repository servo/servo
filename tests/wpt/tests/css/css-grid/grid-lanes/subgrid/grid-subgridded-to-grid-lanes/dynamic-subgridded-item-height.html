<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS Grid Lanes Test: Subgridded item changing its height dynamically</title>
<link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
<link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
<link rel="help" href="https://drafts.csswg.org/css-grid-2/#algo-overview">
<link rel="match" href="../../../../reference/ref-filled-green-100px-square.xht">
<style>
.wrapper {
  background: red;
  height: 100px;
  width: 100px;
}
.grid-lanes {
  display: grid-lanes;
  grid-template-columns: 100px;
}
.subgrid {
  display: grid;
  grid-template-columns: subgrid;
  overflow: clip;
}
.container { background: green }
</style>
<p>Test passes if there is a filled green square and <strong>no red</strong>.</p>
<div class="wrapper">
  <div class="grid-lanes">
    <div class="subgrid">
      <div class="container">
        <div id="inner"></div>
      </div>
    </div>
  </div>
</div>
<script>
document.body.offsetHeight;
document.getElementById('inner').style.height = '100px';
</script>

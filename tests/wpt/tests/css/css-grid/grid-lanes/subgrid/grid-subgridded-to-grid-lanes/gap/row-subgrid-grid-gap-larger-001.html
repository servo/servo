<!DOCTYPE HTML>
<html><head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: row-direction subgrid grid-gap:20px (parent gap 0)</title>
  <link rel="author" title="Alison Maher" href="mailto:almaher@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#subgrids">
  <link rel="match" href="row-subgrid-grid-gap-larger-001-ref.html">
  <style>
  html,body {
    color:black; background-color:white; font:16px/1 monospace; padding:0; margin:0;
  }

  .grid-lanes {
    display: grid-lanes;
    gap: 0;
    grid-template-rows: repeat(3,auto);
    background-color: #fff;
    color: #444;
  }

  .box {
    background-color: #444;
    color: #fff;
    padding: 20px;
  }

  .box .box {
    background-color: #ccc;
    color: #444;
  }

  .c {
    grid-row: 2 / 4;
  }

  .box .f { background-color: purple; }
  .box .i { background-color: blue; }
  .box .e { background-color: yellow; }
  .a { background-color: grey; }
  .c { background-color: black; }
  .b { background-color: black; }

  .d {
    grid-row: 2 / 4;
    display: grid;
    gap: 20px;
    grid-template-rows: subgrid;
  }
  </style>
</head>
<body>
<div class="grid-lanes">
  <div class="box a">A</div>
  <div class="box b">B</div>
  <div class="box c">C</div>
  <div class="box d">
    <div class="box e">E</div>
    <div class="box f">F</div>
    <div class="box g">G</div>
    <div class="box h">H</div>
    <div class="box i">I</div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: padding overflowing the stacking axis of a grid-lanes container</title>
  <link rel="author" title="Yanling Wang" href="mailto:yanlingwang@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3">
  <link rel="match" href="grid-lanes-overflowing-container-012-ref.html">
  <meta name="assert" content="This test verifies that a vertical scrollbar is shown when end padding causes stacking axis overflow in a column-direction grid-lanes container.">
  <style>
    .grid-lanes {
      display: grid-lanes;
      flow-tolerance: 0;
      grid-template-columns: 50px;
      width: 100px;
      height: 100px;
      padding: 0 0 50px 0;
      box-sizing: border-box;
      overflow: auto;
    }
  </style>
</head>
<body>
  <p>Test passes if the container has a vertical scrollbar and the item fills the top portion.</p>
  <div class="grid-lanes">
    <div style="width:50px; height:80px; background:rgba(70,130,180,0.6);"></div>
  </div>
</body>
</html>

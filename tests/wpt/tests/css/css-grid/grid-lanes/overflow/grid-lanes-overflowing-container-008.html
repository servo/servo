<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: empty grid-lanes with oversized column track causes overflow</title>
  <link rel="author" title="Yanling Wang" href="mailto:yanlingwang@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3">
  <link rel="match" href="../../grid-model/reference/100x100-grey-box-with-horizontal-scrollbar.html">
  <meta name="assert" content="This test verifies that a horizontal scrollbar is shown on an empty column-direction grid-lanes container when the column track exceeds the container width.">
  <style>
    .grid-lanes {
      display: grid-lanes;
      flow-tolerance: 0;
      grid-template-columns: 150px;
      width: 100px;
      height: 100px;
      background-color: grey;
      overflow: auto;
    }
  </style>
</head>
<body>
  <p>The test passes if you see a grey square below and only the horizontal scrollbar is visible.</p>
  <div class="grid-lanes"></div>
</body>
</html>

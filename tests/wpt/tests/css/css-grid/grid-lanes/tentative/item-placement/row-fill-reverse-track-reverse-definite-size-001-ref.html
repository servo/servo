<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    .container {
      display: grid;
      grid-template-rows: repeat(3, 50px);
      row-gap: 10px;
      width: 200px;
      border: solid blue;
    }

    .track {
      display: flex;
      width: 200px;
      height: 50px;
    }

    .item {
      height: 50px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <p>Test that grid-lanes items with fill-reverse and track-reverse placement are correctly positioned
     within a definite-size row container.</p>
  <div class="container">
    <div class="track">
      <div class="item" style="background: gold; margin-left: 65px; width: 30px;">10</div>
      <div class="item" style="background: lightskyblue; width: 35px;">6</div>
      <div class="item" style="background: lavender; margin-left: 20px; width: 20px;">5</div>
      <div class="item" style="background: lightgreen; margin-left: 10px; width: 20px;">3</div>
    </div>
    <div class="track">
      <div class="item" style="background: tomato; margin-left: 60px; width: 15px;">11</div>
      <div class="item" style="background: lightpink; margin-left: 10px; width: 40px;">8</div>
      <div class="item" style="background: lightpink; margin-left: 10px; width: 25px; height: 110px;">4</div>
      <div class="item" style="background: orchid; margin-left: 10px; width: 15px; z-index: 1;">12</div>
      <div class="item" style="background: lightskyblue; width: 15px; overflow: hidden;"></div>
    </div>
    <div class="track">
      <div class="item" style="background: coral; margin-left: 65px; width: 30px;">9</div>
      <div class="item" style="background: lightgreen; margin-left: 10px; width: 20px;">7</div>
      <div class="item" style="background: lavender; margin-left: 55px; width: 20px;">1</div>
    </div>
  </div>
</body>
</html>

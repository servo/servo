<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: evaluate how the baseline affects the grid-lanes intrinsic size</title>
  <link rel="author" title="Yanling Wang" href="mailto:yanlingwang@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#track-sizing-performance">
  <link rel="match" href="grid-lanes-baseline-alignment-affects-intrinsic-size-001-ref.html">
  <style>
    .grid-lanes {
      display: grid-lanes;
      font-size: 0;
      width: 100px;
      margin-bottom: 20px;
      align-items: baseline;
      background: lightgray;
    }

    .tall-baseline {
      height: 60px;
      width: 40px;
      background: yellow;
      grid-row: 1;
    }

    .tall-baseline::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 60px;
      vertical-align: bottom;
    }

    .short-baseline {
      height: 30px;
      width: 40px;
      background: magenta;
      grid-row: 1;
    }

    .short-baseline::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      vertical-align: top;
    }
  </style>
</head>
<body>
<div class="grid-lanes" style="grid-template-rows: minmax(auto, 0px);">
  <div class="tall-baseline"></div>
  <div class="short-baseline"></div>
</div>

<div class="grid-lanes" style="grid-template-rows: minmax(auto, 75px);">
  <div class="tall-baseline"></div>
  <div class="short-baseline"></div>
</div>

<div class="grid-lanes" style="grid-template-rows: minmax(auto, 150px);">
  <div class="tall-baseline"></div>
  <div class="short-baseline"></div>
</div>

<div class="grid-lanes" style="grid-template-rows: minmax(auto, auto);">
  <div class="tall-baseline"></div>
  <div class="short-baseline"></div>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: evaluate how baseline alignment with multi-span items affects intrinsic track sizes</title>
  <link rel="author" title="Yanling Wang" href="mailto:yanlingwang@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#track-sizing-performance">
  <link rel="match" href="grid-lanes-baseline-alignment-affects-intrinsic-size-010-ref.html">
  <link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
  <style>
    .wrapper {
      width: 200px;
    }
    .grid-lanes {
      display: grid-lanes;
      height: 200px;
      margin-bottom: 20px;
      justify-items: last baseline;
      background: lightgray;
      font-family: Ahem;
      line-height: 1;
      flow-tolerance: 0;
    }
  </style>
</head>
<body>
<div class="wrapper">
<!-- Two 1-span items in columns 1 and 3, and a singular 3-span item across
     all columns. Column 2 is fixed at 30px. All items use last-baseline
     (justify) alignment, so the 3-span item participates in column 3
     (last-baseline → end-most track). -->
<div class="grid-lanes" style="grid-template-columns: minmax(0px, auto) 30px minmax(0px, auto);">
  <div style="font-size: 20px; padding-right: 20px; height: 50px; background: lightblue; grid-column: 1;">É</div>
  <div style="font-size: 10px; height: 50px; width: 20px; background: lightyellow; grid-column: 3;">É</div>
  <div style="font-size: 20px; padding-left: 50px; height: 50px; width: 110px; background: lightgreen; grid-column: 1 / span 3;">É</div>
</div>

<!-- Three 1-span items in columns 1-3, and two 2-span items overlapping
     columns 1-2 and 2-3. Column 2 is fixed at 20px. All items use
     last-baseline alignment, so span-2 items participate in their end-most
     columns. -->
<div class="grid-lanes" style="grid-template-columns: minmax(0px, auto) 20px minmax(0px, auto);">
  <div style="font-size: 10px; height: 50px; background: coral; grid-column: 1;">É</div>
  <div style="font-size: 10px; height: 50px; background: plum; grid-column: 2;">É</div>
  <div style="font-size: 10px; height: 50px; width: 30px;background: lightsalmon; grid-column: 3;">É</div>
  <div style="font-size: 20px; padding-left: 30px; height: 50px; background: gold; grid-column: 1 / span 2;">É</div>
  <div style="font-size: 20px; padding-left: 25px; height: 50px; background: palegreen; grid-column: 2 / span 2;">É</div>
</div>
</div>
</body>
</html>

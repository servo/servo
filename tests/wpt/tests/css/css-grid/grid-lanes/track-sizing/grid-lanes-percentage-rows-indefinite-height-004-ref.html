<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" type="text/css" href="/fonts/ahem.css" />
  <style>
    .grid {
        display: grid;
        grid-auto-flow: column;
        position: relative;
        font: 25px/1 Ahem;
        color: transparent;
        margin: 20px 0;
        width: 50px;
    }
    .grid > div {
        width: 100%;
    }
  </style>
</head>
<body>
  <div class="grid" style="grid-template-rows: 25px 25px; background: yellow;">
      <div style="background: orange;">X</div>
  </div>

  <div class="grid" style="grid-template-rows: 0px 25px; height: 50px; background: yellow;">
      <div style="background: orange;">X</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" type="text/css" href="/fonts/ahem.css" />
  <style>
    .grid {
        display: grid;
        grid-auto-flow: column;
        position: relative;
        font: 25px/1 Ahem;
        color: transparent;
        margin: 20px 0;
        width: 50px;
    }
  </style>
</head>
<body>
  <div class="grid" style="grid-template-rows: 60%; background: red;">
      <div style="background: green;">X</div>
  </div>

  <div class="grid" style="grid-template-rows: 60%; background: red;">
      <div style="background: green;">X<br>X</div>
  </div>

  <div class="grid" style="grid-template-rows: 140%; background: gray;">
      <div style="background: green;">X</div>
  </div>

  <div class="grid" style="grid-template-rows: 60%; border: 5px solid; background: red;">
      <div style="background: green;">X</div>
  </div>
</body>
</html>

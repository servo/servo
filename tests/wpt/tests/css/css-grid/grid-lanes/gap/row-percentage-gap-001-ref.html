<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    .grid {
        display: grid;
        grid-auto-flow: column;
        grid-template-rows: 50px 50px;
        grid-template-columns: 100px 100px;
        gap: 20%;
    }
    .grid > div {
        background: green;
    }
  </style>
</head>
<body>
  <div class="grid">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
  </div>
</body>
</html>

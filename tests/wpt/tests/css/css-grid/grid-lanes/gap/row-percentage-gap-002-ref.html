<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    .grid {
        display: grid;
        grid-auto-flow: column;
        grid-template-rows: 40px 40px 40px;
        row-gap: 10%;
        min-height: 200px;
        width: 100px;
        background: gray;
    }
    .grid > div {
        background: green;
    }
  </style>
</head>
<body>
  <div class="grid">
      <div></div>
      <div></div>
      <div></div>
  </div>
</body>
</html>

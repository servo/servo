<!DOCTYPE html>
<style>
.grid {
    display: grid;
    grid-template-columns: 202px 198px 200px;
    grid-template-rows: 100px;
    width: 600px;
}
</style>
<div class="grid">
    <div style="grid-column: 1 / 2; background: red"></div>
    <div style="grid-column: 2 / 3; background: green"></div>
    <div style="grid-column: 3 / 4; background: blue"></div>
</div>

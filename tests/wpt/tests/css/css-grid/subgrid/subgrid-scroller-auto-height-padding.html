<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS Grid Test: subgrid row track is sized accounting for inline padding when the subgrid is a scroll container</title>
<link rel="author" title="Emilio Cobos Álvarez" href="mailto:emilio@crisal.io">
<link rel="help" href="https://drafts.csswg.org/css-grid-2/#subgrid-size-contribution">
<link rel="match" href="subgrid-scroller-auto-height-padding-ref.html">
<style>
  .grid {
    display: grid;
    grid-template-columns: 220px;
    grid-auto-rows: auto auto;
  }

  .box {
    display: grid;
    grid-template-rows: subgrid;
    grid-row: span 2;
    overflow: hidden;
    padding: 0 60px;
    background: #eee;
  }

  .item { grid-row: 1; line-height: 24px; }
  .footer { grid-row: 2; margin: 0; background: tomato; }
</style>
<div class="grid">
  <div class="box">
    <div class="item"><div>wrapping wrapping wrapping wrapping wrapping wrapping wrapping</div></div>
    <p class="footer">FOOTER</p>
  </div>
</div>

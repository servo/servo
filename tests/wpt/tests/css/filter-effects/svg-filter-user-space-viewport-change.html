<!doctype html>
<html class="reftest-wait">
<title>Filter Effects: userSpaceOnUse filter updates on viewport change</title>
<link rel="help" href="https://www.w3.org/TR/filter-effects-1/#element-attrdef-filter-filterunits">
<link rel="match" href="reference/green-100x100.html">
<script src="/common/rendering-utils.js"></script>
<script src="/common/reftest-wait.js"></script>
<svg id="svg" width="100" height="100">
    <filter id="flood" filterUnits="userSpaceOnUse" x="0" y="0" width="100%" height="100%">
        <feFlood flood-color="green" width="50%" height="50%" />
    </filter>
    <rect width="100" height="100" fill="red" filter="url(#flood)" />
</svg>
<script>
    waitForAtLeastOneFrame().then(() => {
        document.getElementById("svg").setAttribute("width", "200");
        document.getElementById("svg").setAttribute("height", "200");
        takeScreenshot();
    });
</script>
</html>

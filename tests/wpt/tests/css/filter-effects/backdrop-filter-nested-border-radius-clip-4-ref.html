<!DOCTYPE html>
<title>backdrop-filter should respect multiple nested rounded clips from ancestors - reference</title>
<style>
#outer {
  position: relative;
  width: 200px;
  height: 100px;
  padding: 10px;
  border-radius: 10px;
  overflow: hidden;
  background-color: #66ccff;
}
#middle {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 25px;
  overflow: hidden;
  background-color: yellow;
}
#inner {
  position: relative;
  width: 80%;
  height: 80%;
  border-radius: 10px;
  overflow: hidden;
}
#backdrop-source {
  width: 100%;
  height: 100%;
  background-color: rgb(0, 128, 0);
}
</style>
<div id="outer">
  <div id="middle">
    <div id="inner">
      <div id="backdrop-source"></div>
    </div>
  </div>
</div>

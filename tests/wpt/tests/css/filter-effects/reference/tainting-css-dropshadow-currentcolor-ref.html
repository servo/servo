<!DOCTYPE html>
<title>Reference for CSS filter: drop-shadow with currentColor on a link</title>
<style>
  a {
    display: block;
    width: 100px;
    height: 100px;
    background-color: green;
    filter: drop-shadow(0px 0px 0px currentColor);
  }
  a:link {
    color: green;
  }
  a:visited {
    color: red;
  }
</style>
<a href="https://example.com/"></a>

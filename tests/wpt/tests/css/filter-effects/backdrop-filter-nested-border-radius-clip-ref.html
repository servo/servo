<!DOCTYPE html>
<title>backdrop-filter should respect rounded clip from ancestor with border-radius and overflow:hidden - reference</title>
<style>
#outer {
  position: relative;
  width: 200px;
  height: 100px;
  padding: 10px;
  border-radius: 10px;
  background-color: #66ccff;
}
#inner {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 25px;
  overflow: hidden;
}
#backdrop-source {
  width: 100%;
  height: 100%;
  background-color: rgb(0, 128, 0);
}
</style>
<div id="outer">
  <div id="inner">
    <div id="backdrop-source"></div>
  </div>
</div>

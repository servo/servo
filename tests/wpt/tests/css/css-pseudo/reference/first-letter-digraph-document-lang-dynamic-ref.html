<!doctype html>
<html>
<head>

  <title>CSS Reference: ::first-letter Dutch 'ij' digraph</title>
  <style>
  div { font-size: 32px; }
  div p { margin: 0; color: lightgray; }
  div p span { color: green; }
  </style>
</head>
<body>
  <p>Test passes if both "I" and "J" are green:</p>
  <div>
    <p><span>ij</span>sselmeer</p>
  </div>

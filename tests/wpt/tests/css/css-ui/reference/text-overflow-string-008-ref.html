<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS Basic User Interface Reference File</title>
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css" />
<style>
  @font-face {
    font-family: "mplus-test";
    src: url("/fonts/mplus-1p-regular.woff");
  }
  div {
    font-family: "mplus-test";
    font-size: 10px;
    width: calc(90px + 20px + 1px);  /* matches the test */

  span.ahem {
    font-family: Ahem;
    font-size: 30px;
  }
</style>
<body>
  <p>Test passes if there is a "<strong dir="ltr">ום A</strong>" after a black rectangle below.</p>
  <div>
    <span class="ahem">ext</span><span dir="ltr">ום A</span>
  </div>
</body>
</html>

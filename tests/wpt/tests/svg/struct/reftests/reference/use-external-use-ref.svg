<svg xmlns="http://www.w3.org/2000/svg">
  <symbol id="anchor">
    <clipPath id="clip">
      <use href="#green"/>
    </clipPath>
    <rect fill="red" width="100" height="100" />
    <g clip-path="url(#clip)">
      <rect id="green" fill="green" width="100" height="100" />
    </g>
  </symbol>
  <use href="#anchor"/>
</svg>

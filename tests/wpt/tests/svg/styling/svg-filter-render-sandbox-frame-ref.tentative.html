<!DOCTYPE html>
<html class="reftest-wait">
<head>
<svg width="0" height="0">
    <filter id="svg-filter">
        <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
    </filter>
</svg>
<script>
    function waitForFinish() {
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                document.documentElement.classList.remove('reftest-wait');
            });
        });
    }
</script>
</head>
<body onload="waitForFinish()">
    <div>
        SVG filter security test: this test passes if there is no filter effect on the sandbox frame.
    </div>
    <br />
    <div>
        <iframe width="100px" height="100px" frameBorder="0" sandbox src="/svg/styling/support/svg-filter-render-iframe.html"></iframe>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Input Element's Text is Aligned Vertically</title>
    <link rel="stylesheet" href="./supports/input-textual-ref.css">
    <link rel="help" href="https://github.com/servo/servo/pull/37065">
</head>
<body>
Display of the textual inputs should match the display generated by the CSS reference.
<style>
    div#input {
        height: 50px;
        will-change: transform;
    }
    div#input > div {
        margin-block: auto;
        inset-block: 0;
        block-size: fit-content;
        position: absolute;
    }
</style>
<div>
    <div id="input" class="definite-width">
        <div>Text</div>
    </div>
</div>
<div>
    <div id="input" class="definite-width placeholder-color">
        <div>Text</div>
    </div>
</div>
<div>
    <div id="input" class="definite-width">
        <div>●●●●●●●●</div>
    </div>
</div>
<div>
    <div id="input" class="definite-width placeholder-color">
        <div>Password</div>
    </div>
</div>
<div>
    <div id="input" class="definite-width">
        <div>Url</div>
    </div>
</div>
<div>
    <div id="input" class="definite-width placeholder-color">
        <div>Url</div>
    </div>
</div>
<div>
    <div id="input" class="definite-width">
        <div>Email</div>
    </div>
</div>
<div>
    <div id="input" class="definite-width placeholder-color">
        <div>Email</div>
    </div>
</div>
</body>
</html>

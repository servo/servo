<!DOCTYPE html>
<html>
<head>
    <title>Input Range Elements Could be Shown Properly</title>
    <link rel="stylesheet" href="./supports/input-range-ref.css">
</head>
<body>
Display of the input range should match the display generated by the CSS reference for different values.
<div>
    <div id="input" class="definite-width">
        <div id="slider-track">
            <div id="slider-fill" style="width: 0%;"></div>
        </div>
        <div id="slider-thumb" style="left: 0px;"></div>
    </div>
</div>
<div>
    <div id="input" class="definite-width">
        <div id="slider-track">
            <div id="slider-fill" style="width: 50%;"></div>
        </div>
        <div id="slider-thumb" style="left: 50%; transform: translate(-50%, -50%);"></div>
    </div>
</div>
<div>
    <div id="input" class="definite-width">
        <div id="slider-track">
            <div id="slider-fill" style="width: 100%;"></div>
        </div>
        <div id="slider-thumb" style="right: 0px;"></div>
    </div>
</div>
</body>
</html>

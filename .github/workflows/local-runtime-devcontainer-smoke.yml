name: Local Runtime Devcontainer Smoke

on:
  push:
    paths:
      - '.devcontainer/**'
      - '.github/workflows/local-runtime-devcontainer-smoke.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'mach'
      - 'python/**'
      - 'docs/local-runtime/**'
  pull_request:
    paths:
      - '.devcontainer/**'
      - '.github/workflows/local-runtime-devcontainer-smoke.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'mach'
      - 'python/**'
      - 'docs/local-runtime/**'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  RUST_BACKTRACE: 1
  SHELL: /bin/bash
  CC: clang
  CXX: clang++
  CARGO_TARGET_DIR: /var/servo-cargo-target
  UV_PROJECT_ENVIRONMENT: .devcontainer-venv

jobs:
  smoke:
    name: Bootstrap and metadata smoke
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/servo/servo/devcontainer-ubuntu:latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare devcontainer target directory
        run: mkdir -p "$CARGO_TARGET_DIR"

      - name: Bootstrap Servo dependencies
        run: ./mach bootstrap --yes

      - name: Record toolchain versions
        run: |
          set -euxo pipefail
          uname -a
          clang --version
          clang++ --version
          rustc --version --verbose
          cargo --version --verbose
          python3 --version
          uv --version

      - name: Check Cargo workspace metadata
        run: cargo metadata --format-version 1 --locked --no-deps

      - name: Check servo-net crate
        run: cargo check -p servo-net --locked

      - name: Print mach build help
        run: ./mach build --help


  linux-debug-build:
    name: Linux debug build
    runs-on: ubuntu-24.04
    needs: smoke
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 180
    container:
      image: ghcr.io/servo/servo/devcontainer-ubuntu:latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare devcontainer target directory
        run: mkdir -p "$CARGO_TARGET_DIR"

      - name: Bootstrap Servo dependencies
        run: ./mach bootstrap --yes

      - name: Build Servo Linux debug
        run: ./mach build --debug

      - name: Package Linux debug build
        run: |
          set -Eeuo pipefail

          ./mach package --debug

          rm -rf release
          mkdir -p release
          cp "$CARGO_TARGET_DIR/debug/servo-tech-demo.tar.gz" release/servo-linux-debug.tar.gz
          python3 - <<'PYZIP'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile
          with ZipFile('release/servo-linux-debug.zip', 'w', compression=ZIP_DEFLATED, compresslevel=9) as zf:
              zf.write('release/servo-linux-debug.tar.gz', arcname='servo-linux-debug.tar.gz')
          Path('release/servo-linux-debug.tar.gz').unlink()
          PYZIP

      - name: Upload release ZIP artifacts
        id: upload_zips
        uses: actions/upload-artifact@v7
        with:
          name: servo-linux-debug-release
          path: release/servo-linux-debug.zip
          if-no-files-found: error

      - name: Install GitHub CLI
        run: |
          set -Eeuo pipefail

          if command -v gh >/dev/null 2>&1; then
            gh --version
            exit 0
          fi

          apt-get update
          apt-get install -y gh
          gh --version

      - name: Push successful builds to Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          TAG=latest-local-runtime-devcontainer-linux-debug

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "Latest local runtime devcontainer Linux debug build" \
              --notes "Automatically updated by GitHub Actions."

          gh release upload "$TAG" release/servo-linux-debug.zip --clobber

      - name: Show build download link
        run: |
          TAG=latest-local-runtime-devcontainer-linux-debug

          echo "### Local runtime devcontainer Linux debug build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          printf "%s\n" "- \`servo-linux-debug.zip\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Download Actions artifact](${{ steps.upload_zips.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Download Release build](https://github.com/${{ github.repository }}/releases/tag/$TAG)" >> "$GITHUB_STEP_SUMMARY"

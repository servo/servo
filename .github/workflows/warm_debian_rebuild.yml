name: Warm Debian 12 Build

on:
  workflow_dispatch:
    inputs:
      update_state:
        description: Update cache with the newly warmed workshop. Makes next compilation faster, and this one slower.
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

defaults:
  run:
    shell: bash

env:
  RUST_BACKTRACE: 1
  SHELL: /bin/bash
  CC: clang
  CXX: clang++
  CARGO_TARGET_DIR: /var/servo-cargo-target
  UV_PROJECT_ENVIRONMENT: .devcontainer-venv
  SEVERIN_RELEASE_STEM: severin-debian12-linux-release
  SEVERIN_RELEASE_TAG: latest-severin-debian12-linux-release

jobs:
  linux-debian12-warm-build:
    name: Debian 12 warm restore-and-build
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    container:
      image: debian:12
    steps:
      # A blank Debian 12 container only needs enough equipment to retrieve and
      # unpack the saved warm environment. The restored Debian root then brings
      # back the full compiler/toolchain/Cargo workshop.
      - name: Install release-piece bootstrap
        run: |
          set -Eeuo pipefail
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            git \
            tar \
            zstd \
            gh

      - name: Slurp and restore Release Pieces
        id: release_pieces
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          WARM_TAG="factory-reset-debian12-ubuntu24-warm-state"
          PIECES_DIR="${RUNNER_TEMP}/release-pieces"

          rm -rf "$PIECES_DIR"
          mkdir -p "$PIECES_DIR"

          # This workflow starts outside a checked-out repository, so tell gh
          # the source repository explicitly.
          # Download the manifest first, then only the exact piece names it
          # lists. In-place uploads can leave an old extra part asset behind
          # when a later snapshot shrinks; it must not be concatenated.
          gh release download "$WARM_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$PIECES_DIR" \
            --clobber \
            --pattern 'SHA256SUMS'

          mapfile -t expected_piece_names < <(
            awk '{print $2}' "$PIECES_DIR/SHA256SUMS"
          )

          if [ "${#expected_piece_names[@]}" -eq 0 ]; then
            echo "Warm release SHA256SUMS contains no archive pieces." >&2
            exit 1
          fi

          for piece_name in "${expected_piece_names[@]}"; do
            gh release download "$WARM_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --dir "$PIECES_DIR" \
              --clobber \
              --pattern "$piece_name"
          done

          (
            cd "$PIECES_DIR"
            sha256sum -c SHA256SUMS
          )

          # Every fresh Actions container has live mounts supplied by Docker
          # and GitHub. Do not overwrite ANY of them while restoring the saved
          # Debian root. This is derived from this job's actual mount table;
          # it is not a fixed list of paths.
          mounted_targets() {
            awk '$5 != "/" { print $5 }' /proc/self/mountinfo \
              | while IFS= read -r encoded_path; do
                  # Linux mountinfo writes spaces and similar characters as
                  # octal escapes such as \040. Decode them for tar.
                  printf '%b\n' "$encoded_path"
                done \
              | sort -u
          }

          tar_excludes_for_destination() {
            local destination="$1"
            local mountpoint
            local relative_path

            while IFS= read -r mountpoint; do
              if [ "$destination" = "/" ]; then
                relative_path="${mountpoint#/}"
              else
                case "$mountpoint" in
                  "$destination")
                    # This is the destination itself, not a child mount to skip.
                    continue
                    ;;
                  "$destination"/*)
                    relative_path="${mountpoint#"$destination"/}"
                    ;;
                  *)
                    continue
                    ;;
                esac
              fi

              [ -n "$relative_path" ] || continue
              printf '%s\0' "--exclude=./$relative_path"
            done < <(mounted_targets)
          }

          restore_stream() {
            local stream_name="$1"
            local destination="$2"
            local first_piece="$PIECES_DIR/${stream_name}.part-000"
            local tar_excludes=()
            local exclude_arg

            if [ ! -f "$first_piece" ]; then
              echo "No ${stream_name} stream in this warm state; skipping."
              return 0
            fi

            # Even the currently published first snapshot is safe: mounted
            # paths inside it will be skipped instead of overwritten.
            while IFS= read -r -d '' exclude_arg; do
              tar_excludes+=("$exclude_arg")
            done < <(tar_excludes_for_destination "$destination")

            echo "Restoring ${stream_name} into ${destination}"
            echo "Preserving ${#tar_excludes[@]} live mountpoint(s) from this job."

            cat "$PIECES_DIR"/"${stream_name}".part-* \
              | tar --zstd \
                  --numeric-owner \
                  --acls \
                  --xattrs \
                  "${tar_excludes[@]}" \
                  -xpf - \
                  -C "$destination"
          }

          # This overlays the saved Debian userspace and Cargo target tree
          # onto the fresh Debian 12 container. The snapshot deliberately
          # omitted /proc, /sys, /dev, /run and Actions bind mounts, which are
          # supplied fresh by the new job.
          restore_stream debian-root.tar.zst /

          # Factory Reset only writes this when Actions provided HOME outside
          # /root. The same path is restored before later build commands run.
          restore_stream github-home.tar.zst "$HOME"

          if [ -f "$PIECES_DIR/repo-worktree.tar.zst.part-000" ]; then
            echo "has_repo_worktree=true" >> "$GITHUB_OUTPUT"
          else
            # The already-published first-generation snapshot has no worktree.
            # This one bridge build will make one; future runs use it.
            echo "has_repo_worktree=false" >> "$GITHUB_OUTPUT"
          fi

          test -d "$CARGO_TARGET_DIR"

      # The target directory is only truly warm when its source inputs keep the
      # same timestamps. A fresh actions/checkout writes the whole worktree
      # anew, which makes Cargo regard every source input as newer than the
      # restored artifacts. Future rolling snapshots therefore carry a git
      # worktree too. The fallback checkout is only for the already-published
      # first-generation snapshot that lacks it.
      - name: Restore warmed repository worktree
        if: steps.release_pieces.outputs.has_repo_worktree == 'true'
        run: |
          set -Eeuo pipefail

          PIECES_DIR="${RUNNER_TEMP}/release-pieces"

          echo "Restoring saved worktree into $GITHUB_WORKSPACE"
          cat "$PIECES_DIR"/repo-worktree.tar.zst.part-* \
            | tar --zstd \
                --numeric-owner \
                --acls \
                --xattrs \
                -xpf - \
                -C "$GITHUB_WORKSPACE"

          test -d "$GITHUB_WORKSPACE/.git"
          test -f "$GITHUB_WORKSPACE/Cargo.toml"

      - name: Checkout source for one-time worktree bridge
        if: steps.release_pieces.outputs.has_repo_worktree != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Update restored source in place
        if: steps.release_pieces.outputs.has_repo_worktree == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          # Restore archive intentionally omits .git/config so no credential
          # configuration rides inside Release Pieces. Reattach an ephemeral
          # origin and use this job's token only for this fetch.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if git -C "$GITHUB_WORKSPACE" remote get-url origin >/dev/null 2>&1; then
            git -C "$GITHUB_WORKSPACE" remote set-url origin \
              "https://github.com/${GITHUB_REPOSITORY}.git"
          else
            git -C "$GITHUB_WORKSPACE" remote add origin \
              "https://github.com/${GITHUB_REPOSITORY}.git"
          fi

          auth="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)"
          git -C "$GITHUB_WORKSPACE" \
            -c "http.extraheader=AUTHORIZATION: basic $auth" \
            fetch --no-tags --depth=50 origin "$GITHUB_SHA"

          # When the dispatched commit is unchanged, Git leaves the existing
          # worktree files alone, preserving their timestamps. Changed source
          # files are the only ones rewritten.
          current_sha="$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD)"

          if [ "$current_sha" = "$GITHUB_SHA" ]; then
            echo "Restored worktree already matches requested commit; preserving timestamps."
          else
            # Fast-forward updates only files that actually changed between snapshots.
            # Unchanged Rust source files retain the mtimes Cargo fingerprinted.
            git -C "$GITHUB_WORKSPACE" merge --ff-only FETCH_HEAD
          fi

          test "$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD)" = "$GITHUB_SHA"


      - name: Restore repo-local warm state
        run: |
          set -Eeuo pipefail

          PIECES_DIR="${RUNNER_TEMP}/release-pieces"
          first_piece="$PIECES_DIR/repo-warm.tar.zst.part-000"

          if [ -f "$first_piece" ]; then
            echo "Restoring repo-local warm state into $GITHUB_WORKSPACE"
            cat "$PIECES_DIR"/repo-warm.tar.zst.part-* \
              | tar --zstd \
                  --numeric-owner \
                  --acls \
                  --xattrs \
                  -xpf - \
                  -C "$GITHUB_WORKSPACE"
          else
            echo "No repo-local warm state in this snapshot; continuing."
          fi

          echo "=== Cargo warmth inventory ==="
          du -sh "$CARGO_TARGET_DIR" 2>/dev/null || true
          find "$CARGO_TARGET_DIR/release/.fingerprint" \
            -mindepth 1 -maxdepth 1 -type d 2>/dev/null \
            | wc -l \
            | xargs printf 'release fingerprint directories: %s\n'
          stat -c 'Cargo.lock mtime: %y' "$GITHUB_WORKSPACE/Cargo.lock" || true

          test -d "$CARGO_TARGET_DIR"

      - name: Reattach restored Rust toolchain
        run: |
          set -Eeuo pipefail

          # Factory Reset's preflight installs Rustup deliberately here:
          #   RUSTUP_HOME=/usr/local/rustup
          #   CARGO_HOME=/usr/local/cargo
          # The tar restored those files, but not the old shell's PATH export.
          CARGO_HOME=/usr/local/cargo
          RUSTUP_HOME=/usr/local/rustup
          CARGO_BIN="$CARGO_HOME/bin"

          if [ ! -x "$CARGO_BIN/cargo" ]; then
            echo "Cargo was not restored at $CARGO_BIN/cargo." >&2
            echo "This warm snapshot is missing the Factory Reset Rust install." >&2
            echo "Present /usr/local entries:" >&2
            find /usr/local -maxdepth 3 -mindepth 1 -printf '%p\n' 2>/dev/null \
              | sed -n '1,160p' >&2 || true
            exit 1
          fi

          export CARGO_HOME RUSTUP_HOME
          export PATH="$CARGO_BIN:$PATH"

          # Persist the exact original Factory Reset locations into later
          # Actions steps. The current shell receives the export above.
          printf '%s\n' "$CARGO_BIN" >> "$GITHUB_PATH"
          {
            printf 'CARGO_HOME=%s\n' "$CARGO_HOME"
            printf 'RUSTUP_HOME=%s\n' "$RUSTUP_HOME"
          } >> "$GITHUB_ENV"

          echo "Restored Cargo bin: $CARGO_BIN"
          echo "Restored Cargo home: $CARGO_HOME"
          echo "Restored Rustup home: $RUSTUP_HOME"

          command -v cargo
          cargo --version --verbose
          command -v rustc
          rustc --version --verbose

      - name: Probe Cargo freshness — 120 second cap
        run: |
          set -Eeuo pipefail

          LOG="$RUNNER_TEMP/cargo-fingerprint.log"

          set +e
          timeout --kill-after=15s 120s \
            env CARGO_LOG=cargo::core::compiler::fingerprint=trace \
            ./mach build --release --very-verbose \
            >"$LOG" 2>&1
          status=$?
          set -e

          echo "=== Cargo freshness excerpts ==="
          grep -Ei \
            'CARGO_LOG|dirty|fresh|fingerprint|stale|changed|newer|missing' \
            "$LOG" \
            | sed -n '1,350p' \
            || true

          echo "=== Cargo probe tail ==="
          tail -n 80 "$LOG" || true

          echo "Probe exit status: $status"
          echo "0 means it completed; 124 means it was deliberately stopped."
          exit 0

      - name: Build Severin Linux release
        run: ./mach build --release

      - name: Package Severin Linux release
        run: |
          set -Eeuo pipefail

          ./mach package --release

          # Servo's package command produces this internal archive name.
          # It is unpacked here and never published as a Severin asset.
          PACKAGE="$CARGO_TARGET_DIR/release/servo-tech-demo.tar.gz"
          WORK_DIR="$(mktemp -d)"
          RUNTIME_DIR="$WORK_DIR/runtime"
          SYMBOL_DIR="$WORK_DIR/symbols"
          export RUNTIME_DIR SYMBOL_DIR
          BEFORE_INVENTORY="$WORK_DIR/largest-before.md"
          AFTER_INVENTORY="$WORK_DIR/largest-after.md"
          ELF_LIST="$WORK_DIR/elf-files.txt"

          rm -rf release
          mkdir -p release "$RUNTIME_DIR" "$SYMBOL_DIR"

          tar -xzf "$PACKAGE" -C "$RUNTIME_DIR"

          ORIGINAL_PACKAGE_SIZE="$(du -h "$PACKAGE" | cut -f1)"
          echo "Original package size: $ORIGINAL_PACKAGE_SIZE"

          echo "Largest 50 files before stripping:"
          find "$RUNTIME_DIR" -type f -printf '%s %p\n' | sort -nr | sed -n '1,50p' | tee "$BEFORE_INVENTORY"

          select_tool() {
            local tool
            for tool in "$@"; do
              if command -v "$tool" >/dev/null 2>&1; then
                command -v "$tool"
                return 0
              fi
            done
            return 1
          }

          READELF="$(select_tool readelf llvm-readelf)" || {
            echo "No usable ELF header reader found; expected readelf or llvm-readelf." >&2
            exit 1
          }
          OBJCOPY="$(select_tool objcopy llvm-objcopy)" || {
            echo "No usable debug objcopy tool found; expected objcopy or llvm-objcopy." >&2
            exit 1
          }
          STRIP="$(select_tool strip llvm-strip)" || {
            echo "No usable strip tool found; expected strip or llvm-strip." >&2
            exit 1
          }

          echo "Selected ELF header reader: $READELF"
          echo "Selected debug objcopy tool: $OBJCOPY"
          echo "Selected strip tool: $STRIP"

          : > "$ELF_LIST"
          while IFS= read -r -d '' file_path; do
            if "$READELF" -h "$file_path" >/dev/null 2>&1; then
              size="$(stat -c '%s' "$file_path")"
              printf '%s %s\n' "$size" "$file_path" >> "$ELF_LIST"
              printf '%s: ELF file detected by %s\n' "${file_path#$RUNTIME_DIR/}" "$(basename "$READELF")"
            fi
          done < <(find "$RUNTIME_DIR" -type f -print0)

          echo "Section information for largest ELF files before stripping:"
          sort -nr "$ELF_LIST" | sed -n '1,20p' | while IFS=' ' read -r _ elf_file; do
            echo "### ${elf_file#$RUNTIME_DIR/}"
            "$READELF" -S "$elf_file" | sed -n '1,80p'
          done

          PROCESSED_ELF_COUNT=0

          while IFS=' ' read -r _ elf_file; do
            rel_path="${elf_file#$RUNTIME_DIR/}"
            symbol_file="$SYMBOL_DIR/$rel_path.debug"
            mkdir -p "$(dirname "$symbol_file")"

            "$OBJCOPY" --only-keep-debug "$elf_file" "$symbol_file"
            "$STRIP" --strip-debug "$elf_file"
            if "$OBJCOPY" --add-gnu-debuglink="$symbol_file" "$elf_file"; then
              echo "Added GNU debug link for $rel_path"
            else
              echo "GNU debug link unsupported for $rel_path"
            fi
            PROCESSED_ELF_COUNT=$((PROCESSED_ELF_COUNT + 1))
          done < <(sort -nr "$ELF_LIST")

          SERVOSHELL_PATH="$(find "$RUNTIME_DIR" -type f -name servoshell -print -quit)"
          if [ -z "$SERVOSHELL_PATH" ]; then
            echo "Packaged servoshell not found for GLIBC floor inspection." >&2
            exit 1
          fi
          GLIBC_FLOOR="$($READELF --version-info "$SERVOSHELL_PATH" 2>/dev/null | sed -n 's/.*GLIBC_\([0-9][0-9.]*\).*/\1/p' | sort -Vu | tail -n 1)"
          if [ -z "$GLIBC_FLOOR" ]; then
            GLIBC_FLOOR="not detected"
            GLIBC_DEBIAN12_COMPAT="unknown"
          elif printf '%s\n%s\n' "$GLIBC_FLOOR" "2.36" | sort -CV; then
            GLIBC_DEBIAN12_COMPAT="yes"
          else
            GLIBC_DEBIAN12_COMPAT="no"
          fi
          echo "Highest required GLIBC symbol: GLIBC_$GLIBC_FLOOR"
          echo "Debian 12 / glibc 2.36 compatible: $GLIBC_DEBIAN12_COMPAT"
          if [ "$GLIBC_DEBIAN12_COMPAT" = "no" ]; then
            echo "Debian 12 artifact requires newer than GLIBC_2.36." >&2
            exit 1
          fi

          STRIPPED_RUNTIME_SIZE="$(du -sh "$RUNTIME_DIR" | cut -f1)"
          SYMBOLS_SIZE="$(du -sh "$SYMBOL_DIR" | cut -f1)"
          echo "Stripped runtime tree size: $STRIPPED_RUNTIME_SIZE"
          echo "Symbols tree size: $SYMBOLS_SIZE"
          echo "ELF files processed: $PROCESSED_ELF_COUNT"

          echo "Largest 50 files after stripping:"
          find "$RUNTIME_DIR" -type f -printf '%s %p\n' | sort -nr | sed -n '1,50p' | tee "$AFTER_INVENTORY"

          python3 - <<'PYZIP'
          import os
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          asset_stem = os.environ["SEVERIN_RELEASE_STEM"]
          archives = [
              (
                  Path("release") / f"{asset_stem}-runtime-stripped.zip",
                  Path(os.environ["RUNTIME_DIR"]),
              ),
              (
                  Path("release") / f"{asset_stem}-symbols.zip",
                  Path(os.environ["SYMBOL_DIR"]),
              ),
          ]

          for zip_path, source_dir in archives:
              with ZipFile(
                  zip_path,
                  "w",
                  compression=ZIP_DEFLATED,
                  compresslevel=9,
                  strict_timestamps=False,
              ) as zf:
                  for path in sorted(source_dir.rglob("*")):
                      if path.is_file():
                          archive_name = path.relative_to(source_dir).as_posix()
                          zf.write(path, archive_name)
          PYZIP

          RUNTIME_ZIP_SIZE="$(
            du -h "release/${SEVERIN_RELEASE_STEM}-runtime-stripped.zip" | cut -f1
          )"
          SYMBOLS_ZIP_SIZE="$(
            du -h "release/${SEVERIN_RELEASE_STEM}-symbols.zip" | cut -f1
          )"

          {
            echo "ORIGINAL_PACKAGE_SIZE=$ORIGINAL_PACKAGE_SIZE"
            echo "STRIPPED_RUNTIME_SIZE=$STRIPPED_RUNTIME_SIZE"
            echo "SYMBOLS_SIZE=$SYMBOLS_SIZE"
            echo "RUNTIME_ZIP_SIZE=$RUNTIME_ZIP_SIZE"
            echo "SYMBOLS_ZIP_SIZE=$SYMBOLS_ZIP_SIZE"
            echo "PROCESSED_ELF_COUNT=$PROCESSED_ELF_COUNT"
            echo "GLIBC_FLOOR=$GLIBC_FLOOR"
            echo "GLIBC_DEBIAN12_COMPAT=$GLIBC_DEBIAN12_COMPAT"
            echo "BEFORE_INVENTORY=$BEFORE_INVENTORY"
            echo "AFTER_INVENTORY=$AFTER_INVENTORY"
          } >> "$GITHUB_ENV"          

      - name: Refresh rolling warm state in Releases
        if: inputs.update_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          SNAPSHOT_DIR="$GITHUB_WORKSPACE/warm-state-next"
          WARM_TAG="factory-reset-debian12-ubuntu24-warm-state"

          rm -rf "$SNAPSHOT_DIR"
          mkdir -p "$SNAPSHOT_DIR"

          {
            echo "warm_snapshot=debian12-ubuntu24"
            echo "created_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "repository=$GITHUB_REPOSITORY"
            echo "commit=$GITHUB_SHA"
            echo "runner_os=$RUNNER_OS"
            echo "runner_arch=$RUNNER_ARCH"
            echo "outer_host_label=ubuntu-24.04"
            echo "container_image=debian:12"
            echo "github_workspace=$GITHUB_WORKSPACE"
            echo "home=$HOME"
            echo "cargo_target_dir=$CARGO_TARGET_DIR"
            echo "uv_project_environment=$UV_PROJECT_ENVIRONMENT"
          } > "$SNAPSHOT_DIR/manifest.env"

          uname -a > "$SNAPSHOT_DIR/uname.txt"
          cat /etc/os-release > "$SNAPSHOT_DIR/debian-os-release.txt"
          cat /proc/self/mountinfo > "$SNAPSHOT_DIR/mountinfo.txt"

          du -sh \
            "$CARGO_TARGET_DIR" \
            "$HOME" \
            "$GITHUB_WORKSPACE/.devcontainer-venv" \
            2>&1 | tee "$SNAPSHOT_DIR/warm-state-sizes.txt" || true

          # Release assets stay below 2 GiB. Each stream is split into
          # contiguous 1900 MiB pieces and restored with one ordered cat pipe.
          split_zstd_tar() {
            local stem="$1"
            shift

            "$@" | split \
              --bytes=1900M \
              --numeric-suffixes=0 \
              --suffix-length=3 \
              - "$SNAPSHOT_DIR/${stem}.part-"
          }

          # Snapshot rule: preserve the Debian filesystem but exclude every
          # current mountpoint supplied by this job. This catches Docker's
          # single-file /etc mounts, Actions work/temp mounts, pseudo-filesystems,
          # and future injected mounts without keeping a brittle list.
          mounted_targets() {
            awk '$5 != "/" { print $5 }' /proc/self/mountinfo \
              | while IFS= read -r encoded_path; do
                  printf '%b\n' "$encoded_path"
                done \
              | sort -u
          }

          ROOT_EXCLUDES=(
            --exclude='./tmp'
            --exclude='./root/.gitconfig'
            --exclude='./root/.config/gh/hosts.yml'
          )

          while IFS= read -r mountpoint; do
            ROOT_EXCLUDES+=("--exclude=./${mountpoint#/}")
          done < <(mounted_targets)

          echo "Snapshot will exclude $(( ${#ROOT_EXCLUDES[@]} - 3 )) live mountpoint(s)."

          # Debian root: packages, toolchains, /var/servo-cargo-target and
          # root-owned caches. Actions bridges and live pseudo-filesystems are
          # not carried forward.
          split_zstd_tar debian-root.tar.zst \
            tar --zstd \
              --numeric-owner \
              --acls \
              --xattrs \
              --one-file-system \
              "${ROOT_EXCLUDES[@]}" \
              -C / \
              -cf - .

          # Preserve a separately mounted Actions HOME without preserving Git
          # or GitHub authentication configuration.
          if [ "$HOME" != "/root" ] && [ -d "$HOME" ]; then
            split_zstd_tar github-home.tar.zst \
              tar --zstd \
                --numeric-owner \
                --acls \
                --xattrs \
                --exclude='./.gitconfig' \
                --exclude='./.config/gh/hosts.yml' \
                -C "$HOME" \
                -cf - .
          fi

          # Preserve the source worktree's mtimes alongside its .git database.
          # This is the missing half of Cargo warmth: a clean checkout from
          # Actions rewrites every source input and invalidates restored target
          # fingerprints even when file contents have not changed.
          #
          # Local Git config is intentionally omitted; the restore path creates
          # an ephemeral authenticated remote for the current job.
          if [ -d "$GITHUB_WORKSPACE/.git" ]; then
            split_zstd_tar repo-worktree.tar.zst \
              tar --zstd \
                --numeric-owner \
                --acls \
                --xattrs \
                --exclude='./.git/config' \
                --exclude='./.git/config.worktree' \
                --exclude='./.git/credentials' \
                --exclude='./.git/hooks' \
                --exclude='./.devcontainer-venv' \
                --exclude='./release' \
                --exclude='./warm-state-next' \
                -C "$GITHUB_WORKSPACE" \
                -cf - \
                .
          fi

          # UV is repo-local but not part of the git worktree. Restore it after
          # source update so Git never cleans or rewrites it.
          if [ -d "$GITHUB_WORKSPACE/.devcontainer-venv" ]; then
            split_zstd_tar repo-warm.tar.zst \
              tar --zstd \
                --numeric-owner \
                --acls \
                --xattrs \
                -C "$GITHUB_WORKSPACE" \
                -cf - \
                .devcontainer-venv
          fi

          (
            cd "$SNAPSHOT_DIR"
            sha256sum *.part-* > SHA256SUMS
            cat > README.txt <<'EOF'
          Rolling warm state: Debian 12 userspace on the Ubuntu 24.04
          GitHub-hosted runner floor.

          Restore order:
            1. Reassemble and extract debian-root.tar.zst.part-* into /.
            2. Reassemble and extract github-home.tar.zst.part-* into $HOME,
               when that archive exists.
            3. Reassemble and extract repo-worktree.tar.zst.part-* into
               $GITHUB_WORKSPACE, when that archive exists.
            4. Fetch the requested source commit and fast-forward to it.
               Unchanged worktree files retain their restored timestamps.
            5. Reassemble and extract repo-warm.tar.zst.part-* into
               $GITHUB_WORKSPACE, when that archive exists.
            6. Run ./mach build --release.

          Each .part-* is a contiguous fragment of one .tar.zst stream:
            cat NAME.part-* | tar --zstd -xf - -C DESTINATION
          EOF
          )

          echo "=== Refreshed warm state ==="
          du -sh "$SNAPSHOT_DIR"/* | sort -h

          # Normal builds do not create, delete, or retag the warm release.
          # Factory Reset owns initial creation. This path only replaces the
          # fixed asset names on that existing prerelease—the same operation
          # used by the established ordinary release pipeline.
          if ! gh release view "$WARM_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            >/dev/null 2>&1; then
            echo "Warm-state prerelease $WARM_TAG is missing." >&2
            echo "Run Factory Reset to seed it; normal builds only refresh it." >&2
            exit 1
          fi

          gh release upload "$WARM_TAG" "$SNAPSHOT_DIR"/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Upload Severin release ZIP artifacts
        id: upload_zips
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.SEVERIN_RELEASE_STEM }}
          path: |
            release/${{ env.SEVERIN_RELEASE_STEM }}-runtime-stripped.zip
            release/${{ env.SEVERIN_RELEASE_STEM }}-symbols.zip
          if-no-files-found: error

      - name: Prepare stripped Severin runtime tarball
        run: |
          set -Eeuo pipefail

          SOURCE_DIR="release"
          OUTPUT_DIR="${RUNNER_TEMP}/severin-runtime"
          RUNTIME_ZIP_NAME="${SEVERIN_RELEASE_STEM}-runtime-stripped.zip"
          SYMBOLS_ZIP_NAME="${SEVERIN_RELEASE_STEM}-symbols.zip"
          RUNTIME_TARBALL="release/${SEVERIN_RELEASE_STEM}-runtime-stripped.tar.gz"

          mapfile -t runtime_zips < <(
            find "$SOURCE_DIR" -type f -name "$RUNTIME_ZIP_NAME" -print | sort
          )
          if [ "${#runtime_zips[@]}" -ne 1 ]; then
            echo "ERROR: expected exactly one $RUNTIME_ZIP_NAME; found ${#runtime_zips[@]}." >&2
            printf '%s\n' "${runtime_zips[@]:-}" >&2
            exit 1
          fi

          mapfile -t symbols_zips < <(
            find "$SOURCE_DIR" -type f -name "$SYMBOLS_ZIP_NAME" -print | sort
          )
          if [ "${#symbols_zips[@]}" -ne 1 ]; then
            echo "ERROR: expected exactly one $SYMBOLS_ZIP_NAME; found ${#symbols_zips[@]}." >&2
            printf '%s\n' "${symbols_zips[@]:-}" >&2
            exit 1
          fi

          runtime_zip="${runtime_zips[0]}"
          symbols_zip="${symbols_zips[0]}"

          rm -rf "$OUTPUT_DIR"
          rm -f "$RUNTIME_TARBALL"
          mkdir -p "$OUTPUT_DIR"

          unzip -q "$runtime_zip" -d "$OUTPUT_DIR"

          servoshell_path="$(find "$OUTPUT_DIR" -type f -name servoshell -print -quit)"
          if [ -z "$servoshell_path" ]; then
            echo "ERROR: stripped runtime ZIP did not contain servoshell." >&2
            exit 1
          fi

          # Actions artifacts do not reliably preserve executable mode on a raw
          # directory. The tarball keeps servoshell executable after download.
          tar -C "$OUTPUT_DIR" -czf "$RUNTIME_TARBALL" .

          runtime_tree_size="$(du -sh "$OUTPUT_DIR" | cut -f1)"
          runtime_zip_size="$(du -h "$runtime_zip" | cut -f1)"
          symbols_zip_size="$(du -h "$symbols_zip" | cut -f1)"
          runtime_tarball_size="$(du -h "$RUNTIME_TARBALL" | cut -f1)"

          runtime_zip_sha256="$(sha256sum "$runtime_zip" | awk '{print $1}')"
          symbols_zip_sha256="$(sha256sum "$symbols_zip" | awk '{print $1}')"
          runtime_tarball_sha256="$(sha256sum "$RUNTIME_TARBALL" | awk '{print $1}')"
          servoshell_version="$("$servoshell_path" --version 2>&1 || true)"

          {
            echo "### Severin Debian 12 Linux runtime"
            echo
            echo "- Runtime ZIP: $RUNTIME_ZIP_NAME ($runtime_zip_size)"
            echo "- Runtime ZIP SHA-256: $runtime_zip_sha256"
            echo "- Symbols ZIP: $SYMBOLS_ZIP_NAME ($symbols_zip_size)"
            echo "- Symbols ZIP SHA-256: $symbols_zip_sha256"
            echo "- Extracted runtime tree: $runtime_tree_size"
            echo "- Runtime tarball: $(basename "$RUNTIME_TARBALL") ($runtime_tarball_size)"
            echo "- Runtime tarball SHA-256: $runtime_tarball_sha256"
            echo "- Packaged servoshell: $servoshell_version"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload stripped Severin runtime tarball
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.SEVERIN_RELEASE_STEM }}-runtime-stripped-tarball
          path: release/${{ env.SEVERIN_RELEASE_STEM }}-runtime-stripped.tar.gz
          if-no-files-found: error
          compression-level: 0

      - name: Install GitHub CLI
        run: |
          set -Eeuo pipefail

          if command -v gh >/dev/null 2>&1; then
            gh --version
            exit 0
          fi

          apt-get update
          apt-get install -y gh
          gh --version

      - name: Push successful Severin build to Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          RUNTIME_ZIP="release/${SEVERIN_RELEASE_STEM}-runtime-stripped.zip"
          SYMBOLS_ZIP="release/${SEVERIN_RELEASE_STEM}-symbols.zip"

          gh release view "$SEVERIN_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            >/dev/null 2>&1 || \
            gh release create "$SEVERIN_RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Latest Severin Debian 12 Linux release build" \
              --notes "Rolling Severin build, updated by GitHub Actions."

          gh release upload "$SEVERIN_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            "$RUNTIME_ZIP" \
            "$SYMBOLS_ZIP" \
            --clobber

      - name: Show Severin download link
        run: |
          set -Eeuo pipefail

          {
            echo "### Severin Debian 12 Linux release build"
            echo
            echo "- Original package size: $ORIGINAL_PACKAGE_SIZE"
            echo "- Stripped runtime tree size: $STRIPPED_RUNTIME_SIZE"
            echo "- Symbols tree size: $SYMBOLS_SIZE"
            echo "- Runtime ZIP size: $RUNTIME_ZIP_SIZE"
            echo "- Symbols ZIP size: $SYMBOLS_ZIP_SIZE"
            echo "- ELF files processed: $PROCESSED_ELF_COUNT"
            echo "- Highest required GLIBC symbol: GLIBC_$GLIBC_FLOOR"
            echo "- Should run on Debian 12 / glibc 2.36: $GLIBC_DEBIAN12_COMPAT"
            echo
            echo "#### Largest files before stripping"
            echo '```'
            cat "$BEFORE_INVENTORY"
            echo '```'
            echo
            echo "#### Largest files after stripping"
            echo '```'
            cat "$AFTER_INVENTORY"
            echo '```'
            echo

            if [ -n "${{ steps.upload_zips.outputs.artifact-url }}" ]; then
              echo "[Download Actions ZIP bundle](${{ steps.upload_zips.outputs.artifact-url})"
              echo
            fi

            echo "[Download rolling Severin Release](https://github.com/${{ github.repository }}/releases/tag/$SEVERIN_RELEASE_TAG)"
          } >> "$GITHUB_STEP_SUMMARY"

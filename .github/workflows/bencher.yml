name: Bencher
on:
  workflow_call:
    inputs:
      target:
        required: false
        default: "linux"
        type: string
      profile:
        required: false
        default: "release"
        type: string
      file-size:
        required: false
        default: false
        type: boolean
      speedometer:
        required: false
        default: false
        type: boolean
      dromaeo:
        required: false
        default: false
        type: boolean

permissions:
  checks: write
  pull-requests: write

env:
  RUST_BACKTRACE: 1
  SHELL: /bin/bash
  # allows overriding bencher project for pushes
  BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT || 'servo' }}

jobs:
  linux-bencher:
    name: Bencher
    # keep this in sync with testbed
    runs-on: ubuntu-22.04
    steps:
      - name: Early return
        if: ${{ inputs.file-size == false && inputs.speedometer == false && inputs.dromaeo == false }}
        run: exit 0
      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request_target'
        with:
          fetch-depth: 0
      # This is necessary to checkout the pull request if this run was triggered via a
      # `pull_request_target` event.
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request_target'
        with:
          ref: refs/pull/${{ github.event.number }}/head
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.profile }}-binary-${{ inputs.target }}
          path: ${{ inputs.profile }}-binary-${{ inputs.target }}
      # Linux and macOS uploads compressed binary
      - name: unPackage binary (Linux or macOS)
        if: ${{ inputs.target == 'linux' || inputs.target == 'macos' }}
        run: tar -xzf ${{ inputs.profile }}-binary-${{ inputs.target }}/target.tar.gz
      - name: Setup Python
        uses: ./.github/actions/setup-python
      - name: Bootstrap dependencies
        if: ${{ inputs.speedometer == true || inputs.dromaeo == true }}
        run: |
          sudo apt update
          sudo apt install -qy --no-install-recommends mesa-vulkan-drivers
          python3 ./mach bootstrap --skip-lints
      - uses: bencherdev/bencher@main
      - name: File location (Linux or macOS)
        if: ${{ inputs.target == 'linux' || inputs.target == 'macos' }}
        run: echo "SERVO_BINARY_PATH=target/${{ inputs.profile }}/servo" >> $GITHUB_ENV
      - name: File location (Windows)
        if: ${{ inputs.target == 'windows' }}
        run: echo "SERVO_BINARY_PATH=${{ inputs.profile }}-binary-windows/Servo.exe" >> $GITHUB_ENV
      - name: File location (Android)
        if: ${{ contains(inputs.target, 'android') }}
        run: echo "SERVO_BINARY_PATH=${{ inputs.profile }}-binary-android/servoapp.apk" >> $GITHUB_ENV
      # - name: Check if signed (Open Harmony)
      #   if: ${{ contains(inputs.target, 'ohos') }}
      #   run: 
      # - name: File location (Open Harmony, signed)
      #   if: ${{ contains(inputs.target, 'ohos') && env.SERVO_OHOS_SIGNING_CONFIG != '' }}
      #   run: echo "SERVO_BINARY_PATH=target/${{ inputs.profile }}/servo/servoshell-default-signed.hap" >> $GITHUB_ENV
      # - name: File location (Open Harmony, unsigned)
      #   if: ${{ contains(inputs.target, 'ohos') && env.SERVO_OHOS_SIGNING_CONFIG == '' }}
      #   run: echo "SERVO_BINARY_PATH=target/${{ inputs.profile }}/servo/servoshell-default-unsigned.hap" >> $GITHUB_ENV
      - name: File size
        if: ${{ inputs.file-size == true }}
        run: |
            ./etc/ci/bencher.py filesize ${{ env.SERVO_BINARY_PATH }} ${{ inputs.target }}-${{ inputs.profile }} --bmf-output size.json
            echo "SERVO_FILE_SIZE_RESULT=size.json" >> $GITHUB_ENV
      - name: Speedometer
        if: ${{ inputs.speedometer == true }}
        run: |
            python3 ./mach test-speedometer -r --bmf-output speedometer.json
            echo "SERVO_SPEEDOMETER_RESULT=speedometer.json" >> $GITHUB_ENV
      - name: Dromaeo
        if: ${{ inputs.dromaeo == true }}
        run: |
            python3 ./mach test-dromaeo -r dom --bmf-output dromaeo.json
            echo "SERVO_DROMAEO_RESULT=dromaeo.json" >> $GITHUB_ENV
      # set options
      - name: Set bencher opts for PRs (label try run)
        if: github.event_name == 'pull_request_target'
        run: |
            echo "RUN_BENCHER_OPTIONS=--branch ${{ github.event.number }}/PR \
            --branch-start-point ${{ github.base_ref }} \
            --branch-start-point-hash ${{ github.event.pull_request.base.sha }} \
            --branch-reset \
            --github-actions ${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_ENV"
      - name: Set bencher opts for main
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        run: |
            echo "RUN_BENCHER_OPTIONS=--branch main \
            --github-actions ${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_ENV"
      - name: Set bencher opts for try branch
        if: ${{ github.event_name == 'push' && github.ref_name == 'try' }}
        run: |
            git remote add upstream https://github.com/servo/servo
            git fetch upstream main
            echo "RUN_BENCHER_OPTIONS=--branch try \
            --github-actions ${{ secrets.GITHUB_TOKEN }} \
            --hash $(git rev-parse HEAD~1) \
            --branch-start-point main \
            --branch-start-point-hash $(git merge-base upstream/main HEAD) \
            --branch-reset" >> "$GITHUB_ENV"
      # we join results and send all data once to have it all in one report
      - name: Send results
        continue-on-error: true
        run: |
          ./etc/ci/bencher.py merge ${{ env.SERVO_FILE_SIZE_RESULT }} ${{ env.SERVO_SPEEDOMETER_RESULT }} ${{ env.SERVO_DROMAEO_RESULT }} --bmf-output b.json
          bencher run --adapter json --file b.json \
            --project ${{ env.BENCHER_PROJECT }} --token ${{ secrets.BENCHER_API_TOKEN }} --testbed ubuntu-22.04 \
            $RUN_BENCHER_OPTIONS
name: Warm Debian 12 Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: Command to run in the restored warm environment. Semicolon chains are supported.
        required: false
        default: ./mach print-env
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  RUST_BACKTRACE: 1
  SHELL: /bin/bash
  CC: clang
  CXX: clang++
  CARGO_TARGET_DIR: /var/servo-cargo-target
  UV_PROJECT_ENVIRONMENT: .devcontainer-venv

jobs:
  warm-command:
    name: Debian 12 warm command
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    container:
      image: debian:12

    steps:
      - name: Install restore bootstrap
        run: |
          set -Eeuo pipefail

          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            git \
            tar \
            zstd \
            gh

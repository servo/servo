[package]
name = "servo-capi"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "C API for the Servo rendering engine"

[lib]
name = "servo_capi"
path = "lib.rs"
crate-type = ["cdylib"]

[features]
capi = [] # Needed by `cargo-c`.
# TODO: Need to think about which features from servo can be
# exposed here for conditional compilation of C API.

[dependencies]
dpi = { workspace = true }
libc = { workspace = true }
log = { workspace = true }
# TODO: We need 'baked-in-resources' as the `inventory` based `ResourceReader`
# doesn't work when libservo is a cdylib.
servo = { workspace = true, features = ["js_jit", "baked-in-resources", "bundled_freetype"] }
url = { workspace = true }

# TODO: ANGLE is needed on Windows to provide libEGL.dll and libGLESv2.dll
# for surfman's EGL backend. WGL doesn't work at least on CI.
# This should be eventually be exposed as a feature of this crate.
[target.'cfg(target_os = "windows")'.dependencies]
servo = { workspace = true, features = ["no-wgl"] }

[package.metadata.capi.header]
subdirectory = "servo"

[package.metadata.capi.library]
name = "servo_capi"

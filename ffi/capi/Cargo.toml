[package]
name = "servo-capi"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "C API for the Servo rendering engine"

[lib]
name = "servo_capi"
path = "lib.rs"
crate-type = ["cdylib"]

[features]
capi = [] # Needed by `cargo-c`.
# TODO: Need to think about which features from servo can be
# exposed here for conditional compilation of C API.

[dependencies]
dpi = { workspace = true }
log = { workspace = true }
# TODO: We need 'baked-in-resources' as the `inventory` based `ResourceReader`
# doesn't work when libservo is a cdylib.
servo = { workspace = true, features = ["js_jit", "baked-in-resources"] }
url = { workspace = true }

[package.metadata.capi.header]
subdirectory = "servo"

[package.metadata.capi.library]
name = "servo_capi"
